<style>
/* ═══════════════════════════════════════════════════════════════════════════
   HGUS Academic Result Management System — Base Styles
   Mobile-first. Designed for 360px–480px phones, scales to tablet/desktop.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ─── DESIGN TOKENS ─────────────────────────────────────────────────────── */
:root {
  /* Primary — deep blue */
  --blue-900:   #0d47a1;
  --blue-800:   #1565c0;
  --blue-700:   #1976d2;
  --blue-50:    #e3f2fd;

  /* Accent — amber */
  --amber-600:  #ffb300;
  --amber-700:  #ffa000;

  /* Neutrals */
  --grey-50:    #fafafa;
  --grey-100:   #f5f5f5;
  --grey-200:   #eeeeee;
  --grey-300:   #e0e0e0;
  --grey-500:   #9e9e9e;
  --grey-600:   #757575;
  --grey-700:   #616161;
  --grey-900:   #212121;

  /* Semantic */
  --color-primary:    var(--blue-800);
  --color-primary-dk: var(--blue-900);
  --color-accent:     var(--amber-600);
  --color-bg:         var(--grey-100);
  --color-surface:    #ffffff;
  --color-text:       var(--grey-900);
  --color-text-sec:   var(--grey-600);
  --color-border:     var(--grey-300);
  --color-error:      #c62828;
  --color-error-bg:   #ffebee;
  --color-success:    #2e7d32;
  --color-success-bg: #e8f5e9;
  --color-warning:    #e65100;
  --color-warning-bg: #fff3e0;

  /* Role badge colours */
  --badge-super: #4a148c;
  --badge-admin: #1565c0;
  --badge-teacher: #1b5e20;

  /* Spacing */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadow */
  --shadow-sm:  0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-md:  0 3px 6px rgba(0,0,0,.14), 0 3px 6px rgba(0,0,0,.10);
  --shadow-top: 0 -2px 8px rgba(0,0,0,.10);

  /* Typography */
  --font-body:  'Segoe UI', system-ui, -apple-system, sans-serif;
  --text-xs:    12px;
  --text-sm:    14px;
  --text-base:  16px;
  --text-lg:    18px;
  --text-xl:    20px;
  --text-2xl:   24px;

  /* Touch targets */
  --tap-min:    48px;

  /* App bar height */
  --bar-height: 56px;
}

/* ─── RESET ─────────────────────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── SCROLLING ──────────────────────────────────────────────────────────── */
.scroll-y {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ─── APP BAR ────────────────────────────────────────────────────────────── */
.app-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--bar-height);
  background: var(--color-primary);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 var(--space-md);
  gap: var(--space-sm);
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}

.app-bar__back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  padding: 0;
  line-height: 1;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.55);
  background: rgba(255,255,255,.18);
  color: #fff;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
  transition: background .15s;
}
.app-bar__back:hover  { background: rgba(255,255,255,.30); }
.app-bar__back:active { background: rgba(255,255,255,.40); }

.app-bar__title {
  flex: 1;
  overflow: hidden;
}
.app-bar__title h1 {
  font-size: var(--text-lg);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.app-bar__title .subtitle {
  font-size: var(--text-xs);
  opacity: .85;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-bar__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: none;
  color: #fff;
  font-size: var(--text-sm);
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.app-bar__avatar:hover { background: rgba(255,255,255,.35); }

/* ─── SESSION BADGE (in app bar) ─────────────────────────────────────────── */
.session-badge {
  background: rgba(255,255,255,.18);
  border-radius: var(--radius-full);
  padding: 2px 10px;
  font-size: var(--text-xs);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ─── PAGE CONTENT ───────────────────────────────────────────────────────── */
.page-content {
  flex: 1;
  padding: var(--space-md);
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}

.page-content--flush {
  padding: 0;
}

/* ─── CARDS ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card--pad {
  padding: var(--space-md);
}
.card + .card {
  margin-top: var(--space-md);
}

/* ─── FORM ELEMENTS ──────────────────────────────────────────────────────── */
.form-group {
  margin-bottom: var(--space-md);
}

.form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-sec);
  margin-bottom: var(--space-xs);
  text-transform: uppercase;
  letter-spacing: .04em;
}

.form-input,
.form-select,
.form-textarea {
  display: block;
  width: 100%;
  height: var(--tap-min);
  padding: 0 var(--space-md);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-surface);
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.form-textarea {
  height: auto;
  min-height: 80px;
  padding: var(--space-sm) var(--space-md);
  resize: vertical;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(21,101,192,.15);
}
.form-input.error,
.form-select.error {
  border-color: var(--color-error);
}
.form-input--icon {
  padding-right: 48px;
}

.input-wrapper {
  position: relative;
}
.input-icon-btn {
  position: absolute;
  right: 0;
  top: 0;
  height: var(--tap-min);
  width: 48px;
  border: none;
  background: transparent;
  color: var(--color-text-sec);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.form-hint {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  margin-top: 4px;
}
.form-hint.success { color: var(--color-success); }
.form-hint.error   { color: var(--color-error); }

/* ─── FORM ROW (two columns side-by-side) ───────────────────────────────── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
}
.form-row .form-group {
  margin-bottom: 0;
}

/* ─── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-xs);
  height: var(--tap-min);
  padding: 0 var(--space-lg);
  border-radius: var(--radius-sm);
  border: none;
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, opacity .15s, box-shadow .15s;
  text-decoration: none;
  white-space: nowrap;
  -webkit-appearance: none;
}
.btn:disabled {
  opacity: .45;
  cursor: not-allowed;
}
.btn--full { width: 100%; }

.btn--primary {
  background: var(--color-primary);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn--primary:hover:not(:disabled) { background: var(--color-primary-dk); }

.btn--secondary {
  background: var(--color-surface);
  color: var(--color-primary);
  border: 1.5px solid var(--color-primary);
}
.btn--secondary:hover:not(:disabled) { background: var(--blue-50); }

.btn--danger {
  background: var(--color-error);
  color: #fff;
}
.btn--danger:hover:not(:disabled) { background: #b71c1c; }

.btn--ghost {
  background: transparent;
  color: var(--color-primary);
}
.btn--ghost:hover:not(:disabled) { background: var(--blue-50); }

.btn--sm {
  height: 36px;
  padding: 0 var(--space-md);
  font-size: var(--text-sm);
}

/* ─── BADGES ─────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge--super-admin { background: #ede7f6; color: var(--badge-super); }
.badge--admin       { background: var(--blue-50); color: var(--badge-admin); }
.badge--teacher     { background: #e8f5e9; color: var(--badge-teacher); }
.badge--active      { background: #e8f5e9; color: #1b5e20; }
.badge--on-leave    { background: #fff3e0; color: #e65100; }
.badge--resigned    { background: #ffebee; color: #c62828; }

/* ─── ALERTS / TOAST ─────────────────────────────────────────────────────── */
.alert {
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
}
.alert--error   { background: var(--color-error-bg);   color: var(--color-error);   border-left: 3px solid var(--color-error); }
.alert--success { background: var(--color-success-bg); color: var(--color-success); border-left: 3px solid var(--color-success); }
.alert--warning { background: var(--color-warning-bg); color: var(--color-warning); border-left: 3px solid var(--color-warning); }
.alert--info    { background: var(--blue-50);          color: var(--blue-800);      border-left: 3px solid var(--blue-800); }

/* Toast (bottom of screen) */
.toast-container {
  position: fixed;
  bottom: var(--space-lg);
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
  pointer-events: none;
}
.toast {
  background: var(--grey-900);
  color: #fff;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: 500;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transition: opacity .25s, transform .25s;
  transform: translateY(8px);
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.toast--show {
  opacity: 1;
  transform: translateY(0);
}
.toast.toast--success { background: var(--color-success); }
.toast.toast--error   { background: var(--color-error); }

/* ─── LOADING STATES ─────────────────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 3px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.spinner--blue {
  border-color: rgba(21,101,192,.25);
  border-top-color: var(--color-primary);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,.75);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  z-index: 9000;
}
.loading-overlay p {
  color: var(--color-primary);
  font-weight: 600;
  font-size: var(--text-sm);
}

.btn-loading .btn-text { display: none; }
.btn-loading .spinner  { display: inline-block; }
.btn .spinner          { display: none; }

/* ─── LIST ROWS ──────────────────────────────────────────────────────────── */
.list-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface);
  cursor: pointer;
  transition: background .1s;
  min-height: var(--tap-min);
}
.list-row:last-child { border-bottom: none; }
.list-row:hover      { background: var(--grey-50); }
.list-row:active     { background: var(--grey-100); }

/* Non-interactive list row — no hover/pointer, used for data display */
.list-row--no-action {
  cursor: default;
}
.list-row--no-action:hover  { background: var(--color-surface); }
.list-row--no-action:active { background: var(--color-surface); }

.list-row__avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--blue-50);
  color: var(--color-primary);
  font-weight: 700;
  font-size: var(--text-base);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.list-row__info { flex: 1; overflow: hidden; }
.list-row__name {
  font-weight: 600;
  font-size: var(--text-base);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-row__sub {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.list-row__chevron {
  color: var(--grey-500);
  font-size: 18px;
  flex-shrink: 0;
}

/* ─── EMPTY STATE ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: var(--space-xl) var(--space-md);
  color: var(--color-text-sec);
}
.empty-state__icon { font-size: 48px; margin-bottom: var(--space-md); }
.empty-state h3 { font-size: var(--text-lg); margin-bottom: var(--space-xs); color: var(--color-text); }
.empty-state p  { font-size: var(--text-sm); }

/* ─── MODAL / DIALOG ─────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 8000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.modal--centered { align-items: center; }
.modal-sheet {
  background: var(--color-surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: var(--space-lg) var(--space-md) var(--space-xl);
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-backdrop.modal--centered .modal-sheet {
  border-radius: var(--radius-lg);
  margin: var(--space-md);
  max-height: 90vh;
}
.modal-title {
  font-size: var(--text-xl);
  font-weight: 700;
  margin-bottom: var(--space-md);
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--grey-300);
  border-radius: var(--radius-full);
  margin: 0 auto var(--space-lg);
}

/* ─── LOGIN SCREEN ───────────────────────────────────────────────────────── */
.login-screen {
  min-height: 100vh;
  background: var(--color-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg) var(--space-md);
}
.login-logo {
  text-align: center;
  color: #fff;
  margin-bottom: var(--space-xl);
}
.login-logo__icon {
  font-size: 56px;
  display: block;
  margin-bottom: var(--space-sm);
}
.login-logo h1 {
  font-size: var(--text-xl);
  font-weight: 700;
  line-height: 1.2;
}
.login-logo p {
  font-size: var(--text-sm);
  opacity: .8;
  margin-top: var(--space-xs);
}
.login-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-md);
}
.login-card h2 {
  font-size: var(--text-xl);
  font-weight: 700;
  margin-bottom: var(--space-lg);
  color: var(--color-text);
}

/* ─── ADMIN HOME TILES ───────────────────────────────────────────────────── */
.nav-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  padding: var(--space-md);
}
.nav-tile {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: var(--space-xs);
  cursor: pointer;
  border: none;
  text-align: left;
  transition: box-shadow .15s, transform .1s;
  min-height: 90px;
}
.nav-tile:hover  { box-shadow: var(--shadow-md); }
.nav-tile:active { transform: scale(.97); }
.nav-tile__icon  { font-size: 28px; }
.nav-tile__label { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.nav-tile__sub   { font-size: var(--text-xs); color: var(--color-text-sec); }

/* Disabled tile — greyed out, non-interactive */
.nav-tile--disabled {
  opacity: .5;
  cursor: default;
  pointer-events: none;
}
.nav-tile--disabled:hover  { box-shadow: var(--shadow-sm); }
.nav-tile--disabled:active { transform: none; }

/* ─── PROFILE MENU (dropdown) ────────────────────────────────────────────── */
.profile-menu {
  position: absolute;
  top: calc(var(--bar-height) - 4px);
  right: var(--space-md);
  z-index: 200;
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  min-width: 200px;
  overflow: hidden;
}
.profile-menu__header {
  padding: var(--space-md);
  border-bottom: 1px solid var(--color-border);
}
.profile-menu__name { font-weight: 700; font-size: var(--text-base); }
.profile-menu__role { font-size: var(--text-xs); color: var(--color-text-sec); }
.profile-menu__item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  min-height: var(--tap-min);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
}
.profile-menu__item:hover { background: var(--grey-50); }
.profile-menu__item--danger { color: var(--color-error); }

/* ─── SEARCH BAR ─────────────────────────────────────────────────────────── */
.search-bar {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
}
.search-bar input {
  flex: 1;
  height: 40px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: 0 var(--space-md);
  font-size: var(--text-sm);
}
.search-bar input:focus {
  outline: none;
  border-color: var(--color-primary);
}

/* ─── FAB (Floating Action Button) ──────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: var(--space-xl);
  right: var(--space-md);
  z-index: 500;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-accent);
  color: var(--grey-900);
  font-size: 28px;
  border: none;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .15s, transform .1s;
}
.fab:hover  { box-shadow: 0 6px 16px rgba(0,0,0,.2); }
.fab:active { transform: scale(.93); }

/* ─── SECTION HEADER ─────────────────────────────────────────────────────── */
.section-header {
  padding: var(--space-sm) var(--space-md);
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  background: var(--grey-100);
}

/* Inline section header — used inside cards, no background */
.section-header-inline {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: var(--space-sm);
}

/* ─── DIVIDER ────────────────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--color-border);
  margin: var(--space-md) 0;
}

/* ─── DANGER ZONE ────────────────────────────────────────────────────────── */
.danger-zone {
  border: 1.5px solid var(--color-error);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-top: var(--space-lg);
}
