}

/**
 * Toggle the student list on the FM Class Overview screen.
 *
 * The list body (#student-list-body) is hidden by default so it doesn't
 * dominate the screen. Tapping the section-card header calls this function.
 *
 * The chevron (#student-list-chevron) has the CSS class "is-open" added
 * when the list is visible — the stylesheet rotates it 90° so it points
 * downward when expanded and rightward when collapsed.
 *
 * HOW TO MODIFY: If you want the list to default to open, change
 * the initial style="display:none" in initFmClassOverview to style="display:block"
 * and call chevron.classList.add('is-open') after the DOM is built.
 */
function toggleStudentList() {
  var body    = document.getElementById('student-list-body');
  var chevron = document.getElementById('student-list-chevron');
  if (!body) return;

  var isCurrentlyOpen = body.style.display !== 'none';

  // Flip visibility
  body.style.display = isCurrentlyOpen ? 'none' : '';

  // Rotate chevron to match new state
  if (chevron) {
    if (isCurrentlyOpen) {
      chevron.classList.remove('is-open'); // collapses → points right ›
    } else {
      chevron.classList.add('is-open');    // expands → points down ↓
    }
  }
}

// ─── COMPONENT SELECTOR ────────────────────────────────────────────────────
// Shows 6 component tiles (C/W, ASS, ATT, Test1, Test2, Exam).
// Each tile shows entered/total count and a progress bar.
// Locked tiles (e.g. Exam until Test1+Test2 done) are greyed and non-clickable.

Views.componentSelector = function (params) {
  const subjectName = (params && params.subjectName) || 'Subject';
  const className   = (params && params.className)   || '';
  const html =
    appBarHtml(subjectName, className, true, 'back') +
    '<div class="view-body" id="compselector-body">' +
    '  <div class="loading-placeholder">Loading component progress…</div>' +
    '</div>';
  return html;
};

function initComponentSelector(params) {
  const classId     = params && params.classId;
  const subjectId   = params && params.subjectId;
  const className   = (params && params.className)   || '';
  const subjectName = (params && params.subjectName) || '';
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('compselector-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      // Server returns { statuses: [...] } — each item uses "entered" and "total"
      const statuses = (result.data && result.data.statuses) || [];

      // DISPLAY_LABEL is the global COMPONENT_DISPLAY_LABEL constant defined above Views.

      // ── Component groupings ─────────────────────────────────────────────────
      // Each group is rendered as its own section with a heading above the grid.
      // The order of keys inside each group matches COMPONENT_ORDER on the server.
      var GROUPS = [
        { title: 'Class Performance',     keys: ['C/W', 'ASS', 'ATT'] },
        { title: 'Continuous Assessment', keys: ['Test1', 'Test2']    },
        { title: 'Overall Evaluation',    keys: ['Exam']              }
      ];

      // Build a quick lookup: component key → status object
      var byKey = {};
      statuses.forEach(function (s) { byKey[s.component] = s; });

      // ── Build tile HTML helper ──────────────────────────────────────────────
      function buildTile(comp) {
        var isLocked   = !!comp.locked;
        var isComplete = !isLocked && comp.total > 0 && comp.entered >= comp.total;

        var tileClass = 'component-tile';
        if (isLocked)   tileClass += ' component-tile--locked';
        if (isComplete) tileClass += ' component-tile--complete';

        var pct = comp.total > 0
          ? Math.round((comp.entered / comp.total) * 100) : 0;

        var clickAttr = isLocked ? '' :
          'onclick="navigateTo(\'scoreEntry\',{classId:\'' + classId +
          '\',className:\'' + escHtml(className) +
          '\',subjectId:\'' + subjectId +
          '\',subjectName:\'' + escHtml(subjectName) +
          '\',component:\'' + comp.component + '\'})"';

        var displayName = COMPONENT_DISPLAY_LABEL[comp.component] || comp.component;

        return '<div class="' + tileClass + '" ' + clickAttr + '>' +
          // Name at the top of the tile
          '<span class="component-tile__name">' + escHtml(displayName) + '</span>' +
          // Spacer always comes right after name — pushes content to the bottom
          '<div class="component-tile__spacer"></div>' +
          // Lock reason sits at the bottom on locked tiles (bar + count hidden via CSS)
          (isLocked
            ? '<span class="component-tile__lock-reason">🔒 ' +
              escHtml(comp.lockReason || 'Locked') + '</span>'
            : '') +
          // Count and progress bar at the bottom
          '<span class="component-tile__count">' +
          comp.entered + ' / ' + comp.total + '</span>' +
          '<div class="component-tile__bar">' +
          '<div class="component-tile__bar-fill" style="width:' + pct + '%"></div>' +
          '</div>' +
          '</div>';
      }

      // ── Render all groups ───────────────────────────────────────────────────
      var html = '<div style="padding-top:var(--space-md)">';
      GROUPS.forEach(function (group) {
        html += '<div class="component-section">';
        html += '<div class="component-section__title">' + group.title + '</div>';
        html += '<div class="component-grid">';
        group.keys.forEach(function (key) {
          if (byKey[key]) html += buildTile(byKey[key]);
        });
        html += '</div>'; // end .component-grid
        html += '</div>'; // end .component-section
      });
      html += '</div>'; // end outer wrapper

      document.getElementById('compselector-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('compselector-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetComponentStatuses(App.token, classId, subjectId);
}


// ─── SCORE ENTRY ───────────────────────────────────────────────────────────
// Full student roster for one component. Active students get a number input;
// excluded students (Not Continuing / Exam Exempt) are shown greyed with a
// label instead of an input. Sticky "Save All Scores" footer at bottom.

Views.scoreEntry = function (params) {
  const component    = (params && params.component)   || '';
  const subjectName  = (params && params.subjectName) || '';
  const className    = (params && params.className)   || '';
  // Show the friendly label (e.g. "Class Work") rather than the raw key ("C/W")
  const displayLabel = COMPONENT_DISPLAY_LABEL[component] || component;
  // Subtitle shows "ClassName · SubjectName" so teachers always know which
  // class they are scoring — e.g. "JSS 3 · Digital Technologies"
  const subtitle     = className ? className + ' · ' + subjectName : subjectName;
  const html =
    appBarHtml(displayLabel, subtitle, true, 'back') +
    '<div class="view-body" id="score-entry-body">' +
    '  <div class="loading-placeholder">Loading score sheet…</div>' +
    '</div>';
  return html;
};

function initScoreEntry(params) {
  const classId     = params && params.classId;
  const subjectId   = params && params.subjectId;
  const component   = params && params.component;
  const subjectName = (params && params.subjectName) || '';
  const className   = (params && params.className)   || '';

  // Store params so saveAllScores can read them
  App._scoreData  = null;
  App.viewParams  = params;

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('score-entry-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const data     = result.data || {};
      // Server returns { roster: [...], max: N } — not "students" / "maxScore"
      const students = data.roster   || [];
      const maxScore = (data.max  != null) ? data.max  : '';

      // Cache for saveAllScores — include maxScore so the save function can
      // validate against the limit without re-reading the DOM.
      App._scoreData = {
        classId:   classId,
        subjectId: subjectId,
        component: component,
        maxScore:  maxScore !== '' ? Number(maxScore) : null
      };

      let html = '';

      // Sticky banner — stays visible below the app bar while teacher scrolls.
      // Shows the max allowed score so they know the range at all times.
      if (maxScore !== '') {
        html +=
          '<div class="score-max-banner">' +
          'Maximum score: <strong>' + maxScore + '</strong>' +
          '</div>';
      }

      html += '<ul class="score-list" id="score-list">';
      students.forEach(function (s) {
        // Students marked Not Continuing or Exam Exempt get a greyed read-only row
        const isExcluded =
          s.termStatus === 'Not Continuing' ||
          s.termStatus === 'Exam Exempt';
        const rowClass   = isExcluded ? 'score-row score-row--excluded' : 'score-row';
        const currentVal = (s.score != null && s.score !== '') ? s.score : '';

        html +=
          '<li class="' + rowClass + '" data-student-id="' + s.studentId + '">' +
          '<span class="score-row__name">' + escHtml(s.name) + '</span>';

        if (isExcluded) {
          html +=
            '<span class="score-row__excluded-label">' +
            escHtml(s.termStatus || 'Excluded') + '</span>';
        } else {
          // data-max lets the inline oninput handler know the allowed maximum.
          // oninput="validateScoreInput(this)" turns the input red immediately
          // when the entered value exceeds the limit.
          html +=
            '<input class="score-input" type="number" min="0" ' +
            (maxScore !== '' ? 'max="' + maxScore + '" data-max="' + maxScore + '" ' : '') +
            'oninput="validateScoreInput(this)" ' +
            'placeholder="–" value="' + currentVal + '">';
        }

        html += '</li>';
      });
      html += '</ul>';

      // Sticky save footer
      html +=
        '<div class="sticky-footer">' +
        '<button class="btn btn--primary btn--full" id="save-scores-btn" ' +
        'onclick="saveAllScores()">Save All Scores</button>' +
        '</div>';

      document.getElementById('score-entry-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('score-entry-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetScoresForComponent(App.token, classId, subjectId, component);
}

// Reads all score inputs, validates them, and sends to serverSaveScores.
// After a successful save navigates back to the component selector so the
// user can see the updated progress tiles.
function saveAllScores() {
  if (!App._scoreData) return;
  const classId   = App._scoreData.classId;
  const subjectId = App._scoreData.subjectId;
  const component = App._scoreData.component;

  // Read the allowed maximum from the cached score data (set during load).
  // null means no maximum defined (shouldn't happen in practice).
  const maxAllowed = (App._scoreData && App._scoreData.maxScore != null)
    ? App._scoreData.maxScore
    : Infinity;

  const rows    = document.querySelectorAll('#score-list .score-row');
  const payload = [];
  let hasError  = false;

  rows.forEach(function (row) {
    const studentId = row.getAttribute('data-student-id');
    const input     = row.querySelector('.score-input');
    if (!input) return; // excluded row — skip

    const val = input.value.trim();
    if (val === '') {
      // Empty = no score entered yet; send null to clear
      input.classList.remove('score-input--error');
      payload.push({ studentId: studentId, score: null });
    } else {
      const num = parseFloat(val);
      // Invalid if not a number, negative, or above the allowed maximum
      if (isNaN(num) || num < 0 || num > maxAllowed) {
        input.classList.add('score-input--error');
        hasError = true;
      } else {
        input.classList.remove('score-input--error');
        payload.push({ studentId: studentId, score: num });
      }
    }
  });

  if (hasError) {
    // Friendly message — doesn't expose student IDs; red inputs already
    // pinpoint the exact rows that need fixing.
    showToast(
      'One or more scores exceed the maximum of ' + maxAllowed +
      '. Please correct the highlighted fields.',
      'error'
    );
    return;
  }

  setButtonLoading('save-scores-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('save-scores-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Save failed.', 'error'); return; }
      showToast('Scores saved successfully.', 'success');
      // Go back to component selector so progress tiles refresh
      navigateBack();
    })
    .withFailureHandler(function () {
      setButtonLoading('save-scores-btn', false);
      showToast('Connection error. Scores not saved.', 'error');
    })
    .serverSaveScores(App.token, classId, subjectId, component, payload);
}

/**
 * Real-time score input validator — called via oninput on each score field.
 *
 * Reads the allowed maximum from the input's data-max attribute and
 * immediately adds/removes the score-input--error class so the teacher
 * sees red highlighting as soon as they type an out-of-range value.
 *
 * HOW IT WORKS:
 *   <input data-max="6" oninput="validateScoreInput(this)" ...>
 *   → If value > 6, adds "score-input--error" (red border + tint)
 *   → If value ≤ 6 (or empty), removes that class
 */
function validateScoreInput(input) {
  var max = parseFloat(input.getAttribute('data-max'));
  var val = parseFloat(input.value);
  // Only flag as error when the field has a value AND it's above the limit
  if (!isNaN(val) && !isNaN(max) && val > max) {
    input.classList.add('score-input--error');
  } else {
    input.classList.remove('score-input--error');
  }
}

// ─── PSQ ENTRY ─────────────────────────────────────────────────────────────
// One student at a time. Each trait has 5 rating buttons (1–5).
// Clicking a selected button deselects it (rating = 0 / not rated).
// Save & Next persists via serverSavePSQ then advances to the next student.
// Prev goes back in-memory only (ratings already saved are reloaded from cache).

Views.psqEntry = function (params) {
  const className = (params && params.className) || 'Class';
  const html =
    appBarHtml('PSQ Ratings', className, true, 'back') +
    '<div class="view-body" id="psq-entry-body">' +
    '  <div class="loading-placeholder">Loading PSQ data…</div>' +
    '</div>';
  return html;
};

function initPsqEntry(params) {
  const classId = params && params.classId;
  App._psqData         = null;
  App._currentPsqIndex = 0;
  App.viewParams       = params;

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('psq-entry-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      App._psqData           = result.data || {};
      App._psqData.students  = App._psqData.students  || [];
      App._psqData.traitKeys = App._psqData.traitKeys || [];

      if (App._psqData.students.length === 0) {
        document.getElementById('psq-entry-body').innerHTML =
          '<p class="empty-msg">No students found for PSQ entry.</p>';
        return;
      }
      renderPsqStudent();
    })
    .withFailureHandler(function () {
      document.getElementById('psq-entry-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassPSQ(App.token, classId);
}

// Renders the card for App._currentPsqIndex student into #psq-entry-body.
function renderPsqStudent() {
  const data    = App._psqData;
  const idx     = App._currentPsqIndex;
  const total   = data.students.length;
  const student = data.students[idx];
  const traits  = data.traitKeys; // [{ key: 'attendance', label: 'Attendance' }, …]

  let html = '';
  // ── Tappable sticky progress header ────────────────────────────────────────
  // Tapping this bar opens the student jump list drawer (openPsqJumpList).
  // The chevron (▾) signals it is interactive.
  html +=
    '<div class="psq-progress" onclick="openPsqJumpList()" role="button" ' +
    'aria-label="Open student list">' +
    '<span class="psq-progress__text">Student ' + (idx + 1) + ' of ' + total +
    ': <strong>' + escHtml(student.name) + '</strong></span>' +
    '<span class="psq-progress__chevron">▾</span>' +
    '</div>';

  // Trait rating card
  html += '<div class="psq-student-card">';
  traits.forEach(function (trait) {
    const savedRating = (student.ratings && student.ratings[trait.key]) || 0;
    html += '<div class="psq-trait-row">';
    html +=
      '<span class="psq-trait-row__label">' + escHtml(trait.label) + '</span>';
    html += '<div class="psq-rating" data-trait="' + trait.key + '">';
    // Render 5 rating buttons
    for (var r = 1; r <= 5; r++) {
      const sel = (savedRating === r) ? ' psq-rating__btn--selected' : '';
      html +=
        '<button class="psq-rating__btn' + sel + '" ' +
        'onclick="selectPsqRating(this,' + r + ',\'' + trait.key + '\')">' +
        r + '</button>';
    }
    html += '</div>'; // .psq-rating
    html += '</div>'; // .psq-trait-row
  });
  html += '</div>'; // .psq-student-card

  // Navigation footer: Prev (if not first) + Save & Next / Save & Finish
  html += '<div class="psq-navigator">';
  if (idx > 0) {
    html += '<button class="btn btn--outline" onclick="psqGoToPrev()">← Previous</button>';
  } else {
    html += '<span></span>'; // spacer keeps the flex layout balanced
  }
  const isLast = (idx === total - 1);
  html +=
    '<button class="btn btn--primary" id="psq-save-btn" ' +
    'onclick="savePsqAndAdvance(' + isLast + ')">' +
    (isLast ? 'Save & Finish' : 'Save & Next →') +
    '</button>';
  html += '</div>'; // .psq-navigator

  document.getElementById('psq-entry-body').innerHTML = html;
}

// Toggles a rating button. Clicking the already-selected button deselects it.
function selectPsqRating(btn, rating, traitKey) {
  const ratingDiv  = btn.parentElement;
  const allBtns    = ratingDiv.querySelectorAll('.psq-rating__btn');
  const wasSelected = btn.classList.contains('psq-rating__btn--selected');
  allBtns.forEach(function (b) { b.classList.remove('psq-rating__btn--selected'); });
  if (!wasSelected) {
    btn.classList.add('psq-rating__btn--selected');
  }
}

// Collects DOM ratings, updates local cache, then calls serverSavePSQ.
// On success: advances to next student or navigates back if last.
function savePsqAndAdvance(isLast) {
  const data    = App._psqData;
  const idx     = App._currentPsqIndex;
  const student = data.students[idx];
  const classId = App.viewParams && App.viewParams.classId;

  // Collect current ratings from DOM
  const ratings    = {};
  const traitDivs  = document.querySelectorAll('.psq-rating');
  traitDivs.forEach(function (div) {
    const traitKey = div.getAttribute('data-trait');
    const selBtn   = div.querySelector('.psq-rating__btn--selected');
    // 0 means "not rated"; server should treat 0 as clear/skip
    ratings[traitKey] = selBtn ? parseInt(selBtn.textContent, 10) : 0;
  });

  // Update local cache so Prev can restore the state
  student.ratings = ratings;

  setButtonLoading('psq-save-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('psq-save-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Save failed.', 'error'); return; }
      if (isLast) {
        showToast('PSQ ratings saved for all students.', 'success');
        navigateBack();
      } else {
        App._currentPsqIndex++;
        renderPsqStudent();
      }
    })
    .withFailureHandler(function () {
      setButtonLoading('psq-save-btn', false);
      showToast('Connection error. Ratings not saved.', 'error');
    })
    .serverSavePSQ(App.token, classId, student.studentId, ratings);
}

// Goes back to the previous student without saving (ratings already saved).
function psqGoToPrev() {
  if (App._currentPsqIndex > 0) {
    App._currentPsqIndex--;
    renderPsqStudent();
  }
}

// ─── PSQ JUMP LIST DRAWER ──────────────────────────────────────────────────
//
// Three functions work together:
//   openPsqJumpList()     — builds and appends the slide-up bottom sheet
//   closePsqJumpList()    — removes the sheet from the DOM
//   jumpToPsqStudent(idx) — closes the sheet and jumps to the chosen student
//
// The sheet lists every student with:
//   • a numbered circle (highlighted blue for the current student)
//   • a green ✓ badge if ALL traits for that student have been rated
// ────────────────────────────────────────────────────────────────────────────

function openPsqJumpList() {
  const data = App._psqData;
  if (!data || !data.students) return;

  const totalTraits = (data.traitKeys || []).length;

  // Build one button row per student
  let listHtml = '';
  data.students.forEach(function (s, i) {
    const isActive = (i === App._currentPsqIndex);

    // Count how many traits have a saved rating > 0 for this student
    const ratedCount = (data.traitKeys || []).filter(function (t) {
      return s.ratings && s.ratings[t.key] > 0;
    }).length;
    const isFullyRated = (totalTraits > 0 && ratedCount === totalTraits);

    listHtml +=
      '<button class="psq-jump-item' + (isActive ? ' psq-jump-item--active' : '') + '" ' +
      'onclick="jumpToPsqStudent(' + i + ')">' +
      '<span class="psq-jump-item__num">' + (i + 1) + '</span>' +
      '<span class="psq-jump-item__name">' + escHtml(s.name || s.fullName || '—') + '</span>' +
      (isFullyRated ? '<span class="psq-jump-item__done">✓ Done</span>' : '') +
      '</button>';
  });

  // Assemble overlay + sheet
  const modal = document.createElement('div');
  modal.id = 'psq-jump-modal';
  modal.innerHTML =
    // Semi-transparent backdrop — tapping it closes the sheet
    '<div class="psq-jump-overlay" onclick="closePsqJumpList()"></div>' +
    '<div class="psq-jump-sheet">' +
      '<div class="psq-jump-sheet__header">' +
        '<span class="psq-jump-sheet__title">Select Student</span>' +
        '<button class="psq-jump-sheet__close" onclick="closePsqJumpList()">✕</button>' +
      '</div>' +
      '<div class="psq-jump-sheet__list" id="psq-jump-list">' +
        listHtml +
      '</div>' +
    '</div>';

  document.body.appendChild(modal);

  // Scroll the currently active student into the middle of the visible list
  setTimeout(function () {
    const activeItem = document.querySelector('.psq-jump-item--active');
    if (activeItem) activeItem.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 60);
}

function closePsqJumpList() {
  const modal = document.getElementById('psq-jump-modal');
  if (modal) modal.parentNode.removeChild(modal);
}

function jumpToPsqStudent(idx) {
  // Close the drawer first, then re-render with the chosen student
  closePsqJumpList();
  App._currentPsqIndex = idx;
  renderPsqStudent();
}

// ─── REMARKS ENTRY ─────────────────────────────────────────────────────────
// Shows all students at once with a textarea each.
// Sticky "Save All Remarks" button at the bottom saves the full class in one call.

Views.remarksEntry = function (params) {
  const className = (params && params.className) || 'Class';
  const html =
    appBarHtml('Remarks', className, true, 'back') +
    '<div class="view-body" id="remarks-entry-body">' +
    '  <div class="loading-placeholder">Loading remarks…</div>' +
    '</div>';
  return html;
};

function initRemarksEntry(params) {
  const classId = params && params.classId;
  App._remarksData = null;
  App.viewParams   = params;

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('remarks-entry-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const data     = result.data || {};
      const students = data.students || [];
      App._remarksData = { classId: classId, students: students };

      let html = '';
      if (students.length === 0) {
        html = '<p class="empty-msg">No students found for this class.</p>';
      } else {
        html += '<ul class="remark-list" id="remark-list">';
        students.forEach(function (s) {
          // Pre-fill textarea with existing remark (HTML-escaped)
          html +=
            '<li class="remark-row" data-student-id="' + s.studentId + '">' +
            '<span class="remark-row__name">' + escHtml(s.name) + '</span>' +
            '<textarea class="remark-input" rows="2" placeholder="Enter remark…">' +
            escHtml(s.remark || '') +
            '</textarea>' +
            '</li>';
        });
        html += '</ul>';
        html +=
          '<div class="sticky-footer">' +
          '<button class="btn btn--primary btn--full" id="save-remarks-btn" ' +
          'onclick="saveAllRemarks()">Save All Remarks</button>' +
          '</div>';
      }
      document.getElementById('remarks-entry-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('remarks-entry-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassRemarks(App.token, classId);
}

// Collects all textarea values and saves them in a single batch call.
function saveAllRemarks() {
  const classId = App._remarksData && App._remarksData.classId;
  const rows    = document.querySelectorAll('#remark-list .remark-row');
  const payload = [];
  rows.forEach(function (row) {
    const studentId = row.getAttribute('data-student-id');
    const textarea  = row.querySelector('.remark-input');
    payload.push({ studentId: studentId, remark: textarea ? textarea.value : '' });
  });

  setButtonLoading('save-remarks-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('save-remarks-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Save failed.', 'error'); return; }
      showToast('Remarks saved successfully.', 'success');
    })
    .withFailureHandler(function () {
      setButtonLoading('save-remarks-btn', false);
      showToast('Connection error. Remarks not saved.', 'error');
    })
    .serverSaveRemarks(App.token, classId, payload);
}

// ─── MANAGE CLASS LIST ─────────────────────────────────────────────────────
// Shows every student with three status chips (Active / Exam Exempt / Not Continuing).
// The current status chip is highlighted and disabled; clicking another chip
// calls serverSetStudentStatus immediately and then re-renders the page.

Views.manageClassList = function (params) {
  const className = (params && params.className) || 'Class';
  const html =
    appBarHtml('Manage Class List', className, true, 'back') +
    '<div class="view-body" id="class-list-body">' +
    '  <div class="loading-placeholder">Loading student list…</div>' +
    '</div>';
  return html;
};

function initManageClassList(params) {
  const classId  = params && params.classId;
  App.viewParams = params; // cache for updateStudentStatus to re-call this

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('class-list-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const data     = result.data || {};
      const students = data.students || [];

      let html = '<div style="padding-top:var(--space-md)">';

      if (students.length === 0) {
        html += '<p class="empty-msg">No students found.</p>';
      } else {
        // ── Instruction banner ───────────────────────────────────────────────
        // Explains the tap-to-change interaction before the list starts.
        html +=
          '<div class="manage-hint">' +
          '<span class="manage-hint__icon">ℹ</span>' +
          '<span class="manage-hint__text">Tap a status chip below to update a ' +
          'student\'s term status immediately.</span>' +
          '</div>';

        // ── Student list in a section-card ───────────────────────────────────
        html += '<div class="section-card">';
        html +=
          '<div class="section-card__header">' +
          '<span class="section-card__title">STUDENTS — ' + students.length + '</span>' +
          '</div>';

        html += '<ul class="status-list" id="status-list">';
        students.forEach(function (s) {
          const current = s.termStatus || 'Active';
          // Use fullName (toCamelCase of "Full Name" column) with fallback
          const displayName = s.fullName || s.name || '—';
          html +=
            '<li class="status-list__item" data-student-id="' + s.studentId + '">' +
            // Student name sits above the chips on its own line
            '<span class="status-list__name">' + escHtml(displayName) + '</span>' +
            // Three chips: Active / Exam Exempt / Not Continuing
            '<div class="status-chips">' +
            renderStatusChip(classId, s.studentId, 'Active',         current) +
            renderStatusChip(classId, s.studentId, 'Exam Exempt',    current) +
            renderStatusChip(classId, s.studentId, 'Not Continuing', current) +
            '</div>' +
            '</li>';
        });
        html += '</ul>';  // .status-list
        html += '</div>'; // .section-card
      }

      html += '</div>'; // padding-top wrapper
      document.getElementById('class-list-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('class-list-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassStudentStatus(App.token, classId);
}

// Builds a single status chip button.
// Selected chip is highlighted + disabled; unselected chip fires updateStudentStatus.
function renderStatusChip(classId, studentId, status, currentStatus) {
  const isSelected = (status === currentStatus);
  let chipClass = 'status-chip';
  if (isSelected) {
    if (status === 'Active')          chipClass += ' status-chip--active-sel';
    else if (status === 'Exam Exempt') chipClass += ' status-chip--exempt-sel';
    else                               chipClass += ' status-chip--nc-sel';
  }
  const clickHandler = isSelected
    ? '' // already selected — clicking does nothing
    : 'onclick="updateStudentStatus(\'' + classId +
      '\',\'' + studentId +
      '\',\'' + status + '\')"';
  return (
    '<button class="' + chipClass + '" ' + clickHandler +
    (isSelected ? ' disabled' : '') + '>' +
    escHtml(status) +
    '</button>'
  );
}

// Calls serverSetStudentStatus immediately; on success refreshes the whole list.
function updateStudentStatus(classId, studentId, newStatus) {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Update failed.', 'error'); return; }
      showToast('Status updated to "' + newStatus + '".', 'success');
      // Refresh the page so the chips reflect the new state
      initManageClassList(App.viewParams);
    })
    .withFailureHandler(function () {
      showToast('Connection error. Status not updated.', 'error');
    })
    .serverSetStudentStatus(App.token, classId, studentId, newStatus);
}
