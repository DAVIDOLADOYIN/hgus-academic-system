<style>
/* ═══════════════════════════════════════════════════════════════════════════
   HGUS Academic Result Management System — Base Styles
   Mobile-first. Designed for 360px–480px phones, scales to tablet/desktop.
   Stage 3 additions are at the bottom of this file.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ─── DESIGN TOKENS ─────────────────────────────────────────────────────── */
:root {
  /* Primary — deep blue */
  --blue-900:   #0d47a1;
  --blue-800:   #1565c0;
  --blue-700:   #1976d2;
  --blue-50:    #e3f2fd;

  /* Accent — amber */
  --amber-600:  #ffb300;
  --amber-700:  #ffa000;

  /* Neutrals */
  --grey-50:    #fafafa;
  --grey-100:   #f5f5f5;
  --grey-200:   #eeeeee;
  --grey-300:   #e0e0e0;
  --grey-500:   #9e9e9e;
  --grey-600:   #757575;
  --grey-700:   #616161;
  --grey-900:   #212121;

  /* Semantic */
  --color-primary:    var(--blue-800);
  --color-primary-dk: var(--blue-900);
  --color-accent:     var(--amber-600);
  --color-bg:         var(--grey-100);
  --color-surface:    #ffffff;
  --color-text:       var(--grey-900);
  --color-text-sec:   var(--grey-600);
  --color-border:     var(--grey-300);
  --color-error:      #c62828;
  --color-error-bg:   #ffebee;
  --color-success:    #2e7d32;
  --color-success-bg: #e8f5e9;
  --color-warning:    #e65100;
  --color-warning-bg: #fff3e0;

  /* Role badge colours */
  --badge-super: #4a148c;
  --badge-admin: #1565c0;
  --badge-teacher: #1b5e20;

  /* Spacing */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadow */
  /* Subtle shadows — kept intentionally light so cards don't feel heavy on mobile */
  --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 3px 6px rgba(0,0,0,.08), 0 3px 6px rgba(0,0,0,.05);
  --shadow-top: 0 -2px 8px rgba(0,0,0,.06);

  /* Typography */
  --font-body:  'Segoe UI', system-ui, -apple-system, sans-serif;
  --text-xs:    12px;
  --text-sm:    14px;
  --text-base:  16px;
  --text-lg:    18px;
  --text-xl:    20px;
  --text-2xl:   24px;

  /* Touch targets */
  --tap-min:    48px;

  /* App bar height */
  --bar-height: 56px;
}

/* ─── RESET ─────────────────────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── SCROLLING ──────────────────────────────────────────────────────────── */
.scroll-y {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ─── APP BAR ────────────────────────────────────────────────────────────── */
.app-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--bar-height);
  background: var(--color-primary);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 var(--space-md);
  gap: var(--space-sm);
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}

.app-bar__back {
  /* SVG chevron button — display:grid + place-items:center perfectly centers
     the SVG child element with no font-metric or line-height interference. */
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.55);
  background: rgba(255,255,255,.18);
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s;
}
.app-bar__back svg {
  /* Prevent the SVG from picking up any inherited font/line-height styles */
  display: block;
  flex-shrink: 0;
}
.app-bar__back:hover  { background: rgba(255,255,255,.30); }
.app-bar__back:active { background: rgba(255,255,255,.40); }

.app-bar__title {
  flex: 1;
  overflow: hidden;
}
.app-bar__title h1 {
  font-size: var(--text-lg);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.app-bar__title .subtitle {
  font-size: var(--text-xs);
  opacity: .85;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-bar__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: none;
  color: #fff;
  font-size: var(--text-sm);
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.app-bar__avatar:hover { background: rgba(255,255,255,.35); }

/* ─── SESSION BADGE (in app bar) ─────────────────────────────────────────── */
.session-badge {
  background: rgba(255,255,255,.18);
  border-radius: var(--radius-full);
  padding: 2px 10px;
  font-size: var(--text-xs);
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ─── PAGE CONTENT ───────────────────────────────────────────────────────── */
.page-content {
  flex: 1;
  padding: var(--space-md);
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}

.page-content--flush {
  padding: 0;
}

/* ─── CARDS ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card--pad {
  padding: var(--space-md);
}
.card + .card {
  margin-top: var(--space-md);
}

/* ─── FORM ELEMENTS ──────────────────────────────────────────────────────── */
.form-group {
  margin-bottom: var(--space-md);
}

.form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-sec);
  margin-bottom: var(--space-xs);
  text-transform: uppercase;
  letter-spacing: .04em;
}

.form-input,
.form-select,
.form-textarea {
  display: block;
  width: 100%;
  height: var(--tap-min);
  padding: 0 var(--space-md);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-surface);
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.form-textarea {
  height: auto;
  min-height: 80px;
  padding: var(--space-sm) var(--space-md);
  resize: vertical;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(21,101,192,.15);
}
.form-input.error,
.form-select.error {
  border-color: var(--color-error);
}
.form-input--icon {
  padding-right: 48px;
}

.input-wrapper {
  position: relative;
}
.input-icon-btn {
  position: absolute;
  right: 0;
  top: 0;
  height: var(--tap-min);
  width: 48px;
  border: none;
  background: transparent;
  color: var(--color-text-sec);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.form-hint {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  margin-top: 4px;
}
.form-hint.success { color: var(--color-success); }
.form-hint.error   { color: var(--color-error); }

/* ─── FORM ROW (two columns side-by-side) ───────────────────────────────── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
}
.form-row .form-group {
  margin-bottom: 0;
}

/* ─── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-xs);
  height: var(--tap-min);
  padding: 0 var(--space-lg);
  border-radius: var(--radius-sm);
  border: none;
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, opacity .15s, box-shadow .15s;
  text-decoration: none;
  white-space: nowrap;
  -webkit-appearance: none;
}
.btn:disabled {
  opacity: .45;
  cursor: not-allowed;
}
.btn--full { width: 100%; }

.btn--primary {
  background: var(--color-primary);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn--primary:hover:not(:disabled) { background: var(--color-primary-dk); }

.btn--secondary {
  background: var(--color-surface);
  color: var(--color-primary);
  border: 1.5px solid var(--color-primary);
}
.btn--secondary:hover:not(:disabled) { background: var(--blue-50); }

.btn--danger {
  background: var(--color-error);
  color: #fff;
}
.btn--danger:hover:not(:disabled) { background: #b71c1c; }

.btn--ghost {
  background: transparent;
  color: var(--color-primary);
}
.btn--ghost:hover:not(:disabled) { background: var(--blue-50); }

.btn--sm {
  height: 36px;
  padding: 0 var(--space-md);
  font-size: var(--text-sm);
}

/* ─── BADGES ─────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge--super-admin { background: #ede7f6; color: var(--badge-super); }
.badge--admin       { background: var(--blue-50); color: var(--badge-admin); }
.badge--teacher     { background: #e8f5e9; color: var(--badge-teacher); }
.badge--active      { background: #e8f5e9; color: #1b5e20; }
.badge--on-leave    { background: #fff3e0; color: #e65100; }
.badge--resigned    { background: #ffebee; color: #c62828; }
/* Student term-status badges used on the FM Class Overview student list */
.badge--exempt      { background: #fff3e0; color: #e65100; }  /* Exam Exempt */
.badge--nc          { background: #ffebee; color: #c62828; }  /* Not Continuing */

/* ─── ALERTS / TOAST ─────────────────────────────────────────────────────── */
.alert {
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
}
.alert--error   { background: var(--color-error-bg);   color: var(--color-error);   border-left: 3px solid var(--color-error); }
.alert--success { background: var(--color-success-bg); color: var(--color-success); border-left: 3px solid var(--color-success); }
.alert--warning { background: var(--color-warning-bg); color: var(--color-warning); border-left: 3px solid var(--color-warning); }
.alert--info    { background: var(--blue-50);          color: var(--blue-800);      border-left: 3px solid var(--blue-800); }

/* Toast (bottom of screen) */
.toast-container {
  position: fixed;
  bottom: var(--space-lg);
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
  pointer-events: none;
}
.toast {
  background: var(--grey-900);
  color: #fff;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: 500;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transition: opacity .25s, transform .25s;
  transform: translateY(8px);
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.toast--show {
  opacity: 1;
  transform: translateY(0);
}
.toast.toast--success { background: var(--color-success); }
.toast.toast--error   { background: var(--color-error); }

/* ─── LOADING STATES ─────────────────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 3px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.spinner--blue {
  border-color: rgba(21,101,192,.25);
  border-top-color: var(--color-primary);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,.75);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  z-index: 9000;
}
.loading-overlay p {
  color: var(--color-primary);
  font-weight: 600;
  font-size: var(--text-sm);
}

/* ─── INLINE LOADING PLACEHOLDER ────────────────────────────────────────────
   Used inside each view-body while server data is being fetched.
   Shows a spinner + message with consistent padding so text never sits
   flush against the screen edge or the app bar.
   The ::before pseudo-element reuses the existing @keyframes spin animation. */
.loading-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-xl) var(--space-md) var(--space-md);
  color: var(--color-text-sec);
  font-size: var(--text-sm);
}
.loading-placeholder::before {
  /* Spinner ring — reuses the global @keyframes spin defined above */
  content: '';
  display: block;
  width: 28px;
  height: 28px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.btn-loading .btn-text { display: none; }
.btn-loading .spinner  { display: inline-block; }
.btn .spinner          { display: none; }

/* ─── LIST ROWS ──────────────────────────────────────────────────────────── */
.list-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface);
  cursor: pointer;
  transition: background .1s;
  min-height: var(--tap-min);
}
.list-row:last-child { border-bottom: none; }
.list-row:hover      { background: var(--grey-50); }
.list-row:active     { background: var(--grey-100); }

/* Non-interactive list row — no hover/pointer, used for data display */
.list-row--no-action {
  cursor: default;
}
.list-row--no-action:hover  { background: var(--color-surface); }
.list-row--no-action:active { background: var(--color-surface); }

.list-row__avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--blue-50);
  color: var(--color-primary);
  font-weight: 700;
  font-size: var(--text-base);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.list-row__info { flex: 1; overflow: hidden; }
.list-row__name {
  font-weight: 600;
  font-size: var(--text-base);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-row__sub {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.list-row__chevron {
  color: var(--grey-500);
  font-size: 18px;
  flex-shrink: 0;
}

/* ─── EMPTY STATE ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: var(--space-xl) var(--space-md);
  color: var(--color-text-sec);
}
.empty-state__icon { font-size: 48px; margin-bottom: var(--space-md); }
.empty-state h3 { font-size: var(--text-lg); margin-bottom: var(--space-xs); color: var(--color-text); }
.empty-state p  { font-size: var(--text-sm); }

/* ─── MODAL / DIALOG ─────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 8000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.modal--centered { align-items: center; }
.modal-sheet {
  background: var(--color-surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: var(--space-lg) var(--space-md) var(--space-xl);
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-backdrop.modal--centered .modal-sheet {
  border-radius: var(--radius-lg);
  margin: var(--space-md);
  max-height: 90vh;
}
.modal-title {
  font-size: var(--text-xl);
  font-weight: 700;
  margin-bottom: var(--space-md);
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--grey-300);
  border-radius: var(--radius-full);
  margin: 0 auto var(--space-lg);
}

/* ─── LOGIN SCREEN ───────────────────────────────────────────────────────── */
.login-screen {
  min-height: 100vh;
  background: var(--color-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg) var(--space-md);
}
.login-logo {
  text-align: center;
  color: #fff;
  margin-bottom: var(--space-xl);
}
.login-logo__icon {
  font-size: 56px;
  display: block;
  margin-bottom: var(--space-sm);
}
.login-logo h1 {
  font-size: var(--text-xl);
  font-weight: 700;
  line-height: 1.2;
}
.login-logo p {
  font-size: var(--text-sm);
  opacity: .8;
  margin-top: var(--space-xs);
}
.login-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-md);
}
.login-card h2 {
  font-size: var(--text-xl);
  font-weight: 700;
  margin-bottom: var(--space-lg);
  color: var(--color-text);
}

/* ─── ADMIN HOME TILES ───────────────────────────────────────────────────── */
.nav-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  padding: var(--space-md);
}
.nav-tile {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: var(--space-xs);
  cursor: pointer;
  border: none;
  text-align: left;
  transition: box-shadow .15s, transform .1s;
  min-height: 90px;
}
.nav-tile:hover  { box-shadow: var(--shadow-md); }
.nav-tile:active { transform: scale(.97); }
.nav-tile__icon  { font-size: 28px; }
.nav-tile__label { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.nav-tile__sub   { font-size: var(--text-xs); color: var(--color-text-sec); }

/* Disabled tile — greyed out, non-interactive */
.nav-tile--disabled {
  opacity: .5;
  cursor: default;
  pointer-events: none;
}
.nav-tile--disabled:hover  { box-shadow: var(--shadow-sm); }
.nav-tile--disabled:active { transform: none; }

/* ─── PROFILE MENU (dropdown) ────────────────────────────────────────────── */
.profile-menu {
  position: absolute;
  top: calc(var(--bar-height) - 4px);
  right: var(--space-md);
  z-index: 200;
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  min-width: 200px;
  overflow: hidden;
}
.profile-menu__header {
  padding: var(--space-md);
  border-bottom: 1px solid var(--color-border);
}
.profile-menu__name { font-weight: 700; font-size: var(--text-base); }
.profile-menu__role { font-size: var(--text-xs); color: var(--color-text-sec); }
.profile-menu__item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  min-height: var(--tap-min);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
}
.profile-menu__item:hover { background: var(--grey-50); }
.profile-menu__item--danger { color: var(--color-error); }

/* ─── SEARCH BAR ─────────────────────────────────────────────────────────── */
.search-bar {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
}
.search-bar input {
  flex: 1;
  height: 40px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: 0 var(--space-md);
  font-size: var(--text-sm);
}
.search-bar input:focus {
  outline: none;
  border-color: var(--color-primary);
}

/* ─── FAB (Floating Action Button) ──────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: var(--space-xl);
  right: var(--space-md);
  z-index: 500;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-accent);
  color: var(--grey-900);
  font-size: 28px;
  border: none;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow .15s, transform .1s;
}
.fab:hover  { box-shadow: 0 6px 16px rgba(0,0,0,.2); }
.fab:active { transform: scale(.93); }

/* ─── SECTION HEADER ─────────────────────────────────────────────────────── */
/* Base section header — grey band used on admin list screens */
.section-header {
  padding: var(--space-sm) var(--space-md);
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  background: var(--grey-100);
}

/* Inline section header — used inside cards, no background */
.section-header-inline {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: var(--space-sm);
}

/* ─── DIVIDER ────────────────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--color-border);
  margin: var(--space-md) 0;
}

/* ─── DANGER ZONE ────────────────────────────────────────────────────────── */
.danger-zone {
  border: 1.5px solid var(--color-error);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-top: var(--space-lg);
}
.danger-zone h4 {
  color: var(--color-error);
  font-size: var(--text-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: var(--space-sm);
}

/* ─── TAB BAR ────────────────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: var(--bar-height);
  z-index: 50;
}

.tab-bar__tab {
  flex: 1;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-sec);
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-bar__tab:hover {
  color: var(--color-primary);
  background: var(--blue-50);
}
.tab-bar__tab--active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}

/* ─── SYNC ACTION ROWS ───────────────────────────────────────────────────── */
.sync-action {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) 0;
  border-bottom: 1px solid var(--color-border);
}
.sync-action:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.sync-action__text {
  flex: 1;
}
.sync-action__title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
}
.sync-action__desc {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  margin-top: 2px;
}

/* ─── ASSIGNMENT CARDS ───────────────────────────────────────────────────── */
.assign-card {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: var(--space-md);
}

.assign-card__class {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: var(--space-sm) var(--space-md);
  background: var(--blue-50);
  border-bottom: 1px solid var(--color-border);
}
.assign-card__class-name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-primary);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.assign-card__body {
  padding: var(--space-md);
}

/* ─── CHECKBOX LIST ─────────────────────────────────────────────────────── */
.check-list {
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  max-height: 240px;
  overflow-y: auto;
}
.check-list__item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--color-border);
  min-height: 44px;
  cursor: pointer;
  transition: background .1s;
}
.check-list__item:last-child { border-bottom: none; }
.check-list__item:hover { background: var(--grey-50); }
.check-list__item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--color-primary);
}
.check-list__item--all {
  background: var(--grey-100);
  border-bottom: 1.5px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: 1;
}
.check-list__item--all:hover { background: var(--grey-200); }
.check-list__empty {
  padding: var(--space-md);
  font-size: var(--text-sm);
  color: var(--color-text-sec);
  text-align: center;
}
.check-list__item--taken {
  opacity: .6;
  cursor: default;
}
.check-list__item--taken:hover { background: transparent; }
.check-list__taken-label {
  margin-left: auto;
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 45%;
  padding-left: var(--space-xs);
}

/* ─── UTILITY ────────────────────────────────────────────────────────────── */
.text-center { text-align: center; }
.text-sm     { font-size: var(--text-sm); }
.text-xs     { font-size: var(--text-xs); }
.text-muted  { color: var(--color-text-sec); }
.fw-bold     { font-weight: 700; }
.mt-sm       { margin-top: var(--space-sm); }
.mt-md       { margin-top: var(--space-md); }
.mt-lg       { margin-top: var(--space-lg); }
.mb-sm       { margin-bottom: var(--space-sm); }
.mb-md       { margin-bottom: var(--space-md); }
.mb-lg       { margin-bottom: var(--space-lg); }
.ml-xs       { margin-left: var(--space-xs); }
.gap-sm      { gap: var(--space-sm); }
.d-flex      { display: flex; }
.align-center{ align-items: center; }
.justify-between { justify-content: space-between; }
.flex-1      { flex: 1; }
.hidden      { display: none !important; }

/* ─── RESPONSIVE — wider screens ─────────────────────────────────────────── */
@media (min-width: 480px) {
  .login-screen { padding: var(--space-xl); }
  .nav-tiles    { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 768px) {
  .nav-tiles { grid-template-columns: repeat(3, 1fr); max-width: 600px; margin: 0 auto; }
}

/* ═══════════════════════════════════════════════════════════════════════════
   STAGE 3 — SCORE ENTRY STYLES
   All classes below are new for Stage 3. Stage 1 & 2 classes are unchanged.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ─── TEACHER HOME — SECTION HEADER (FM and TS sections) ────────────────── */
/*
 * The Teacher Home screen has two labelled sections:
 *   "My Form Class" (FM assignments) and "My Subject Assignments" (TS).
 * .home-section groups each section with a title and a list of cards below.
 */

/* ─── TEACHER HOME GREETING ──────────────────────────────────────────────────
   Displayed at the top of the Teacher Home screen above all assignment cards.
   Shows a time-based salutation ("Good morning,") above the teacher's first
   name in larger bold text. Sits inside .page-content so it gets its padding. */
.home-greeting {
  margin-bottom: var(--space-lg);
  padding-bottom: var(--space-md);
  border-bottom: 1px solid var(--color-border);
}
.home-greeting__salutation {
  font-size: var(--text-sm);
  color: var(--color-text-sec);
  margin-bottom: 2px;
}
.home-greeting__name {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--color-text);
}

.home-section {
  margin-bottom: var(--space-lg);
}
.home-section__title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  /* Float above cards — no background banner */
  padding: 0 2px var(--space-xs) 2px;
  margin-bottom: var(--space-xs);
}

/* ─── HOME ASSIGNMENT CARDS (Teacher Home) ───────────────────────────────── */
/*
 * One card per FM class or TS assignment on the Teacher Home screen.
 * Each card is a standalone rounded tile — cards are NOT fused together.
 * A small margin-bottom between cards creates breathing room.
 *
 * Section variants:
 *   .home-card--fm  → light-blue background + blue border  (Form Master)
 *   .home-card--ts  → light-green background + green border (Teacher-Subject)
 *
 * Text layout: two stacked lines, both the same font size (--text-sm).
 *   .home-card__name   → primary label (bold)
 *   .home-card__detail → secondary label (normal weight, muted)
 */

/* Base card — shared layout, sizing and interaction */
.home-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 14px var(--space-md);
  border-radius: var(--radius-md);
  border: 1.5px solid transparent;
  cursor: pointer;
  width: 100%;
  text-align: left;
  box-sizing: border-box;
  /* Gap between consecutive cards */
  margin-bottom: var(--space-sm);
  min-height: var(--tap-min);
  transition: opacity .15s, transform .1s;
}
.home-card:last-child { margin-bottom: 0; }
.home-card:active     { opacity: .75; transform: scale(.98); }

/* FM variant — blue palette */
.home-card--fm {
  background: var(--blue-50);     /* #e3f2fd */
  border-color: #90caf9;          /* blue-200 */
}
.home-card--fm:hover { background: #d6eafb; }

/* TS variant — green palette */
.home-card--ts {
  background: var(--color-success-bg);  /* #e8f5e9 */
  border-color: #a5d6a7;               /* green-200 */
}
.home-card--ts:hover { background: #d9edd9; }

/* Primary label — bold, --text-sm */
.home-card__name {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}

/* Secondary label — same size as name, muted colour */
.home-card__detail {
  font-size: var(--text-sm);
  font-weight: 400;
  color: var(--color-text-sec);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}

/* ─── COMPONENT SELECTOR — SECTIONS & TILES ──────────────────────────────── */
/*
 * Components are grouped into three named sections on the componentSelector
 * screen:
 *   1. Class Performance     — Class Work, Assignment, Attendance
 *   2. Continuous Assessment — CA Test 1, CA Test 2
 *   3. Overall Evaluation    — Examination
 *
 * .component-section        — padding wrapper for one group
 * .component-section__title — small-caps label above the grid
 * .component-grid           — 2-column grid (no outer padding; section handles it)
 * .component-tile           — individual score component card
 *
 * Tile vertical layout (top → bottom):
 *   [name]          ← large bold
 *   [lock-reason]   ← only on locked Exam tile
 *   [spacer]        ← flex-grow pushes count + bar down
 *   [count x / y]   ← small grey text
 *   [progress bar]  ← 4 px bar at the bottom
 */

.component-section {
  padding: 0 var(--space-md) var(--space-md);
}

/* Section label — same style as home-section__title */
.component-section__title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-sec);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: var(--space-sm) 2px var(--space-xs) 2px;
}

/* 2-column grid; section wrapper provides side/bottom margins */
.component-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}

/* When a section has an odd number of items, last tile spans both columns */
.component-grid > :last-child:nth-child(odd) {
  grid-column: 1 / -1;
}

.component-tile {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  border: 2px solid transparent;
  transition: box-shadow .15s, border-color .15s, transform .1s;
  min-height: 110px;
}
.component-tile:hover:not(.component-tile--locked) {
  box-shadow: var(--shadow-md);
  border-color: var(--color-primary);
}
.component-tile:active:not(.component-tile--locked) { transform: scale(.97); }

/* Locked — blue tint, not clickable. No opacity fade so text stays readable. */
.component-tile--locked {
  cursor: not-allowed;
  background: var(--blue-50);
  border-color: #90caf9;
}

/* Complete — all active students have a score entered */
.component-tile--complete {
  border-color: var(--color-success);
  background: var(--color-success-bg);
}

/* Name at the top of the tile */
.component-tile__name {
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.3;
}
.component-tile--locked .component-tile__name { color: var(--color-text-sec); }

/* Lock reason — inline below the name on the Exam tile when locked */
.component-tile__lock-reason {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  margin-top: var(--space-xs);
  line-height: 1.4;
}

/* Pushes count + bar to the bottom of the card */
.component-tile__spacer { flex: 1; min-height: var(--space-sm); }

/* Locked tile — hide count and bar so lock reason sits cleanly at the bottom */
.component-tile--locked .component-tile__count { display: none; }
.component-tile--locked .component-tile__bar   { display: none; }

/* "X / Y" count just above the progress bar */
.component-tile__count {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-sec);
  margin-bottom: 6px;
}
.component-tile--complete .component-tile__count { color: var(--color-success); }

/* Progress bar */
.component-tile__bar {
  height: 4px;
  background: var(--grey-200);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.component-tile__bar-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-full);
  transition: width .3s ease;
}
.component-tile--complete .component-tile__bar-fill { background: var(--color-success); }
.component-tile--locked  .component-tile__bar-fill { background: #90caf9; }

/* ─── SCORE ENTRY ROWS ───────────────────────────────────────────────────── */
/*
 * Used on the scoreEntry screen. One row per student — name on the left,
 * numeric input on the right. Exam-exempt and Not-Continuing students
 * show a disabled greyed-out row.
 *
 * The sticky footer at the bottom contains the "Save All" button.
 * Add padding-bottom to the list so the last row is not hidden behind
 * the sticky footer.
 */
.score-list {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin: var(--space-md);
  /* Extra bottom padding so the last row stays visible above the sticky footer */
  padding-bottom: 0;
}

.score-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--color-border);
  min-height: 56px;
}
.score-row:last-child { border-bottom: none; }

/* Students that are Not Continuing are greyed out and inputs are disabled */
.score-row--excluded {
  opacity: .45;
  background: var(--grey-50);
}

.score-row__num {
  font-size: var(--text-xs);
  color: var(--color-text-sec);
  width: 20px;
  flex-shrink: 0;
  text-align: right;
}

.score-row__name {
  flex: 1;
  font-size: var(--text-sm);
  font-weight: 500;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.score-row__status {
  font-size: var(--text-xs);
  color: var(--color-warning);
  font-style: italic;
  flex-shrink: 0;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* The numeric score input — compact and right-aligned */
.score-input {
  width: 64px;
  height: 40px;
  padding: 0 var(--space-sm);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  font-weight: 600;
  text-align: center;
  color: var(--color-text);
  background: var(--color-surface);
  flex-shrink: 0;
  transition: border-color .15s;
  -webkit-appearance: none;
  -moz-appearance: textfield;
}
.score-input:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(21,101,192,.15);
}
.score-input:disabled {
  background: var(--grey-100);
  color: var(--grey-500);
  cursor: not-allowed;
}
/* Red border + tint when value exceeds the allowed maximum */
.score-input.score-input--error {
  border-color: var(--color-error);
  background: #fff5f5;
  color: var(--color-error);
}
/* Remove number input spin arrows on Chrome/Safari */
.score-input::-webkit-outer-spin-button,
.score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* ─── SCORE MAX BANNER ───────────────────────────────────────────────────── */
/*
 * Sticky info strip shown below the app bar on the scoreEntry screen.
 * Displays "Maximum score: N" so teachers always know the allowed range
 * while scrolling through the student list.
 * Uses top: var(--bar-height) so it sits flush under the sticky app bar.
 */
.score-max-banner {
  position: sticky;
  top: var(--bar-height);
  z-index: 50;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-xs) var(--space-md);
  font-size: var(--text-sm);
  color: var(--color-text-sec);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}
.score-max-banner strong {
  color: var(--color-primary);
  font-weight: 700;
}

/* ─── STICKY SAVE FOOTER ─────────────────────────────────────────────────── */
/*
 * The "Save All Scores" button sticks to the bottom of the screen so
 * the teacher can save at any time without scrolling to the bottom.
 * Add padding-bottom: 80px to the score list so the last row is not
 * hidden behind this footer.
 */
.sticky-footer {
  position: sticky;
  bottom: 0;
  z-index: 50;
  background: var(--color-surface);
  box-shadow: var(--shadow-top);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  gap: var(--space-sm);
  align-items: center;
}
.sticky-footer .btn {
  flex: 1;
}

/* ─── SUBJECT GRID (FM full-access score entry) ──────────────────────────── */
/*
 * When a Form Master has been granted full-class access, they see a grid
 * of subject buttons on the fmClassOverview screen. Tapping a subject
 * goes to componentSelector for that subject.
 */
.subject-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
  /* Side padding keeps subject buttons away from the screen edge */
  padding: var(--space-sm) var(--space-md);
}
.subject-btn {
  background: var(--blue-50);
  border: 1.5px solid var(--color-primary);
  border-radius: var(--radius-sm);
  padding: var(--space-sm) var(--space-md);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-primary);
  cursor: pointer;
  text-align: left;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  transition: background .1s;
}
.subject-btn:hover  { background: #d0e8fa; }
.subject-btn:active { background: #b3d7f8; }

/* ─── STUDENT STATUS CHIPS ───────────────────────────────────────────────── */
/*
 * Used on the manageClassList (student status) screen. Each row has
 * three chip buttons — one per possible status. The active chip is
 * highlighted; clicking another chip calls setStudentStatus.
 */
.status-chips {
  display: flex;
  gap: var(--space-xs);
  flex-wrap: wrap;
}
.status-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text-sec);
  transition: background .1s, border-color .1s, color .1s;
  white-space: nowrap;
}
.status-chip:hover { border-color: var(--grey-500); }

/* Selected chip colour variants */
.status-chip--active-sel {
  background: #e8f5e9;
  border-color: #2e7d32;
  color: #1b5e20;
}
.status-chip--exempt-sel {
  background: #fff3e0;
  border-color: #e65100;
  color: #bf360c;
}
.status-chip--nc-sel {
  background: #ffebee;
  border-color: #c62828;
  color: #b71c1c;
}

/* ─── MANAGE CLASS LIST — ROW STRUCTURE ──────────────────────────────────────
   The student list lives inside a section-card. Each row shows the student
   name (bold) above the three status chips on a separate line so chips never
   wrap awkwardly on narrow screens.

   The manage-hint banner sits above the card and explains the interaction
   to the Form Master before they start tapping. */

/* Instruction banner — shown above the student list card */
.manage-hint {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  margin: 0 var(--space-md) var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--blue-50);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--color-primary);
}
.manage-hint__icon {
  font-style: normal;
  font-size: 15px;
  color: var(--color-primary);
  flex-shrink: 0;
  line-height: 1.5;
}
.manage-hint__text {
  font-size: var(--text-xs);
  color: var(--color-primary);
  line-height: 1.5;
}

/* Student list — resets <ul> defaults; card wrapper is a section-card */
.status-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

/* Each student row: name on top, chips row below */
.status-list__item {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--color-border);
}
.status-list__item:last-child { border-bottom: none; }

/* Student name — bold, full-colour so it reads as the primary element */
.status-list__name {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
}

/* ─── PSQ ENTRY ROWS ─────────────────────────────────────────────────────── */
/*
 * Used on the psqEntry screen. One card per student. Inside each card,

/* ─── FM CLASS OVERVIEW — SECTION CARDS ──────────────────────────────────── */
/*

 */

  background: var(--color-surface);

  justify-content: space-between;
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--color-border);

  min-height: var(--tap-min);

.section-card__header:active { background: var(--grey-100); }
