// CARRY-FORWARD SECTION (Assignments view)
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Called after the assignments view loads.
 * Makes a non-blocking call to check if carry-forward is available.
 * If it is, injects a carry-forward card above the existing assignment list.
 */
function initCarryForwardSection() {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) return; // silently ignore errors
      if (!result.data.needed)        return; // current term already has assignments

      var fromTerm    = result.data.fromTerm;
      var fromSession = result.data.fromSession;
      var fmCount     = (result.data.formMasterAssignments  || []).length;
      var tsCount     = (result.data.teacherAssignments     || []).length;

      // If there's no source period at all, there's nothing to copy
      if (!fromTerm) return;

      injectCarryForwardCard(fromTerm, fromSession, fmCount, tsCount);
    })
    .withFailureHandler(function () {
      // Silently ignore — carry-forward is optional, not critical
    })
    .serverGetCarryForwardPreview(App.token);
}

/**
 * Build and inject the carry-forward card at the top of the assignments view.
 * The card shows a summary of what will be copied and a Confirm button.
 *
 * @param {string} fromTerm
 * @param {string} fromSession
 * @param {number} fmCount     — number of FM assignments to copy
 * @param {number} tsCount     — number of TS assignments to copy
 */
function injectCarryForwardCard(fromTerm, fromSession, fmCount, tsCount) {
  var pageContent = document.querySelector('.page-content');
  if (!pageContent) return;
  if (document.getElementById('carry-forward-card')) return; // already injected

/**
 * Decode base64 bytes and trigger a browser download for non-PDF file types.
 * (PDFs use the existing downloadPdf() helper from Stage 5.)
 *
 * Supports: Excel (.xlsx), CSV, and any other binary file type.
 *
 * @param {string} base64   — base64-encoded file bytes from the server
 * @param {string} filename — suggested download filename (e.g. "JSS1_Broadsheet.xlsx")
 * @param {string} mime     — MIME type (e.g. 'application/vnd.openxmlformats-...')
 */
function downloadFile(base64, filename, mime) {
  try {
    // Step 1: Decode the base64 string to binary bytes
    var binary = atob(base64);
    var bytes  = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }

    // Step 2: Create a Blob (in-memory file) with the correct MIME type
    var blob = new Blob([bytes], { type: mime });

    // Step 3: Create a temporary object URL pointing to the Blob
    var url = URL.createObjectURL(blob);

    // Step 4: Trigger the download by clicking a temporary <a> element
    var a           = document.createElement('a');
    a.href          = url;
    a.download      = filename || 'export';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Step 5: Release the object URL after a short delay so the download can start
    setTimeout(function () { URL.revokeObjectURL(url); }, 5000);

  } catch (err) {
    showToast('Could not save file: ' + (err.message || 'Unknown error'), 'error');
  }
}

/**

 * Populated once per Classes & Subjects load; read by class-detail rendering.
 */
var _lockMap = {};

// ─── INJECT LOCK BADGES ON CLASSES & SUBJECTS SCREEN ─────────────────────────
//
// We hook into the `assignments` view init (which also loads classesSubjects
// in the same app section) by extending initView here.
//
// More precisely: the class list is rendered inside the classesSubjects view.
// After it loads we fetch lock states from the server and inject badges.

(function () {
  var _origInitView7 = initView; // capture Stage 6 reference

  initView = function (view, params) {
    _origInitView7(view, params);

    // After the classesSubjects view loads, fetch lock states + inject badges
    if (view === 'classesSubjects') {
      fetchAndInjectLockBadges();
    }

    // After fmClassOverview loads (Admin navigating to a class), show lock status
    if (view === 'fmClassOverview') {
      initClassLockPanel(params);
    }
  };
})();

/**
 * Fetch lock states for all classes and inject padlock badges next to
 * class names in the rendered list.
 *
 * Uses polling (same pattern as broadsheet export bar injection) because
 * the classesSubjects view loads data asynchronously.
 */
function fetchAndInjectLockBadges() {
  // Only Admin / Super Admin see lock states
  if (!App.user || App.user.role === 'Teacher') return;

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) return;

      _lockMap = result.data.lockMap || {};

      // Poll until the class list renders (max 8 seconds)
      var attempts    = 0;
      var maxAttempts = 27;
      var poll = setInterval(function () {
        attempts++;
        if (App.currentView !== 'classesSubjects') { clearInterval(poll); return; }

        // The class list renders inside .fm-action-btn elements
        var btns = document.querySelectorAll('.fm-action-btn[data-class-id]');
        if (btns.length > 0) {
          clearInterval(poll);
          injectLockBadgesIntoList(btns);
          return;
        }
        if (attempts >= maxAttempts) clearInterval(poll);
      }, 300);
    })
    .withFailureHandler(function () { /* silent fail */ })
    .serverGetClassLockStates(App.token);
}

/**
 * Physically add a lock badge next to each locked class button.
 *
 * @param {NodeList} btns — all .fm-action-btn elements with data-class-id
 */
function injectLockBadgesIntoList(btns) {
  btns.forEach(function (btn) {
    var cid = btn.getAttribute('data-class-id');
    if (!cid || !_lockMap[cid]) return; // not locked — no badge needed

    // Avoid double-injection
    if (btn.querySelector('.lock-badge')) return;

    // Insert the badge before the arrow chevron
    var arrow = btn.querySelector('.fm-action-btn__arrow');
    var badge = document.createElement('span');
    badge.className = 'lock-badge lock-badge--sm';
    badge.innerHTML = '<span class="lock-badge__icon">🔒</span> Locked';
    if (arrow) {
      btn.insertBefore(badge, arrow);
    } else {
      btn.appendChild(badge);
    }
  });
}

// ─── CLASS DETAIL LOCK PANEL ──────────────────────────────────────────────────
//
// When Admin navigates to a class (fmClassOverview), we inject a Lock/Unlock
// button at the top of the action list so Admin can toggle the lock without
// leaving the class detail screen.

/**
 * Load lock status for the class and inject the lock action panel.
 *
 * @param {{ classId: string }} params
 */
function initClassLockPanel(params) {
  var classId = params && params.classId;
  if (!classId) return;

  // Only show for Admin / Super Admin
  if (!App.user || App.user.role === 'Teacher') return;

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) return;

      var locked    = result.data.isLocked;
      var lockedBy  = result.data.lockedBy  || '';
      var lockedAt  = result.data.lockedAt  || '';

      // Poll until the class overview body is rendered
      var attempts    = 0;
      var maxAttempts = 27;
      var poll = setInterval(function () {
        attempts++;
        if (App.currentView !== 'fmClassOverview') { clearInterval(poll); return; }

        var body = document.getElementById('fmco-body') || document.querySelector('.view-body');
        if (body && !body.querySelector('.loading-placeholder')) {
          clearInterval(poll);
          injectLockActionPanel(body, classId, locked, lockedBy, lockedAt);
          return;
        }
        if (attempts >= maxAttempts) clearInterval(poll);
      }, 300);
    })
    .withFailureHandler(function () { /* silent fail */ })
    .serverGetClassTermLockStatus(App.token, classId);
}

/**
 * Build and inject the lock action panel at the top of the class detail view.
 *
 * @param {HTMLElement} body
 * @param {string}      classId
 * @param {boolean}     locked
 * @param {string}      lockedBy
 * @param {string}      lockedAt
 */
function injectLockActionPanel(body, classId, locked, lockedBy, lockedAt) {
  if (document.getElementById('class-lock-panel')) return; // already injected

  var cidJs    = classId.replace(/'/g, "\\'");
  var lockedHtml = '';

  if (locked) {
    var lockedWhen = lockedAt ? ' on ' + new Date(lockedAt).toLocaleDateString() : '';
    lockedHtml =
      '<div class="lock-badge" style="margin-bottom:8px;display:inline-flex;">' +
        '<span class="lock-badge__icon">🔒</span>' +
        ' Locked by ' + escHtml(lockedBy) + lockedWhen +
      '</div>';
  }

  var panel = document.createElement('div');
  panel.id        = 'class-lock-panel';
  panel.className = 'section-card';
  panel.style.cssText = 'margin:var(--space-md) var(--space-md) 0;';
  panel.innerHTML =
    '<div class="section-title">RESULT LOCK</div>' +
    lockedHtml +
    '<div id="class-lock-alert" class="mb-sm"></div>' +
    (locked
      ? '<button class="btn btn--full btn--unlock" id="class-lock-btn" ' +
          'onclick="toggleClassLock(\'' + cidJs + '\', false, this)">' +
          '<span class="btn-text">🔓 Unlock Class Results</span>' +
          '<span class="spinner"></span>' +
        '</button>'
      : '<button class="btn btn--full btn--lock" id="class-lock-btn" ' +
          'onclick="toggleClassLock(\'' + cidJs + '\', true, this)">' +
          '<span class="btn-text">🔒 Lock Class Results</span>' +
          '<span class="spinner"></span>' +
        '</button>'
    );

  // Insert as the first child of the view body
  body.insertBefore(panel, body.firstChild);
}

/**
 * Lock or unlock a class-term.
 *
 * @param {string}      classId
 * @param {boolean}     shouldLock   — true = lock, false = unlock
 * @param {HTMLElement} btn
 */
function toggleClassLock(classId, shouldLock, btn) {
  var alertEl = document.getElementById('class-lock-alert');
  var action  = shouldLock ? 'lock' : 'unlock';

  if (!confirm('Are you sure you want to ' + action + ' results for this class?\n' +
               (shouldLock
                 ? 'Teachers will not be able to save scores until unlocked.'
                 : 'Teachers will be able to edit scores again.'))) return;

  setButtonLoading('class-lock-btn', true);

  var fn = shouldLock ? 'serverLockClassTerm' : 'serverUnlockClassTerm';

  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('class-lock-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) {
        if (alertEl) {
          alertEl.innerHTML =
            '<div class="alert alert--error">' + escHtml(result.error || 'Failed.') + '</div>';
        }
        return;
      }

      // Re-initialise the class detail to reflect the new lock state
      showToast(shouldLock ? 'Class locked.' : 'Class unlocked.', 'success');
      // Remove and re-inject the panel with updated state
      var panel = document.getElementById('class-lock-panel');
      if (panel) panel.parentNode.removeChild(panel);
      initClassLockPanel(App.viewParams);

      // Also update the local _lockMap so the class list badge updates
      // on the next classesSubjects render without a server round-trip
      _lockMap[classId] = !!result.data.isLocked;
    })
    .withFailureHandler(function () {
      setButtonLoading('class-lock-btn', false);
      if (alertEl) {
        alertEl.innerHTML =
          '<div class="alert alert--error">Connection error. Please try again.</div>';
      }
    })
    [fn](App.token, classId);
}

function initActivityLog() {

/**

 */
function applyLogFilters() {
  _logFilters.category = (document.getElementById('log-filter-category') || {}).value || '';
  _logFilters.dateFrom = (document.getElementById('log-filter-from')     || {}).value || '';

/**
 * Fetch log entries from the server and render the list.
 *
 * @param {Object} filters
 */
function loadActivityLog(filters) {
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('log-apply-btn', false);
      if (handleSessionExpired(result)) return;
      var area = document.getElementById('log-list-area');
      if (!area) return;

      if (!result || !result.success) {
        area.innerHTML =
          '<div class="alert alert--error" style="margin:var(--space-md)">' +
          escHtml((result && result.error) || 'Could not load activity log.') + '</div>';
        return;
      }

      renderActivityLogList(result.data, area);
    })
    .withFailureHandler(function (err) {
      setButtonLoading('log-apply-btn', false);
      var area = document.getElementById('log-list-area');
      if (area) {
        area.innerHTML =
          '<div class="alert alert--error" style="margin:var(--space-md)">Connection error.</div>';
      }
    })
    .serverGetActivityLog(App.token, filters || {}, 200);
}

/**
 * Render the log entries into the list area.
 *
 * @param {{ entries: [], totalCount: number }} data
 * @param {HTMLElement}                          area
 */
function renderActivityLogList(data, area) {
  var entries    = data.entries    || [];
  var totalCount = data.totalCount || 0;

  if (entries.length === 0) {
    area.innerHTML =
      '<div class="section-card" style="margin:var(--space-md)">' +
        '<p class="log-empty">No activity found for the selected filters.</p>' +
      '</div>';
    return;
  }

  var html =
    '<div class="log-count-strip">Showing ' + entries.length +
    ' of ' + totalCount + ' entr' + (totalCount === 1 ? 'y' : 'ies') + '</div>' +
    '<div class="section-card" style="margin:var(--space-md);padding:0;">';

  entries.forEach(function (e) {
    var ts       = e.timestamp ? new Date(e.timestamp) : null;
    var dateStr  = ts ? ts.toLocaleDateString()  : '';
    var timeStr  = ts ? ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    var catClass = getCategoryClass(e.category);

    html +=
      '<div class="log-entry">' +
        '<div class="log-entry__header">' +
          '<span class="log-entry__time">' + escHtml(dateStr + ' ' + timeStr) + '</span>' +
          '<span class="log-entry__category log-entry__category--' + catClass + '">' +
            escHtml(e.category || '') +
          '</span>' +
        '</div>' +
        '<div class="log-entry__action">' + escHtml(e.action || '') + '</div>' +
        (e.detail
          ? '<div class="log-entry__detail">' + escHtml(e.detail) + '</div>'
          : '') +
        '<div class="log-entry__staff">' +
          escHtml(e.staffName || e.staffId || '') +
          (e.role ? ' · ' + escHtml(e.role) : '') +
        '</div>' +
      '</div>';
  });

  html += '</div>';
  area.innerHTML = html;
}

/**
 * Map a category string to its CSS modifier class.
 * @param {string} category
 * @returns {string}
 */
function getCategoryClass(category) {
  var map = {
    'Auth':            'auth',
    'User Management': 'user',
    'Configuration':   'config',
    'Results':         'results',
    'Corrections':     'corrections',
    'Lock':            'lock',
    'Archive':         'archive'
  };
  return map[category] || 'default';
}

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) {
        if (alertEl) {
          alertEl.innerHTML =
            '<div class="alert alert--error">' + escHtml(result.error || 'Save failed.') + '</div>';
        }
        // Revert toggle on failure
        if (toggle) toggle.checked = !newValue;
        return;
      }
      showToast('Settings saved.', 'success');
      if (alertEl) alertEl.innerHTML = '';
    })
    .withFailureHandler(function () {
      if (alertEl) {
        alertEl.innerHTML =
          '<div class="alert alert--error">Connection error. Setting not saved.</div>';
      }
      if (toggle) toggle.checked = !newValue;
    })
    .serverSetSuperAdminSettings(App.token, { adminCanViewLog: newValue });
}

// ═══════════════════════════════════════════════════════════════════════════════
// END OF STAGE 7 ADDITIONS
// ═══════════════════════════════════════════════════════════════════════════════
</script>
