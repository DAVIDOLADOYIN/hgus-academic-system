/**
 * Toggle the collapsible student list panel inside fmClassOverview.
 * The chevron icon rotates via the CSS class 'is-open'.
 */
function toggleStudentList() {
  var body    = document.getElementById('student-list-body');
  var chevron = document.getElementById('student-list-chevron');
  if (!body) return;
  var isCurrentlyOpen = body.style.display !== 'none';
  body.style.display = isCurrentlyOpen ? 'none' : '';
  if (chevron) {
    if (isCurrentlyOpen) chevron.classList.remove('is-open');
    else                 chevron.classList.add('is-open');
  }
}

// ─── COMPONENT SELECTOR ────────────────────────────────────────────────────
// Shows 6 score-entry tiles grouped into 3 categories. Each tile displays
// entered vs. required count with a mini progress bar. Locked tiles
// (e.g. Exam before Tests are complete) are greyed-out with no click handler.

Views.componentSelector = function (params) {
  const subjectName = (params && params.subjectName) || 'Subject';
  const className   = (params && params.className)   || '';
  const html =
    appBarHtml(subjectName, className, true, 'back') +
    '<div class="view-body" id="compselector-body">' +
    '  <div class="loading-placeholder">Loading component progress…</div>' +
    '</div>';
  return html;
};

function initComponentSelector(params) {
  const classId     = params && params.classId;
  const subjectId   = params && params.subjectId;
  const className   = (params && params.className)   || '';
  const subjectName = (params && params.subjectName) || '';
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('compselector-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const statuses = (result.data && result.data.statuses) || [];

      // Group the 6 components into 3 logical sections for readability
      var GROUPS = [
        { title: 'Class Performance',     keys: ['C/W', 'ASS', 'ATT'] },
        { title: 'Continuous Assessment', keys: ['Test1', 'Test2']    },
        { title: 'Overall Evaluation',    keys: ['Exam']              }
      ];
      var byKey = {};
      statuses.forEach(function (s) { byKey[s.component] = s; });

      /**
       * Build a single component tile.
       * If locked: greyed, no click handler, shows lock reason.
       * If complete: gets a visual 'complete' modifier.
       */
      function buildTile(comp) {
        var isLocked   = !!comp.locked;
        var isComplete = !isLocked && comp.total > 0 && comp.entered >= comp.total;
        var tileClass  = 'component-tile';
        if (isLocked)   tileClass += ' component-tile--locked';
        if (isComplete) tileClass += ' component-tile--complete';
        var pct = comp.total > 0 ? Math.round((comp.entered / comp.total) * 100) : 0;
        var clickAttr = isLocked ? '' :
          'onclick="navigateTo(\'scoreEntry\',{classId:\'' + classId +
          '\',className:\'' + escHtml(className) +
          '\',subjectId:\'' + subjectId +
          '\',subjectName:\'' + escHtml(subjectName) +
          '\',component:\'' + comp.component + '\'})"';
        var displayName = COMPONENT_DISPLAY_LABEL[comp.component] || comp.component;
        return (
          '<div class="' + tileClass + '" ' + clickAttr + '>' +
          '<span class="component-tile__name">' + escHtml(displayName) + '</span>' +
          '<div class="component-tile__spacer"></div>' +
          (isLocked
            ? '<span class="component-tile__lock-reason">🔒 ' +
              escHtml(comp.lockReason || 'Locked') + '</span>'
            : '') +
          '<span class="component-tile__count">' + comp.entered + ' / ' + comp.total + '</span>' +
          '<div class="component-tile__bar">' +
            '<div class="component-tile__bar-fill" style="width:' + pct + '%"></div>' +
          '</div>' +
          '</div>'
        );
      }

      var html = '<div style="padding-top:var(--space-md)">';
      GROUPS.forEach(function (group) {
        html += '<div class="component-section">';
        html += '<div class="component-section__title">' + group.title + '</div>';
        html += '<div class="component-grid">';
        group.keys.forEach(function (key) {
          if (byKey[key]) html += buildTile(byKey[key]);
        });
        html += '</div></div>';
      });
      html += '</div>';
      document.getElementById('compselector-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('compselector-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetComponentStatuses(App.token, classId, subjectId);
}

function initScoreEntry(params) {
  const classId     = params && params.classId;
  const subjectId   = params && params.subjectId;
  const component   = params && params.component;
  const subjectName = (params && params.subjectName) || '';
  const className   = (params && params.className)   || '';
  App._scoreData  = null;
  App.viewParams  = params;
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('score-entry-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const data     = result.data || {};
      const students = data.roster   || [];
      const maxScore = (data.max  != null) ? data.max  : '';
      // Cache score context so saveAllScores() can read it without params
      App._scoreData = {
        classId:   classId,
        subjectId: subjectId,
        component: component,
        maxScore:  maxScore !== '' ? Number(maxScore) : null
      };
      let html = '';
      if (maxScore !== '') {
        html += '<div class="score-max-banner">Maximum score: <strong>' + maxScore + '</strong></div>';
      }
      html += '<ul class="score-list" id="score-list">';
      students.forEach(function (s) {
        const isExcluded = s.termStatus === 'Not Continuing' || s.termStatus === 'Exam Exempt';
        const rowClass   = isExcluded ? 'score-row score-row--excluded' : 'score-row';
        const currentVal = (s.score != null && s.score !== '') ? s.score : '';
        html += '<li class="' + rowClass + '" data-student-id="' + s.studentId + '">' +
          '<span class="score-row__name">' + escHtml(s.name) + '</span>';
        if (isExcluded) {
          html += '<span class="score-row__excluded-label">' +
            escHtml(s.termStatus || 'Excluded') + '</span>';
        } else {
          html += '<input class="score-input" type="number" min="0" ' +
            (maxScore !== '' ? 'max="' + maxScore + '" data-max="' + maxScore + '" ' : '') +
            'oninput="validateScoreInput(this)" placeholder="–" value="' + currentVal + '">';
        }
        html += '</li>';
      });
      html += '</ul>';
      html += '<div class="sticky-footer">' +
        '<button class="btn btn--primary btn--full" id="save-scores-btn" ' +
        'onclick="saveAllScores()">Save All Scores</button>' +
        '</div>';
      document.getElementById('score-entry-body').innerHTML = html;
    })
    .withFailureHandler(function () {
      document.getElementById('score-entry-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetScoresForComponent(App.token, classId, subjectId, component);
}

function saveAllScores() {
  if (!App._scoreData) return;
  const classId    = App._scoreData.classId;
  const subjectId  = App._scoreData.subjectId;
  const component  = App._scoreData.component;
  const maxAllowed = (App._scoreData && App._scoreData.maxScore != null)
    ? App._scoreData.maxScore : Infinity;
  const rows    = document.querySelectorAll('#score-list .score-row');
  const payload = [];
  let hasError  = false;
  rows.forEach(function (row) {
    const studentId = row.getAttribute('data-student-id');
    const input     = row.querySelector('.score-input');
    if (!input) return;
    const val = input.value.trim();
    if (val === '') {
      input.classList.remove('score-input--error');
      payload.push({ studentId: studentId, score: null });
    } else {
      const num = parseFloat(val);
      if (isNaN(num) || num < 0 || num > maxAllowed) {
        input.classList.add('score-input--error');
        hasError = true;
      } else {
        input.classList.remove('score-input--error');
        payload.push({ studentId: studentId, score: num });
      }
    }
  });
  if (hasError) {
    showToast(
      'One or more scores exceed the maximum of ' + maxAllowed +
      '. Please correct the highlighted fields.', 'error');
    return;
  }
  setButtonLoading('save-scores-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('save-scores-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Save failed.', 'error'); return; }
      showToast('Scores saved successfully.', 'success');
      navigateBack();
    })
    .withFailureHandler(function () {
      setButtonLoading('save-scores-btn', false);
      showToast('Connection error. Scores not saved.', 'error');
    })
    .serverSaveScores(App.token, classId, subjectId, component, payload);
}

/**
 * Real-time validation: highlight the input red if the value exceeds max.
 * Called via oninput on each score input field.
 */
function validateScoreInput(input) {
  var max = parseFloat(input.getAttribute('data-max'));
  var val = parseFloat(input.value);
  if (!isNaN(val) && !isNaN(max) && val > max) input.classList.add('score-input--error');
  else input.classList.remove('score-input--error');
}

// ─── PSQ ENTRY ─────────────────────────────────────────────────────────────
// One-student-at-a-time rating flow. Each student shows 16 trait rows with
// 1–5 buttons. A progress indicator at the top opens a jump-list sheet.
// Ratings are saved per-student as the FM steps through the class.

Views.psqEntry = function (params) {
  const className = (params && params.className) || 'Class';
  // ── FIX: psq-student-strip lives OUTSIDE view-body so it can never overlap ──
  // Previously the progress strip was rendered inside view-body as a sticky
  // element (top: var(--bar-height)), which caused it to float over the first
  // trait row immediately. Moving it outside the scroll container eliminates
  // the overlap entirely without needing any sticky positioning at all.
  const html =
    appBarHtml('PSQ Ratings', className, true, 'back') +
    '<div class="psq-student-strip" id="psq-student-strip">' +
    '  <div class="loading-placeholder" style="height:44px"></div>' +
    '</div>' +
    '<div class="view-body view-body--psq" id="psq-entry-body">' +
    '  <div class="loading-placeholder">Loading PSQ data…</div>' +
    '</div>';
  return html;
};

function initPsqEntry(params) {
  const classId = params && params.classId;
  App._psqData         = null;
  App._currentPsqIndex = 0;
  App.viewParams       = params;
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('psq-entry-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      App._psqData           = result.data || {};
      App._psqData.students  = App._psqData.students  || [];
      App._psqData.traitKeys = App._psqData.traitKeys || [];
      if (App._psqData.students.length === 0) {
        document.getElementById('psq-entry-body').innerHTML =
          '<p class="empty-msg">No students found for PSQ entry.</p>';
        return;
      }
      renderPsqStudent();
    })
    .withFailureHandler(function () {
      document.getElementById('psq-entry-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassPSQ(App.token, classId);
}

/**
 * Render the PSQ card for the student at App._currentPsqIndex.
 * Re-renders in place on every next/prev/jump navigation — no separate
 * view transition, so the progress bar stays visible throughout.
 */
function renderPsqStudent() {
  const data    = App._psqData;
  const idx     = App._currentPsqIndex;
  const total   = data.students.length;
  const student = data.students[idx];
  const traits  = data.traitKeys;
  let html = '';

  // ── Progress strip — written into its own container OUTSIDE view-body ───────
  // This prevents the strip from ever overlapping trait rows.
  // The dropdown chevron (▾) still opens the full jump-list sheet.
  const stripHtml =
    '<div class="psq-progress" onclick="openPsqJumpList()" ' +
    'role="button" aria-label="Open student list">' +
    '<span class="psq-progress__text">Student ' + (idx + 1) + ' of ' + total +
    ': <strong>' + escHtml(student.name) + '</strong></span>' +
    '<span class="psq-progress__chevron">▾</span>' +
    '</div>';
  var stripEl = document.getElementById('psq-student-strip');
  if (stripEl) stripEl.innerHTML = stripHtml;

  // ── Trait rating rows ──────────────────────────────────────────────────────
  html += '<div class="psq-student-card">';
  traits.forEach(function (trait) {
    const savedRating = (student.ratings && student.ratings[trait.key]) || 0;
    html += '<div class="psq-trait-row">';
    html += '<span class="psq-trait-row__label">' + escHtml(trait.label) + '</span>';
    html += '<div class="psq-rating" data-trait="' + trait.key + '">';
    for (var r = 1; r <= 5; r++) {
      const sel = (savedRating === r) ? ' psq-rating__btn--selected' : '';
      html += '<button class="psq-rating__btn' + sel + '" ' +
        'onclick="selectPsqRating(this,' + r + ',\'' + trait.key + '\')">' + r + '</button>';
    }
    html += '</div></div>';
  });
  html += '</div>';

  // ── Navigation footer ──────────────────────────────────────────────────────
  html += '<div class="psq-navigator">';
  if (idx > 0) {
    html += '<button class="btn btn--outline" onclick="psqGoToPrev()">← Previous</button>';
  } else {
    html += '<span></span>';
  }
  const isLast = (idx === total - 1);
  html += '<button class="btn btn--primary" id="psq-save-btn" ' +
    'onclick="savePsqAndAdvance(' + isLast + ')">' +
    (isLast ? 'Save & Finish' : 'Save & Next →') + '</button>';
  html += '</div>';

  document.getElementById('psq-entry-body').innerHTML = html;
}

/**
 * Select (or deselect) a rating button for a trait.
 * Clicking an already-selected rating deselects it (rating reverts to 0).
 */
function selectPsqRating(btn, rating, traitKey) {
  const ratingDiv   = btn.parentElement;
  const allBtns     = ratingDiv.querySelectorAll('.psq-rating__btn');
  const wasSelected = btn.classList.contains('psq-rating__btn--selected');
  allBtns.forEach(function (b) { b.classList.remove('psq-rating__btn--selected'); });
  if (!wasSelected) btn.classList.add('psq-rating__btn--selected');
}

/**
 * Save the current student's ratings, then advance to the next student
 * (or finish if this was the last one).
 *
 * @param {boolean} isLast — true if this is the final student in the list
 */
function savePsqAndAdvance(isLast) {
  const data    = App._psqData;
  const idx     = App._currentPsqIndex;
  const student = data.students[idx];
  const classId = App.viewParams && App.viewParams.classId;

  // Collect all currently-selected ratings from the DOM
  const ratings   = {};
  const traitDivs = document.querySelectorAll('.psq-rating');
  traitDivs.forEach(function (div) {
    const traitKey = div.getAttribute('data-trait');
    const selBtn   = div.querySelector('.psq-rating__btn--selected');
    ratings[traitKey] = selBtn ? parseInt(selBtn.textContent, 10) : 0;
  });
  // Update the in-memory cache so going back shows the correct selection
  student.ratings = ratings;

  setButtonLoading('psq-save-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('psq-save-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Save failed.', 'error'); return; }
      if (isLast) {
        showToast('PSQ ratings saved for all students.', 'success');
        navigateBack();
      } else {
        App._currentPsqIndex++;
        renderPsqStudent();
      }
    })
    .withFailureHandler(function () {
      setButtonLoading('psq-save-btn', false);
      showToast('Connection error. Ratings not saved.', 'error');
    })
    .serverSavePSQ(App.token, classId, student.studentId, ratings);
}

function psqGoToPrev() {
  if (App._currentPsqIndex > 0) {
    App._currentPsqIndex--;
    renderPsqStudent();
  }
}

/**
 * Open a bottom-sheet that lists all students with a done/pending indicator.
 * Tapping a name jumps directly to that student's PSQ card.
 */
function openPsqJumpList() {
  const data = App._psqData;
  if (!data || !data.students) return;
  const totalTraits = (data.traitKeys || []).length;
  let listHtml = '';
  data.students.forEach(function (s, i) {
    const isActive    = (i === App._currentPsqIndex);
    const ratedCount  = (data.traitKeys || []).filter(function (t) {
      return s.ratings && s.ratings[t.key] > 0;
    }).length;
    const isFullyRated = (totalTraits > 0 && ratedCount === totalTraits);
    listHtml +=
      '<button class="psq-jump-item' + (isActive ? ' psq-jump-item--active' : '') +
      '" onclick="jumpToPsqStudent(' + i + ')">' +
      '<span class="psq-jump-item__num">' + (i + 1) + '</span>' +
      '<span class="psq-jump-item__name">' + escHtml(s.name || s.fullName || '—') + '</span>' +
      (isFullyRated ? '<span class="psq-jump-item__done">✓ Done</span>' : '') +
      '</button>';
  });
  const modal = document.createElement('div');
  modal.id = 'psq-jump-modal';
  modal.innerHTML =
    '<div class="psq-jump-overlay" onclick="closePsqJumpList()"></div>' +
    '<div class="psq-jump-sheet">' +
      '<div class="psq-jump-sheet__header">' +
        '<span class="psq-jump-sheet__title">Select Student</span>' +
        '<button class="psq-jump-sheet__close" onclick="closePsqJumpList()">✕</button>' +
      '</div>' +
      '<div class="psq-jump-sheet__list" id="psq-jump-list">' + listHtml + '</div>' +
    '</div>';
  document.body.appendChild(modal);
  // Scroll the currently-active student into view after the modal renders
  setTimeout(function () {
    const activeItem = document.querySelector('.psq-jump-item--active');
    if (activeItem) activeItem.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 60);
}

function closePsqJumpList() {
  const modal = document.getElementById('psq-jump-modal');
  if (modal) modal.parentNode.removeChild(modal);
}

function jumpToPsqStudent(idx) {
  closePsqJumpList();
  App._currentPsqIndex = idx;
  renderPsqStudent();
}

// ─── MANAGE CLASS LIST ─────────────────────────────────────────────────────
// Lists all students with interactive status chips (Active / Exam Exempt /
// Not Continuing). Tapping a non-selected chip immediately updates the
// student's term status via a server call and re-renders the list.

Views.manageClassList = function (params) {
  const className = (params && params.className) || 'Class';
  const html =
    appBarHtml('Manage Class List', className, true, 'back') +
    '<div class="view-body" id="class-list-body">' +
    '  <div class="loading-placeholder">Loading student list…</div>' +
    '</div>';
  return html;
};

// Module-level flag — set by the server response so edit/reset buttons
// know whether the current user is Admin without a separate role call.
var _classListCallerIsAdmin = false;

function initManageClassList(params) {
  const classId  = params && params.classId;
  App.viewParams = params;
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('class-list-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load.') + '</p>';
        return;
      }
      const data     = result.data || {};
      const students = data.students || [];
      _classListCallerIsAdmin = !!data.callerIsAdmin;

      let html = '<div style="padding-top:var(--space-md)">';
      if (students.length === 0) {
        html += '<p class="empty-msg">No students found.</p>';
      } else {
        html +=
          '<div class="manage-hint">' +
          '<span class="manage-hint__icon">ℹ</span>' +
          '<span class="manage-hint__text">Tap a status chip to update term status. ' +
          'Tap ✏ to correct a student\'s name or gender.</span>' +
          '</div>';
        html += '<div class="section-card">';
        html +=
          '<div class="section-card__header">' +
          '<span class="section-card__title">STUDENTS — ' + students.length + '</span>' +
          '</div>';
        html += '<ul class="status-list" id="status-list">';
        students.forEach(function (s) {
          const current     = s.termStatus || 'Active';
          const displayName = s.name || '—';

          // Edit button label — shows "(edited)" in blue if already corrected,
          // plain "Edit" otherwise. Both open the same edit form.
          const editBtnClass = s.hasCorrection
            ? 'edit-name-btn edit-name-btn--edited'
            : 'edit-name-btn';
          const editBtnLabel = s.hasCorrection ? '✏ Edited' : 'Edit';

          // Reset link — only shown to Admin/Super Admin below a corrected name
          const resetLink = (s.hasCorrection && _classListCallerIsAdmin)
            ? '<div class="correction-reset-row">' +
                '<span class="correction-source-inline">Source: ' + escHtml(s.sourceFullName || '—') + '</span>' +
                '<button class="correction-reset-btn" ' +
                  'onclick="resetStudentCorrection(\'' + escHtml(s.studentId) + '\')">Reset to source</button>' +
              '</div>'
            : '';

          html +=
            '<li class="status-list__item" data-student-id="' + escHtml(s.studentId) + '">' +
            // Name row: name on the left, clearly labelled Edit button on the right
            '<div class="status-list__name-row">' +
              '<span class="status-list__name">' + escHtml(displayName) + '</span>' +
              '<button class="' + editBtnClass + '" ' +
                'onclick="openStudentEditForm(\'' + escHtml(s.studentId) + '\')">' +
                editBtnLabel +
              '</button>' +
            '</div>' +
            resetLink +
            // Status chips on their own row — clearly separated from the name/edit row
            '<div class="status-chips">' +
            renderStatusChip(classId, s.studentId, 'Active',         current) +
            renderStatusChip(classId, s.studentId, 'Exam Exempt',    current) +
            renderStatusChip(classId, s.studentId, 'Not Continuing', current) +
            '</div>' +
            '</li>';
        });
        html += '</ul>';
        html += '</div>';
      }
      html += '</div>';
      document.getElementById('class-list-body').innerHTML = html;

      // Store student data for the edit modal to read without re-fetching
      window._classListStudents = students;
    })
    .withFailureHandler(function () {
      document.getElementById('class-list-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassStudentStatus(App.token, classId);
}

/**
 * Build one status chip button for a student row.
 */
function renderStatusChip(classId, studentId, status, currentStatus) {
  const isSelected = (status === currentStatus);
  let chipClass = 'status-chip';
  if (isSelected) {
    if (status === 'Active')           chipClass += ' status-chip--active-sel';
    else if (status === 'Exam Exempt') chipClass += ' status-chip--exempt-sel';
    else                               chipClass += ' status-chip--nc-sel';
  }
  const clickHandler = isSelected
    ? ''
    : 'onclick="updateStudentStatus(\'' + classId + '\',\'' + studentId + '\',\'' + status + '\')"';
  return (
    '<button class="' + chipClass + '" ' + clickHandler +
    (isSelected ? ' disabled' : '') + '>' +
    escHtml(status) + '</button>'
  );
}

/** Update a student's term status via the server, then re-render. */
function updateStudentStatus(classId, studentId, newStatus) {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Update failed.', 'error'); return; }
      showToast('Status updated to "' + newStatus + '".', 'success');
      initManageClassList(App.viewParams);
    })
    .withFailureHandler(function () {
      showToast('Connection error. Status not updated.', 'error');
    })
    .serverSetStudentStatus(App.token, classId, studentId, newStatus);
}

// ─── STUDENT NAME / GENDER CORRECTION ────────────────────────────────────────

/**
 * Open the edit bottom sheet for a specific student.
 * Pre-fills fields with the student's current effective name and gender.
 * The sheet is injected into the DOM and removed on close.
 *
 * @param {string} studentId
 */
function openStudentEditForm(studentId) {
  const students = window._classListStudents || [];
  const s = students.find(function (x) { return x.studentId === studentId; });
  if (!s) { showToast('Student not found. Please reload.', 'error'); return; }

  // Remove any existing sheet first
  var old = document.getElementById('student-edit-sheet-overlay');
  if (old) old.parentNode.removeChild(old);

  var overlay = document.createElement('div');
  overlay.id = 'student-edit-sheet-overlay';
  overlay.className = 'psq-jump-overlay';  // reuse overlay style
  overlay.onclick = closeStudentEditForm;

  var sheet = document.createElement('div');
  sheet.id = 'student-edit-sheet';
  sheet.className = 'student-edit-sheet';
  sheet.innerHTML =
    '<div class="student-edit-sheet__header">' +
      '<span class="student-edit-sheet__title">Edit Student Details</span>' +
      '<button class="psq-jump-sheet__close" onclick="closeStudentEditForm()">✕</button>' +
    '</div>' +
    // Show source name if a correction is already in place
    (s.hasCorrection
      ? '<div class="correction-source-note">Source data: ' +
        escHtml(s.sourceFullName || '—') + ' · ' + escHtml(s.sourceGender || '—') +
        '</div>'
      : '') +
    '<div class="student-edit-sheet__body">' +
      '<div class="form-group">' +
        '<label class="form-label" for="edit-name-input">Full Name</label>' +
        '<input class="form-input" type="text" id="edit-name-input" ' +
          'value="' + escHtml(s.name || '') + '" autocomplete="off">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label" for="edit-gender-select">Gender</label>' +
        '<select class="form-select" id="edit-gender-select">' +
          '<option value="Male"'   + (s.gender === 'Male'   ? ' selected' : '') + '>Male</option>' +
          '<option value="Female"' + (s.gender === 'Female' ? ' selected' : '') + '>Female</option>' +
        '</select>' +
      '</div>' +
      '<div id="edit-student-alert" class="mb-sm"></div>' +
      '<button class="btn btn--primary btn--full" id="edit-student-save-btn" ' +

        '<span class="btn-text">Save Changes</span><span class="spinner"></span>' +

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);

  // Animate in after a tick so the CSS transition fires
  setTimeout(function () { sheet.classList.add('student-edit-sheet--open'); }, 10);

  // Focus the name field for immediate typing
  var nameInput = document.getElementById('edit-name-input');
  if (nameInput) setTimeout(function () { nameInput.focus(); }, 150);

/** Close and remove the student edit bottom sheet. */
function closeStudentEditForm() {
  var sheet   = document.getElementById('student-edit-sheet');
  var overlay = document.getElementById('student-edit-sheet-overlay');
  if (sheet)   sheet.classList.remove('student-edit-sheet--open');
  setTimeout(function () {
    if (sheet)   sheet.parentNode && sheet.parentNode.removeChild(sheet);
    if (overlay) overlay.parentNode && overlay.parentNode.removeChild(overlay);
  }, 250);
}

/**
 * Save the corrected name/gender for a student.
 * Validates inputs, calls the server, then re-renders the class list.
 *
 * @param {string} studentId
 */
function saveStudentCorrection(studentId) {
  const nameInput   = document.getElementById('edit-name-input');
  const genderInput = document.getElementById('edit-gender-select');
  const alertEl     = document.getElementById('edit-student-alert');
  if (!nameInput) return;

  const newName   = (nameInput.value   || '').trim();
  const newGender = (genderInput.value || '').trim();

  if (!newName) {
    if (alertEl) alertEl.innerHTML = '<div class="alert alert--error">Name cannot be blank.</div>';
    return;
  }

  const classId = App.viewParams && App.viewParams.classId;
  setButtonLoading('edit-student-save-btn', true);

  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('edit-student-save-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        if (alertEl) alertEl.innerHTML = '<div class="alert alert--error">' + escHtml(result.error) + '</div>';
        return;
      }
      closeStudentEditForm();
      showToast('Student details updated.', 'success');
      initManageClassList(App.viewParams);  // re-render list to show updated name
    })
    .withFailureHandler(function () {
      setButtonLoading('edit-student-save-btn', false);
      if (alertEl) alertEl.innerHTML = '<div class="alert alert--error">Connection error. Please try again.</div>';
    })
    .serverUpdateStudentCorrection(App.token, classId, studentId, newName, newGender);
}

/**
 * Reset a student's corrections back to source data.
 * Only callable by Admin/Super Admin (the button is only shown to them).
 *
 * @param {string} studentId
 */
function resetStudentCorrection(studentId) {
  if (!confirm('Reset this student\'s name and gender back to the source data?')) return;
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error || 'Reset failed.', 'error'); return; }
      showToast('Corrections cleared. Source data restored.', 'success');
      initManageClassList(App.viewParams);
    })
    .withFailureHandler(function () {
      showToast('Connection error. Reset not completed.', 'error');
    })
    .serverClearStudentCorrection(App.token, studentId);
}

// STAGE 4+5 — BROADSHEET & RESULT GENERATION
// ═══════════════════════════════════════════════════════════════════════════════

// ─── MODULE-LEVEL STATE ───────────────────────────────────────────────────────
// Arrays populated by server calls and read by click handlers to avoid
// embedding data in onclick attributes (avoids apostrophe-escaping issues).
// Each view that populates one of these owns it; the next screen reads it.

let _bssGroups   = [];   // [{groupKey, classIds}] — from serverGetClassGroups
let _bssSubjects = [];   // [{subjectId, subjectName}] — from serverGetBroadsheetSubjects
let _bssStudents = [];   // [{studentId,name,classId,className,termStatus}]

// ── Stage 5 addition ──────────────────────────────────────────────────────────
// Cached after initBroadsheetClassMenu fetches completion/lock state.
// broadsheetStudentList and studentResultSlip read this to decide whether
// to show PDF buttons — no extra server round-trip needed.
let _bssCompletion = null; // result.data from serverGetClassGroupCompletion

// ─── BROADSHEET HOME ──────────────────────────────────────────────────────────

// ─── BROADSHEET CLASS MENU ────────────────────────────────────────────────────
// Second screen: 3-option menu shown after a class group is selected.
//
// ── STAGE 5 CHANGE ────────────────────────────────────────────────────────────
// Buttons are now LOCKED or UNLOCKED based on data completion state:
//   • Subject Scores — always unlocked (no data dependency).
//   • Broadsheet     — unlocked when ALL scores entered for ALL active students.
//   • Results        — unlocked when Broadsheet is done AND PSQ + Remarks done.
//
// initBroadsheetClassMenu() makes ONE server call to serverGetClassGroupCompletion
// and stores the result in App._completionData (module-level _bssCompletion alias)
// so that broadsheetStudentList and studentResultSlip can show/hide the PDF
// action bar without any additional round-trips.
//
// Locked cards use .bcm-card--locked (grayed dashed border, no hover lift)
// and display a .bcm-lock-msg explaining what still needs to be done.

Views.broadsheetClassMenu = function (params) {
  var groupKey = (params && params.groupKey) ? params.groupKey : 'Class Group';
  return (
    appBarHtml(groupKey, 'Select an option', true, 'back') +
    '<div class="view-body" id="bcm-body">' +
      '<div class="loading-placeholder">Checking completion status&hellip;</div>' +
    '</div>'
  );
};

function initBroadsheetClassMenu(params) {
  var groupKey = params ? params.groupKey : '';

  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      var body = document.getElementById('bcm-body');
      if (!result.success) {
        body.innerHTML =
          '<p class="empty-msg">' + escHtml(result.error || 'Failed to check status.') + '</p>';
        return;
      }

      // ── Cache so downstream PDF buttons can read without a server call ─────
      App._completionData = result.data;
      _bssCompletion      = result.data;

      var broadsheetUnlocked = result.data.broadsheetUnlocked;
      var resultsUnlocked    = result.data.resultsUnlocked;
      var detail             = result.data.detail || {};

      // ── Build lock messages with specific counts ────────────────────────────

      // Broadsheet lock: score count still missing
      var broadsheetLockMsg = '';
      if (!broadsheetUnlocked && detail.scores) {
        var scoresLeft = detail.scores.required - detail.scores.entered;
        broadsheetLockMsg =
          '<div class="bcm-lock-msg">&#9888; ' + scoresLeft + ' score' +
          (scoresLeft !== 1 ? 's' : '') +
          ' still missing — enter all subject scores to unlock.</div>';
      }

      // Results lock: list which items are still incomplete
      var resultsLockMsg = '';
      if (!resultsUnlocked) {
        var parts = [];
        if (!broadsheetUnlocked) {
          // Scores aren't done yet — that's the root blocker
          parts.push('all subject scores must be entered first');
        } else {
          // Scores done — PSQ or remarks are the blocker
          if (detail.psq && detail.psq.studentsComplete < detail.psq.studentsRequired) {
            var psqLeft = detail.psq.studentsRequired - detail.psq.studentsComplete;
            parts.push('PSQ ratings missing for ' + psqLeft +
              ' student' + (psqLeft !== 1 ? 's' : ''));
          }
          if (detail.remarks && detail.remarks.studentsComplete < detail.remarks.studentsRequired) {
            var remLeft = detail.remarks.studentsRequired - detail.remarks.studentsComplete;
            parts.push('remarks missing for ' + remLeft +
              ' student' + (remLeft !== 1 ? 's' : ''));
          }
        }
        resultsLockMsg =
          '<div class="bcm-lock-msg">&#9888; ' +
          (parts.length > 0 ? parts.join(' &middot; ') : 'Data incomplete') +
          ' — complete all data to unlock.</div>';
      }

      // ── Render option cards ─────────────────────────────────────────────────
      var html = '<div class="bcm-options">';

      // Card 1: Broadsheet — locked until all scores entered
      if (broadsheetUnlocked) {
        html +=
          '<button class="bcm-card" onclick="openClassBroadsheet()">' +
            '<div class="bcm-card__icon-wrap bcm-card__icon-wrap--blue">&#128202;</div>' +
            '<div class="bcm-card__body">' +
              '<span class="bcm-card__label">Broadsheet</span>' +
              '<span class="bcm-card__sub">All subjects side by side — totals, averages, grades and class positions in one full table</span>' +
            '</div>' +
            '<span class="bcm-card__arrow">&#8250;</span>' +
          '</button>';
      } else {
        html +=
          '<div class="bcm-card bcm-card--locked">' +
            '<div class="bcm-card__icon-wrap bcm-card__icon-wrap--blue">&#128202;</div>' +
            '<div class="bcm-card__body">' +
              '<span class="bcm-card__label">Broadsheet</span>' +
              '<span class="bcm-card__sub">All subjects side by side — totals, averages, grades and class positions in one full table</span>' +
              broadsheetLockMsg +
            '</div>' +
            '<span class="bcm-card__arrow">&#8250;</span>' +
          '</div>';
      }

      // Card 2: Subject Scores — always unlocked (score entry happens here)
      html +=
        '<button class="bcm-card" onclick="openSubjectScores()">' +
          '<div class="bcm-card__icon-wrap bcm-card__icon-wrap--green">&#128218;</div>' +
          '<div class="bcm-card__body">' +
            '<span class="bcm-card__label">Subject Scores</span>' +
            '<span class="bcm-card__sub">Deep-dive into any subject — see C/W, Assessment, Attendance, Tests and Exam scores for every student</span>' +
          '</div>' +
          '<span class="bcm-card__arrow">&#8250;</span>' +
        '</button>';

      // Card 3: Results — locked until broadsheet + PSQ + remarks complete
      if (resultsUnlocked) {
        html +=
          '<button class="bcm-card" onclick="openStudentList()">' +
            '<div class="bcm-card__icon-wrap bcm-card__icon-wrap--purple">&#128100;</div>' +
            '<div class="bcm-card__body">' +
              '<span class="bcm-card__label">Results</span>' +
              '<span class="bcm-card__sub">Open any student\'s full result slip — all subjects, PSQ ratings and the Form Master\'s remark</span>' +
            '</div>' +
            '<span class="bcm-card__arrow">&#8250;</span>' +
          '</button>';
      } else {
        html +=
          '<div class="bcm-card bcm-card--locked">' +
            '<div class="bcm-card__icon-wrap bcm-card__icon-wrap--purple">&#128100;</div>' +
            '<div class="bcm-card__body">' +
              '<span class="bcm-card__label">Results</span>' +
              '<span class="bcm-card__sub">Open any student\'s full result slip — all subjects, PSQ ratings and the Form Master\'s remark</span>' +
              resultsLockMsg +
            '</div>' +
            '<span class="bcm-card__arrow">&#8250;</span>' +
          '</div>';
      }

      html += '</div>';
      body.innerHTML = html;
    })
    .withFailureHandler(function () {
      var body = document.getElementById('bcm-body');
      body.innerHTML = '<p class="empty-msg">Connection error. Please try again.</p>';
    })
    .serverGetClassGroupCompletion(App.token, groupKey);
}

/**
 * Render the per-class all-subjects totals table.
 * Columns: Name | [Cls] | Sub1 | Sub2 | … | SubN | Total | Avg | Grd | Pos
 *
 * [Cls] column only appears for SSS groups (showClassColumn = true).
 * Subject headers are abbreviated to 6 chars (full name in title attribute).
 *
 * @param {HTMLElement} body — container to inject into
 * @param {Object}      data — result from serverGetBroadsheetForClass
 */
function renderClassBroadsheet(body, data) {
  var students = data.students || [];
  var subjects = data.subjects || [];
  var showClass = data.showClassColumn;
  var summary  = data.summary  || {};

  if (subjects.length === 0) {
    body.innerHTML = '<p class="empty-msg">No subjects assigned to this class group.</p>';
    return;
  }
  if (students.length === 0) {
    body.innerHTML = '<p class="empty-msg">No student data found for this class group.</p>';
    return;
  }

  // ── Summary strip ─────────────────────────────────────────────────────────
  var html = '<div class="section-card bs-summary-card">';
  html += '<div class="bs-summary-row">';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Active</span>' +
          '<strong>' + (summary.activeCount || 0) + '</strong></span>';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Total</span>' +
          '<strong>' + (summary.totalCount || 0) + '</strong></span>';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Subjects</span>' +
          '<strong>' + subjects.length + '</strong></span>';
  html += '</div></div>';

  // ── Horizontally scrollable table ─────────────────────────────────────────
  html += '<div class="bs-table-wrapper"><table class="bs-table">';
  html += '<thead><tr>';
  html += '<th class="bs-th bs-th--name">Name</th>';
  if (showClass) html += '<th class="bs-th">Cls</th>';
  subjects.forEach(function (sub) {
    var abbr = sub.subjectName.length > 6
      ? sub.subjectName.slice(0, 6) + '…'
      : sub.subjectName;
    html += '<th class="bs-th bs-th--subj" title="' + escHtml(sub.subjectName) + '">' +
              escHtml(abbr) + '</th>';
  });
  html += '<th class="bs-th bs-th--total">Tot</th>';
  html += '<th class="bs-th">Avg</th>';
  html += '<th class="bs-th">Grd</th>';
  html += '<th class="bs-th">Pos</th>';
  html += '</tr></thead><tbody>';

  students.forEach(function (s, rowIdx) {
    var isNC     = (s.termStatus === 'Not Continuing');
    var isExempt = (s.termStatus === 'Exam Exempt');
    var rowCls   = isNC ? ' bs-row--nc' : (isExempt ? ' bs-row--exempt' : '');

    // Department abbreviation for SSS groups (e.g. "SSS 1 Science" → "Sci")
    var deptLabel = '';
    if (showClass && s.className) {
      var dm = s.className.match(/\s+(science|art|commerce|humanities|business)\s*$/i);
      if (dm) deptLabel = dm[1].charAt(0).toUpperCase() + dm[1].slice(1, 3).toLowerCase();
    }

    html += '<tr class="bs-row' + rowCls + '" onclick="openStudentResult(' + rowIdx + ')">';
    html += '<td class="bs-td bs-td--name">' + escHtml(s.name || s.studentId) + '</td>';
    if (showClass) html += '<td class="bs-td">' + escHtml(deptLabel) + '</td>';

    subjects.forEach(function (sub) {
      var tot = (s.subjectTotals && s.subjectTotals[sub.subjectId] != null)
        ? s.subjectTotals[sub.subjectId] : '—';
      html += '<td class="bs-td">' + tot + '</td>';
    });

    var totalCell = (s.overallTotal != null) ? s.overallTotal : '—';
    var avgCell   = (s.average      != null) ? s.average      : '—';
    var posCell   = (s.position     != null) ? s.position     : '—';
    var gradeCell = s.grade
      ? '<span class="grade-badge ' + gradeClass(s.grade) + '">' +
          escHtml(s.grade.split(' ')[0]) + '</span>'
      : '—';

    html += '<td class="bs-td bs-td--total">' + totalCell + '</td>';
    html += '<td class="bs-td">' + avgCell   + '</td>';
    html += '<td class="bs-td">' + gradeCell + '</td>';
    html += '<td class="bs-td">' + posCell   + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  body.innerHTML = html;
}

        body.innerHTML = '<p class="empty-msg">' + escHtml(result.error || 'Failed to load students.') + '</p>';
        return;
      }
      var data = result.data;
      _bssStudents = data.students || [];

      // Update subtitle with actual term · session
      var subtitle = document.querySelector('.app-bar .subtitle');
      if (subtitle) subtitle.textContent = data.term + ' · ' + data.session;

      var html = '<div class="section-card">';
      html += '<div class="section-title">RESULT SLIPS (' + _bssStudents.length + ' STUDENTS)</div>';

      if (_bssStudents.length === 0) {
        html += '<p class="empty-msg">No students found in this class group.</p>';
      } else {
        _bssStudents.forEach(function (s, idx) {
          // Show department label for SSS groups
          var deptLabel = '';
          if (data.classIds && data.classIds.length > 1 && s.className) {
            var m = s.className.match(/\s+(science|art|commerce|humanities|business)\s*$/i);
            if (m) deptLabel = ' · ' + m[1].charAt(0).toUpperCase() + m[1].slice(1).toLowerCase();
          }
          var statusBadge = '';
          if (s.termStatus !== 'Active') {
            statusBadge = ' <span class="status-chip status-chip--' +
              (s.termStatus === 'Exam Exempt' ? 'exempt' : 'nc') + '">' +
              escHtml(s.termStatus) + '</span>';
          }
          html +=
            '<button class="fm-action-btn" onclick="openStudentResultFromList(' + idx + ')">' +
              '<div class="list-row__avatar">' + escHtml(initials(s.name)) + '</div>' +
              '<span class="fm-action-btn__label">' +
                escHtml(s.name) + deptLabel + statusBadge +
              '</span>' +
              '<span class="fm-action-btn__arrow">&#8250;</span>' +
            '</button>';
        });
      }
      html += '</div>';

      // ── Stage 5: Bulk PDF bar — shown only when results are fully unlocked ──
      // App._completionData is set by initBroadsheetClassMenu when the user
      // enters this group. If they arrived here with resultsUnlocked = true,
      // we render the bulk-PDF action bar at the bottom of the student list.
      if (App._completionData && App._completionData.resultsUnlocked && _bssStudents.length > 0) {
        html +=
          '<div class="pdf-action-bar">' +
            '<button class="pdf-action-bar__btn pdf-action-bar__btn--primary" ' +
              'id="pdf-bulk-btn" onclick="onBulkPdf()">' +
              '&#8659; Generate All PDFs' +
            '</button>' +
          '</div>';
      }

      body.innerHTML = html;
    })
    .withFailureHandler(function () {
      var body = document.getElementById('bsl-body');
      body.innerHTML = '<p class="empty-msg">Connection error. Please try again.</p>';
    })
    .serverGetBroadsheetSubjects(App.token, groupKey);
}

/**
 * Render the per-subject component score table.
 * Columns: Name | [Cls] | CW | AS | AT | T1 | T2 | EX | Tot | Grd | Pos
 * [Cls] column only appears for SSS groups (showClassColumn = true).
 *
 * @param {HTMLElement} body — container to inject into
 * @param {Object}      data — result from serverGetBroadsheetForSubject
 */
function renderSubjectBroadsheet(body, data) {
  var students  = data.students      || [];
  var summary   = data.summary       || {};
  var showClass = data.showClassColumn;

  var components = ['C/W', 'ASS', 'ATT', 'Test1', 'Test2', 'Exam'];
  var compLabels = { 'C/W': 'CW', 'ASS': 'AS', 'ATT': 'AT', 'Test1': 'T1', 'Test2': 'T2', 'Exam': 'EX' };

  if (students.length === 0) {
    body.innerHTML = '<p class="empty-msg">No student data found for this subject.</p>';
    return;
  }

  // ── Summary strip ─────────────────────────────────────────────────────────
  var html = '<div class="section-card bs-summary-card">';
  html += '<div class="bs-summary-row">';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Class Max</span>' +
          '<strong>' + (summary.classMax != null ? summary.classMax : '—') + '</strong></span>';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Average</span>' +
          '<strong>' + (summary.average != null ? summary.average : '—') + '</strong></span>';
  html += '<span class="bs-summary-item"><span class="bs-summary-label">Active</span>' +
          '<strong>' + (summary.activeCount || 0) + '</strong></span>';
  html += '</div></div>';

  // ── Horizontally scrollable table ─────────────────────────────────────────
  html += '<div class="bs-table-wrapper"><table class="bs-table">';
  html += '<thead><tr>';
  html += '<th class="bs-th bs-th--name">Name</th>';
  if (showClass) html += '<th class="bs-th">Cls</th>';
  components.forEach(function (k) { html += '<th class="bs-th">' + compLabels[k] + '</th>'; });
  html += '<th class="bs-th bs-th--total">Tot</th>';
  html += '<th class="bs-th">Grd</th>';
  html += '<th class="bs-th">Pos</th>';
  html += '</tr></thead><tbody>';

  students.forEach(function (s, rowIdx) {
    var isNC     = (s.termStatus === 'Not Continuing');
    var isExempt = (s.termStatus === 'Exam Exempt');
    var rowCls   = isNC ? ' bs-row--nc' : (isExempt ? ' bs-row--exempt' : '');

    var deptLabel = '';
    if (showClass && s.className) {
      var m = s.className.match(/\s+(science|art|commerce|humanities|business)\s*$/i);
      if (m) deptLabel = m[1].charAt(0).toUpperCase() + m[1].slice(1, 3).toLowerCase();
    }

    html += '<tr class="bs-row' + rowCls + '" onclick="openStudentResult(' + rowIdx + ')">';
    html += '<td class="bs-td bs-td--name">' + escHtml(s.name || s.studentId) + '</td>';
    if (showClass) html += '<td class="bs-td">' + escHtml(deptLabel) + '</td>';

    components.forEach(function (k) {
      var val = (s.scores && s.scores[k] !== undefined && s.scores[k] !== '') ? s.scores[k] : '—';
      html += '<td class="bs-td">' + val + '</td>';
    });

    var totalCell = (s.total    != null) ? s.total    : '—';
    var posCell   = (s.position != null) ? s.position : '—';
    var gradeCell = s.grade
      ? '<span class="grade-badge ' + gradeClass(s.grade) + '">' +
          escHtml(s.grade.split(' ')[0]) + '</span>'
      : '—';

    html += '<td class="bs-td bs-td--total">' + totalCell + '</td>';
    html += '<td class="bs-td">' + gradeCell + '</td>';
    html += '<td class="bs-td">' + posCell   + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  body.innerHTML = html;
}

/**
 * Render the complete result slip into a DOM element.
 *
 * Sections:
 *   1. Student & session information
 *   2. Academic performance table (all subjects with component scores)
 *   3. Summary (total, average, grade, position, subjects sat)
 *   4. Psychomotor / affective domain ratings (PSQ) — omitted if all empty
 *   5. Form Master's remark
 *   6. Next term information (fee, resumption) — omitted if not configured
 *
 * @param {HTMLElement} body — container to inject into
 * @param {Object}      data — result from serverGetStudentResult
 */
function renderResultSlip(body, data) {
  var student    = data.student  || {};
  var summary    = data.summary  || {};
  var subjects   = data.subjects || [];
  var psq        = data.psq      || {};
  var components = ['C/W', 'ASS', 'ATT', 'Test1', 'Test2', 'Exam'];
  var compLabels = { 'C/W': 'CW', 'ASS': 'AS', 'ATT': 'AT', 'Test1': 'T1', 'Test2': 'T2', 'Exam': 'EX' };

  var html = '';

  // ── 1. Student & session info ──────────────────────────────────────────────
  html += '<div class="section-card">';
  html += '<div class="section-title">STUDENT INFORMATION</div>';
  html += '<div class="info-card__row"><span>Student ID</span><strong>' + escHtml(student.studentId || '') + '</strong></div>';
  // slipName is set by ResultService Stage 7 patch: "SMITH David Obi" format.
  // Falls back to student.name (fullName) if the cache hasn't been refreshed yet.
  html += '<div class="info-card__row"><span>Name</span><strong>' + escHtml(student.slipName || student.name || '') + '</strong></div>';
  html += '<div class="info-card__row"><span>Class</span><strong>' + escHtml(student.className || '') + '</strong></div>';
  html += '<div class="info-card__row"><span>Session</span><strong>' + escHtml(data.session || '') + '</strong></div>';
  html += '<div class="info-card__row"><span>Term</span><strong>' + escHtml(data.term || '') + '</strong></div>';
  if (data.termStartDate) {
    html += '<div class="info-card__row"><span>Term Opens</span><strong>' + formatDate(data.termStartDate) + '</strong></div>';
  }
  if (data.termEndDate) {
    html += '<div class="info-card__row"><span>Term Ends</span><strong>' + formatDate(data.termEndDate) + '</strong></div>';
  }
  html += '</div>';

  // ── 2. Academic performance table ─────────────────────────────────────────
  html += '<div class="section-card">';
  html += '<div class="section-title">ACADEMIC PERFORMANCE</div>';
  if (subjects.length === 0) {
    html += '<p class="empty-msg">No subjects found for this student.</p>';
  } else {
    html += '<div class="bs-table-wrapper"><table class="bs-table">';
    html += '<thead><tr>';
    html += '<th class="bs-th bs-th--name">Subject</th>';
    components.forEach(function (k) {
      html += '<th class="bs-th">' + compLabels[k] + '</th>';
    });
    html += '<th class="bs-th bs-th--total">Tot</th>';
    html += '<th class="bs-th">Grd</th>';
    html += '<th class="bs-th">Pos</th>';
    html += '<th class="bs-th">Max</th>';
    html += '</tr></thead><tbody>';
    subjects.forEach(function (s) {
      html += '<tr class="bs-row">';
      html += '<td class="bs-td bs-td--name">' + escHtml(s.subjectName) + '</td>';
      components.forEach(function (k) {
        var val = (s.scores && s.scores[k] !== undefined && s.scores[k] !== '') ? s.scores[k] : '—';
        html += '<td class="bs-td">' + val + '</td>';
      });
      var totalCell = (s.total    != null) ? s.total    : '—';
      var posCell   = (s.position != null) ? s.position : '—';
      var maxCell   = (s.classMax != null) ? s.classMax : '—';
      var gradeCell = s.grade
        ? '<span class="grade-badge ' + gradeClass(s.grade) + '">' +
            escHtml(s.grade.split(' ')[0]) + '</span>'
        : '—';
      html += '<td class="bs-td bs-td--total">' + totalCell + '</td>';
      html += '<td class="bs-td">' + gradeCell + '</td>';
      html += '<td class="bs-td">' + posCell   + '</td>';
      html += '<td class="bs-td">' + maxCell   + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  // ── 3. Summary ────────────────────────────────────────────────────────────
  html += '<div class="section-card">';
  html += '<div class="section-title">SUMMARY</div>';
  if (summary.totalScore != null) {
    html += '<div class="info-card__row"><span>Total Score</span><strong>' + summary.totalScore + '</strong></div>';
  }
  if (summary.averageScore != null) {
    html += '<div class="info-card__row"><span>Average Score</span><strong>' + summary.averageScore + '</strong></div>';
  }
  if (summary.overallGrade) {
    html += '<div class="info-card__row"><span>Overall Grade</span>' +
      '<strong><span class="grade-badge ' + gradeClass(summary.overallGrade) + '">' +
      escHtml(summary.overallGrade.split(' ')[0]) + '</span></strong></div>';
  }
  if (summary.overallPosition != null) {
    html += '<div class="info-card__row"><span>Position in Class</span>' +
      '<strong>' + summary.overallPosition + ' of ' + (summary.classSize || '?') + '</strong></div>';
  }
  if (summary.subjectCount != null) {
    html += '<div class="info-card__row"><span>Subjects Sat</span><strong>' + summary.subjectCount + '</strong></div>';
  }
  html += '</div>';

  // ── 4. PSQ ratings (only if at least one rating was entered) ──────────────
  var psqKeys = Object.keys(psq).filter(function (k) {
    return psq[k] != null && psq[k] !== '';
  });
  if (psqKeys.length > 0) {
    html += '<div class="section-card">';
    html += '<div class="section-title">PSYCHOMOTOR / AFFECTIVE DOMAIN</div>';
    psqKeys.forEach(function (k) {
      // Convert camelCase key → Title Case label: "selfControl" → "Self Control"
      var label = k
        .replace(/([A-Z])/g, ' $1')
        .replace(/^(.)/, function (c) { return c.toUpperCase(); });
      html += '<div class="info-card__row"><span>' + escHtml(label) + '</span>' +
        '<strong>' + escHtml(String(psq[k])) + '</strong></div>';
    });
    html += '</div>';
  }

  // ── 5. Form Master's remark ───────────────────────────────────────────────
  if (data.remark || data.formMasterName) {
    html += '<div class="section-card">';
    html += '<div class="section-title">FORM MASTER\'S REMARK</div>';
    if (data.remark) {
      html += '<p class="rsl-remark-text">' + escHtml(data.remark) + '</p>';
    }
    if (data.formMasterName) {
      html += '<div class="info-card__row" style="margin-top:var(--space-sm)">' +
        '<span>Form Master</span><strong>' + escHtml(data.formMasterName) + '</strong></div>';
    }
    html += '</div>';
  }

  // ── 6. Next term information ──────────────────────────────────────────────
  if (data.nextTermFee || data.nextTermResumption) {
    html += '<div class="section-card">';
    html += '<div class="section-title">NEXT TERM INFORMATION</div>';
    if (data.nextTermFee) {
      html += '<div class="info-card__row"><span>Next Term Fee</span>' +
        '<strong>' + escHtml(String(data.nextTermFee)) + '</strong></div>';
    }
    if (data.nextTermResumption) {
      html += '<div class="info-card__row"><span>Resumption Date</span>' +
        '<strong>' + formatDate(data.nextTermResumption) + '</strong></div>';
    }
    html += '</div>';
  }

  body.innerHTML = html;
}

// ─── STAGE 5: PDF DOWNLOAD HELPERS ───────────────────────────────────────────

/**
 * Trigger a file download from a base64-encoded PDF string.
 * Creates a hidden <a download> element, programmatically clicks it,
 * then removes it. No popup blocker issues because this runs inside a
 * user-initiated success handler (the "Download PDF" button click chain).
 *
 * @param {string} base64   — base64 PDF data (no data: URI prefix needed here)
 * @param {string} filename — suggested filename, e.g. "John_Doe_Term1.pdf"
 */
function downloadPdf(base64, filename) {
  var link = document.createElement('a');
  link.href     = 'data:application/pdf;base64,' + base64;
  link.download = filename || 'result_slip.pdf';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/**
 * Download a single student's result slip as PDF.
 * Reads studentId and classId from App._resultData (set by initStudentResultSlip).
 * Shows a spinner on the button while the server call is in flight.
 *
 * Called by: the "Download PDF" button in the studentResultSlip pdf-action-bar.
 */
function onDownloadPdf() {
  var data = App._resultData;
  if (!data || !data.student) return;

  var btn = document.getElementById('pdf-single-btn');
  if (btn) {
    btn.disabled   = true;
    btn.innerHTML  = '<span class="pdf-action-bar__spinner"></span> Generating&hellip;';
  }

  google.script.run
    .withSuccessHandler(function (result) {
      // Re-enable button regardless of success/fail so user can retry
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML = '&#8659; Download PDF';
      }
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        showToast(result.error || 'PDF generation failed.', 'error');
        return;
      }
      downloadPdf(result.data.base64Pdf, result.data.filename);
    })
    .withFailureHandler(function () {
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML = '&#8659; Download PDF';
      }
      showToast('Connection error. PDF not generated.', 'error');
    })
    .serverGenerateResultSlipPDF(App.token, data.student.studentId, data.student.classId);
}

/**
 * Download all result slips for the current class group as a single merged PDF.
 * Reads groupKey from App.viewParams (set when navigating into broadsheetStudentList).
 * Shows a spinner on the button while the server call is in flight.
 *
 * Called by: the "Generate All PDFs" button in the broadsheetStudentList pdf-action-bar.
 *
 * Note: large class groups may take 20–30 seconds because GAS generates each
 * slip individually before merging. The button stays disabled during this time.
 */
function onBulkPdf() {
  var groupKey = App.viewParams && App.viewParams.groupKey;
  if (!groupKey) return;

  var btn = document.getElementById('pdf-bulk-btn');
  if (btn) {
    btn.disabled   = true;
    btn.innerHTML  = '<span class="pdf-action-bar__spinner"></span> Generating&hellip;';
  }

  google.script.run
    .withSuccessHandler(function (result) {
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML = '&#8659; Generate All PDFs';
      }
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        showToast(result.error || 'PDF generation failed.', 'error');
        return;
      }
      downloadPdf(result.data.base64Pdf, result.data.filename);
    })
    .withFailureHandler(function () {
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML = '&#8659; Generate All PDFs';
      }
      showToast('Connection error. PDF not generated.', 'error');
    })
    .serverGenerateBulkResultsPDF(App.token, groupKey);
}

// ─── GRADE CSS CLASS HELPER ───────────────────────────────────────────────────

/**
 * Map a grade string (e.g. "A1 Excellent") to a CSS modifier class
 * for the .grade-badge element. Only the leading letter+digit is checked.
 *
 * Modifier classes are defined in StyleBase.html:
 *   .grade-a1  { background: var(--color-success-bg); color: var(--color-success); }
 *   .grade-b2  { background: #e8f5e9; color: #2e7d32; }
 *   .grade-b3  { background: #e8f5e9; color: #2e7d32; }
 *   .grade-c   { background: #fff8e1; color: #f57f17; }  — covers C4, C5, C6
 *   .grade-d7  { background: #fff3e0; color: #e65100; }
 *   .grade-e8  { background: #fce4ec; color: #c62828; }
 *   .grade-f9  { background: #ffebee; color: #b71c1c; }
 *
 * @param {string} grade — e.g. "A1", "B2 Very Good", "F9 Fail"
 * @returns {string} CSS class name, or '' if unrecognised
 */
function gradeClass(grade) {
  if (!grade) return '';
  var g = String(grade).toUpperCase().replace(/\s.*$/, ''); // strip descriptor
  if (g === 'A1') return 'grade-a1';
  if (g === 'B2') return 'grade-b2';
  if (g === 'B3') return 'grade-b3';
  if (g[0] === 'C') return 'grade-c';   // C4, C5, C6
  if (g === 'D7') return 'grade-d7';
  if (g === 'E8') return 'grade-e8';
  if (g === 'F9') return 'grade-f9';
  return '';
}

// We wrap the Stage 5 Views.adminHome to inject a new "Admin Dashboard" tile
// without touching the Stage 5 code. The tile opens the school-wide results
// overview screen added in Stage 6.

(function () {
  var _origAdminHome = Views.adminHome;

  Views.adminHome = function () {
    var origHtml = _origAdminHome();

    // Build the new tile HTML
    var dashTile =
      '<button class="nav-tile" onclick="renderView(\'resultsOverview\')">' +
        '<span class="nav-tile__icon">📈</span>' +
        '<span class="nav-tile__label">Admin Dashboard</span>' +
        '<span class="nav-tile__sub">School-wide completion &amp; exports</span>' +
      '</button>';

    // Insert before the LAST </div> in the rendered HTML.
    // That closing div belongs to .nav-tiles — so we slot the tile just inside it.
    var lastDiv = origHtml.lastIndexOf('</div>');
    if (lastDiv !== -1) {
      return origHtml.substring(0, lastDiv) + dashTile + origHtml.substring(lastDiv);
    }
    return origHtml + dashTile;
  };
})();

// ─── EXTEND renderView: Add resultsOverview route ─────────────────────────────
//
// renderView() has a local `renderers` object we can't modify after the fact.
// We replace the function entirely here, delegating back to the original for
// all pre-existing views and handling `resultsOverview` ourselves.

(function () {
  var _origRenderView = renderView;  // capture Stage 5 reference

  renderView = function (view, params) {

    // ── Stage 6: handle the new resultsOverview view ─────────────────────────
    if (view === 'resultsOverview') {
      App.currentView     = view;
      App.viewParams      = params || {};
      App.profileMenuOpen = false;
      document.getElementById('app').innerHTML = Views.resultsOverview(App.viewParams);
      initView(view, App.viewParams);
      resetInactivityTimer();
      return;
    }

    // ── All other views: delegate to Stage 5 ────────────────────────────────
    _origRenderView(view, params);
  };
})();

// ─── EXTEND initView: Add Stage 6 inits and injections ────────────────────────
//
// We wrap initView to:
//   1. Run the Stage 5 init as normal.
//   2. After the broadsheet views finish loading, inject export bars.
//   3. After the assignments view loads, check if carry-forward is needed.
//   4. Handle our new resultsOverview view.

(function () {
  var _origInitView = initView;  // capture Stage 5 reference

  initView = function (view, params) {

    // ── Run Stage 5 init first (loads data, fills loading placeholders) ──────
    _origInitView(view, params);

    // ── Strip leading arrow characters from any "Download" buttons ───────────
    // Stage 5 may prefix download buttons with ⬇ or similar Unicode arrows.
    // This runs after each view change to clean them up without modifying Stage 5.
    // Only targets buttons whose text STARTS with a non-letter character AND
    // contains "Download" — so other icon-prefixed buttons are unaffected.
    setTimeout(function () {
      var allBtns = document.querySelectorAll('button');
      for (var bi = 0; bi < allBtns.length; bi++) {
        var btn = allBtns[bi];
        var t = (btn.textContent || '').trim();
        // Match: starts with non-word char(s) followed by "Download" anywhere
        if (/^[^\w]+.*[Dd]ownload/.test(t)) {
          btn.textContent = t.replace(/^[^\w]+\s*/, '');
        }
      }
    }, 150);


    // ── Stage 6: inject export bars and carry-forward card ───────────────────

    if (view === 'broadsheetView') {
      // Wait until the broadsheet data is rendered, then inject export buttons.
      initBroadsheetExportBar(params);
    }

    if (view === 'broadsheetSubjectDetail') {
      initScoreSheetExportBar(params);
    }

    if (view === 'assignments') {
      // After the assignments view has loaded, check carry-forward availability.
      initCarryForwardSection();
    }

    if (view === 'resultsOverview') {
      // Stage 5's initView doesn't know this view — our wrapper handles it here.
      initResultsOverview(params);
    }
  };
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────

function initResultsOverview() {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      var body = document.getElementById('overview-body');
      if (!body) return;

      if (!result || !result.success) {
        body.innerHTML =
          '<div class="page-content"><div class="alert alert--error">' +
          escHtml((result && result.error) || 'Could not load overview.') +
          '</div></div>';
        return;
      }
      renderResultsOverview(result.data);
    })
    .withFailureHandler(function (err) {
      var body = document.getElementById('overview-body');
      if (body) {
        body.innerHTML =
          '<div class="page-content"><div class="alert alert--error">Connection error: ' +
          escHtml((err && err.message) || 'Please try again.') + '</div></div>';
      }
    })
    .serverGetResultsOverview(App.token);
}

// ─── RENDER HELPER ────────────────────────────────────────────────────────────

/**
 * Build and inject the overview content into #overview-body.
 *
 * Layout per class-group card:
 *   - Group name as section title (e.g. "JSS 1")
 *   - Padded body containing:
 *       • Three progress bars: Scores, PSQ, Remarks — each shows % complete
 *       • A small count line below the bars (e.g. "75 / 259 scores entered")
 *       • Status badges: Broadsheet locked/unlocked, Results locked/unlocked
 *       • Export row: PDF + Excel buttons (disabled when broadsheet is locked)
 *
 * FIX NOTES (patch applied after initial deployment):
 *   - Progress pct now shows "xx%" (fixed width 34px) instead of "x/total"
 *     which was truncating for large classes (e.g. "0/3888" didn't fit)
 *   - Added padding wrapper inside each section-card so bars & badges don't
 *     sit flush against the card edges
 *   - Removed arrow characters (⬇) from all button labels for a cleaner UI
 *   - Status badges now render correctly using .status-badge CSS class
 *
 * @param {{ session, term, groups: [] }} data
 */
function renderResultsOverview(data) {
  var body = document.getElementById('overview-body');
  if (!body) return;

  var session = data.session || '—';
  var term    = data.term    || '—';
  var groups  = data.groups  || [];

  if (groups.length === 0) {
    body.innerHTML =
      '<div class="page-content"><div class="empty-state mt-lg">' +
        '<div class="empty-state__icon">🏫</div>' +
        '<h3>No Classes Found</h3>' +
        '<p>Sync classes from Session Settings first.</p>' +
      '</div></div>';
    return;
  }

  // ── Header: Current Period ────────────────────────────────────────────────
  var html =
    '<div class="page-content">' +
    '<div class="section-card">' +
      '<div class="section-title">CURRENT PERIOD</div>' +
      '<div class="info-card__row"><span>Session</span><strong>' + escHtml(session) + '</strong></div>' +
      '<div class="info-card__row"><span>Term</span><strong>'    + escHtml(term)    + '</strong></div>' +
    '</div>';

  // ── One card per class group ───────────────────────────────────────────────
  groups.forEach(function (g) {
    var gk  = g.groupKey || '—';
    var d   = g.detail   || {};

    // ── Calculate percentage values for the three progress bars ─────────────
    // We show PERCENTAGE (e.g. "73%") in the narrow pct label because raw
    // counts like "75/259" are too long for the 34px fixed-width label.
    // The actual count (e.g. "75 / 259 entries") is shown as a secondary
    // line below all three bars so admins can still see exact numbers.

    var scoresTotal   = (d.scores   && d.scores.required)          || 0;
    var scoresEntered = (d.scores   && d.scores.entered)           || 0;
    var scorePct      = scoresTotal > 0 ? Math.round(scoresEntered / scoresTotal * 100) : 0;

    var psqRequired   = (d.psq      && d.psq.studentsRequired)     || 0;
    var psqComplete   = (d.psq      && d.psq.studentsComplete)     || 0;
    var psqPct        = psqRequired > 0 ? Math.round(psqComplete / psqRequired * 100) : 0;

    var remRequired   = (d.remarks  && d.remarks.studentsRequired) || 0;
    var remComplete   = (d.remarks  && d.remarks.studentsComplete) || 0;
    var remPct        = remRequired > 0 ? Math.round(remComplete / remRequired * 100) : 0;

    // ── Status badges ────────────────────────────────────────────────────────
    var bsBadge = g.broadsheetUnlocked
      ? '<span class="status-badge status-badge--success">Broadsheet ✓</span>'
      : '<span class="status-badge status-badge--warn">Broadsheet 🔒</span>';
    var resBadge = g.resultsUnlocked
      ? '<span class="status-badge status-badge--success">Results ✓</span>'
      : '<span class="status-badge status-badge--warn">Results 🔒</span>';

    // ── Export button disabled state ─────────────────────────────────────────
    // Buttons are only enabled when the broadsheet lock has been lifted.
    var pdfDisabled = g.broadsheetUnlocked ? '' : ' disabled';
    var xlsDisabled = g.broadsheetUnlocked ? '' : ' disabled';

    // Safe versions of the group key for HTML attributes and JS string literals
    var gkEsc  = escHtml(gk);
    var gkJs   = gk.replace(/'/g, "\\'");
    // ID-safe version (spaces replaced with hyphens) for unique button IDs
    var gkId   = gk.replace(/\s+/g, '-');

    // ── Open card ────────────────────────────────────────────────────────────
    html += '<div class="section-card">';
    html += '<div class="section-title">' + gkEsc + '</div>';

    // ── Content wrapper: adds 12px 16px padding inside the card ─────────────
    html += '<div style="padding:12px 16px 4px;">';

    if (g.error) {
      // Show a warning banner if this group had a data-load error
      html += '<div class="alert alert--warning" style="margin-bottom:8px;">' + escHtml(g.error) + '</div>';
    } else {
      // ── Three progress bars (Scores / PSQ / Remarks) ─────────────────────
      // Each bar shows: label | track | percentage
      // The percentage label is fixed-width 34px — always "xx%" fits cleanly.

      html +=
        '<div class="overview-progress-row">' +
          '<span class="overview-label">Scores</span>' +
          '<div class="overview-bar">' +
            '<div class="overview-bar__fill' + (scorePct === 100 ? ' overview-bar__fill--full' : '') +
              '" style="width:' + scorePct + '%"></div>' +
          '</div>' +
          '<span class="overview-pct">' + scorePct + '%</span>' +
        '</div>' +
        '<div class="overview-progress-row">' +
          '<span class="overview-label">PSQ</span>' +
          '<div class="overview-bar">' +
            '<div class="overview-bar__fill' + (psqPct === 100 ? ' overview-bar__fill--full' : '') +
              '" style="width:' + psqPct + '%"></div>' +
          '</div>' +
          '<span class="overview-pct">' + psqPct + '%</span>' +
        '</div>' +
        '<div class="overview-progress-row">' +
          '<span class="overview-label">Remarks</span>' +
          '<div class="overview-bar">' +
            '<div class="overview-bar__fill' + (remPct === 100 ? ' overview-bar__fill--full' : '') +
              '" style="width:' + remPct + '%"></div>' +
          '</div>' +
          '<span class="overview-pct">' + remPct + '%</span>' +
        '</div>';

      // ── Secondary count line — exact numbers for Scores ──────────────────
      // Only shown when scores total > 0 so we don't show "0 / 0 entered"
      if (scoresTotal > 0) {
        html +=
          '<div style="font-size:11px;color:var(--color-text-sec);margin-top:4px;margin-bottom:4px;">' +
            scoresEntered + ' / ' + scoresTotal + ' score entries &nbsp;|&nbsp; ' +
            psqComplete   + ' / ' + psqRequired + ' PSQ &nbsp;|&nbsp; ' +
            remComplete   + ' / ' + remRequired + ' remarks' +
          '</div>';
      }
    }

    // ── Status badges ────────────────────────────────────────────────────────
    html += '<div class="overview-badges" style="margin-top:10px;">' + bsBadge + resBadge + '</div>';

    // Close content wrapper
    html += '</div>';

    // ── Export buttons ────────────────────────────────────────────────────────
    // Rendered outside the padded wrapper so the border-top sits flush at the
    // card edge with the same horizontal padding as the section-title above.
    html +=
      '<div class="overview-export-row" style="padding:10px 16px 12px;">' +
        '<button class="overview-export-btn" id="pdf-btn-' + gkId + '"' + pdfDisabled +
          ' onclick="overviewDownloadPDF(\'' + gkJs + '\', this)">' +
          'PDF' +
        '</button>' +
        '<button class="overview-export-btn" id="xls-btn-' + gkId + '"' + xlsDisabled +
          ' onclick="overviewDownloadExcel(\'' + gkJs + '\', this)">' +
          'Excel' +
        '</button>' +
      '</div>';

    html += '</div>'; // end section-card
  });

  html += '</div>'; // end page-content
  body.innerHTML = html;
}

/**
 * Download the broadsheet PDF for a class group from the overview screen.
 * @param {string}      groupKey — e.g. "JSS 1"

function overviewDownloadPDF(groupKey, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  google.script.run
    .withSuccessHandler(function (result) {
      if (btn) { btn.disabled = false; btn.textContent = 'PDF'; }
      if (handleSessionExpired(result)) return;
      if (!result || !result.success) {
        showToast(result.error || 'PDF export failed.', 'error');
        return;

    })
    .withFailureHandler(function () {
      if (btn) { btn.disabled = false; btn.textContent = 'PDF'; }
      showToast('Connection error. Try again.', 'error');

    .serverGetBroadsheetPDF(App.token, groupKey);

// BROADSHEET VIEW — Export bar injection
// After the broadsheetView loads, we inject PDF + Excel download buttons.
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Inject export buttons at the bottom of the broadsheetView after the
 * Stage 5 init has finished rendering. Uses polling to detect when the
 * loading placeholder has been replaced with real content.
 *
 * @param {{ groupKey: string }} params
 */
function initBroadsheetExportBar(params) {
  var groupKey = params && params.groupKey;
  if (!groupKey) return;

  // Poll every 300ms (max 10 seconds) for the broadsheet table to appear.
  // The Stage 5 init fetches data asynchronously — we wait for it to finish.
  var attempts    = 0;
  var maxAttempts = 33; // 33 × 300ms ≈ 10 seconds

  var poll = setInterval(function () {
    attempts++;
    var app = document.getElementById('app');

    // Stop if the user has navigated away
    if (!app || App.currentView !== 'broadsheetView') {
      clearInterval(poll);
      return;
    }

    // Broadsheet table found — data has loaded, safe to inject export bar
    var table = app.querySelector('.bs-table');
    if (table) {
      clearInterval(poll);
      injectBroadsheetExportBar(groupKey, app);
      return;
    }

    // Error state — loaded but failed, don't inject
    var errMsg = app.querySelector('.alert--error, .empty-msg');
    if (errMsg) {
      clearInterval(poll);
      return;
    }

    if (attempts >= maxAttempts) {
      clearInterval(poll); // timed out
    }
  }, 300);
}

/**
 * Physically inject the export bar HTML into the DOM.
 * Called once the broadsheet table is detected in the DOM.
 *
 * @param {string}      groupKey
 * @param {HTMLElement} app        — the #app element
 */
function injectBroadsheetExportBar(groupKey, app) {
  // Guard: don't inject twice if init fires more than once
  if (document.getElementById('broadsheet-export-bar')) return;

  var gkJs = groupKey.replace(/'/g, "\\'");
  var bar  = document.createElement('div');
  bar.id        = 'broadsheet-export-bar';
  bar.className = 'export-action-bar';
  bar.innerHTML =
    '<div class="export-action-bar__title">Export Broadsheet</div>' +
    '<div class="export-action-bar__buttons">' +
      '<button class="pdf-action-bar__btn pdf-action-bar__btn--primary" id="bs-pdf-btn" ' +
        'onclick="downloadBroadsheetPDF(\'' + gkJs + '\', this)">' +
        'PDF' +
      '</button>' +
      '<button class="pdf-action-bar__btn pdf-action-bar__btn--outline" id="bs-xls-btn" ' +
        'onclick="downloadBroadsheetExcel(\'' + gkJs + '\', this)">' +
        'Excel' +
      '</button>' +
    '</div>';

  app.appendChild(bar);
}
