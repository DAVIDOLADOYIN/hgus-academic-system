<script>
/* ═══════════════════════════════════════════════════════════════════════════
   HGUS Academic Result Management System — Client-Side SPA
   Stage 5 — Generation Locks & PDF Export

   HOW THIS FILE IS ORGANISED
   ──────────────────────────
   1.  App state & constants
   2.  Initialisation (DOMContentLoaded)
   3.  Routing  (routeToHome, renderView, initView)
   4.  Navigation helpers  (navigateTo, navigateBack)  ← Stage 3 additions
   5.  Session management
   6.  Inactivity tracking
   7.  Loading overlay / toast
   8.  Helpers  (escHtml, formatDate, …)
   9.  Profile menu + app bar
   10. Views — Auth  (login, forceChangePassword, changePassword)
   11. Views — Admin (adminHome updated, sessionSettings, classesSubjects,
                      assignments, userList, addUser, editUser)
   12. Views — Teacher home  (two-section FM + TS layout)   ← Stage 3
   13. Views — Score entry   (fmClassOverview, componentSelector,
                              scoreEntry, psqEntry, remarksEntry,
                              manageClassList)               ← Stage 3
   14. Views — Broadsheet & Results (broadsheetHome, broadsheetClassMenu,
                              broadsheetView [per-class], broadsheetSubjectScores,
                              broadsheetSubjectDetail [per-subject],
                              broadsheetStudentList, studentResultSlip) ← Stage 4
   15. Stage 5 additions — lock-aware broadsheetClassMenu, PDF download
                              buttons on studentResultSlip and
                              broadsheetStudentList, PDF helper functions

   MODIFICATION GUIDE
   ──────────────────
   • Adding a view: (a) add Views.myView renderer, (b) add to renderers map
     in renderView(), (c) add async init to inits map in initView(),
     (d) add CSS to StyleBase.html.
   • ALL server-call success handlers MUST call handleSessionExpired(result)
     as their very first line — see that function's comment for why.
   • Use navigateTo(view, params) for score-entry screens so the back button
     works correctly.  Use renderView() only for root-level navigation.
   ═══════════════════════════════════════════════════════════════════════════ */

// ─── 1. APPLICATION STATE ─────────────────────────────────────────────────────

const App = {
  // ── Always present ───────────────────────────────────────────────────────
  token:              null,   // auth token (stored in sessionStorage)
  user:               null,   // { staffId, name, role, forcePasswordChange }
  settings:           null,   // active session/term settings

  // ── View tracking ────────────────────────────────────────────────────────
  currentView:        null,
  viewParams:         {},
  profileMenuOpen:    false,

  // ── Timers ───────────────────────────────────────────────────────────────
  inactivityTimer:    null,
  usernameCheckTimer: null,

  // ── Stage 3: back-navigation history ─────────────────────────────────────
  // navigateTo() pushes here; navigateBack() pops.
  // Always reset to [] on routeToHome() and clearSession().
  _navHistory:         [],

  // ── Stage 3: cached assignment data ──────────────────────────────────────
  // Loaded once in initAdminHome or initTeacherHome and reused until logout.
  _assignmentsLoaded:  false,
  _myFMClasses:        [],   // [{ assignmentId, classId, className, grantedFullAccess }]
  _myTSAssignments:    [],   // [{ assignmentId, classId, className, subjectId, subjectName, term, session }]

  // ── Stage 3: transient score-entry screen state ───────────────────────────
  // Each field is replaced each time a new screen is entered.
  _scoreData:          null,  // from serverGetScoresForComponent
  _psqData:            null,  // from serverGetClassPSQ
  _remarksData:        null,  // from serverGetClassRemarks
  _statusData:         null,  // from serverGetClassStudentStatus
  _currentPsqIndex:    0,     // which student is active in PSQ entry

  // ── Stage 4: broadsheet and result slip state ─────────────────────────────
  // _broadsheetData is shared by both the per-class and per-subject broadsheet
  // views — openStudentResult() reads from it to navigate to the result slip.
  _broadsheetData: null,  // from serverGetBroadsheetForClass or serverGetBroadsheetForSubject
  _resultData:     null,  // from serverGetStudentResult

  // ── Stage 5: completion / lock state ─────────────────────────────────────
  // Cached after initBroadsheetClassMenu fetches it.  Cleared on logout.
  // Stored here so that the PDF handlers on the child screens can read it
  // without needing another server round-trip.
  _completionData: null   // from serverGetClassGroupCompletion
};

const TOKEN_KEY     = 'hgus_token';   // sessionStorage key
const INACTIVITY_MS = 5 * 60 * 1000; // 5-minute auto-logout

// ─── 2. INITIALISATION ───────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function () {
  App.token = sessionStorage.getItem(TOKEN_KEY);
  if (App.token) {
    showLoading('Restoring your session…');
    google.script.run
      .withSuccessHandler(onSessionValidated)
      .withFailureHandler(function () { onSessionValidated({ valid: false }); })
      .serverValidateSession(App.token);
  } else {
    renderView('login');
  }
  setupInactivityTracking();
});

function onSessionValidated(result) {
  hideLoading();
  if (!result.valid) {
    clearSession();
    renderView('login');
  } else {
    App.user     = result.session;
    App.settings = result.settings;
    routeToHome();
  }
}

// ─── 3. ROUTING ──────────────────────────────────────────────────────────────

/**
 * Navigate to the correct home screen for the logged-in user's role.
 * Always resets the back-navigation history (home is always the root).
 */
function routeToHome() {
  App._navHistory = []; // home is always the root — clear any back history
  if (App.user.forcePasswordChange) {
    renderView('forceChangePassword');
    return;
  }
  const role = App.user.role;
  if (role === 'Super Admin' || role === 'Admin') {
    renderView('adminHome');
  } else {
    renderView('teacherHome');
  }
}

/**
 * Render a named view, passing optional params to the renderer and init.
 * For score-entry drill-down screens, prefer navigateTo() so back works.
 * Use renderView() directly only for home / login / top-level screens.
 *
 * @param {string}  view   - Key in the renderers map below
 * @param {Object} [params] - Data available to the renderer and init function
 */
function renderView(view, params) {
  App.currentView     = view;
  App.viewParams      = params || {};
  App.profileMenuOpen = false;

  const app = document.getElementById('app');

  const renderers = {
    // ── Auth (all stages) ─────────────────────────────────────────────────
    login:                Views.login,
    forceChangePassword:  Views.forceChangePassword,
    changePassword:       Views.changePassword,

    // ── Admin management (Stage 1–2, unchanged) ───────────────────────────
    adminHome:            Views.adminHome,
    sessionSettings:      Views.sessionSettings,
    classesSubjects:      Views.classesSubjects,
    assignments:          Views.assignments,
    userList:             Views.userList,
    addUser:              Views.addUser,
    editUser:             Views.editUser,

    // ── Score entry (Stage 3) ─────────────────────────────────────────────
    teacherHome:          Views.teacherHome,
    fmClassOverview:      Views.fmClassOverview,
    componentSelector:    Views.componentSelector,
    scoreEntry:           Views.scoreEntry,
    psqEntry:             Views.psqEntry,
    remarksEntry:         Views.remarksEntry,
    manageClassList:      Views.manageClassList,

    // ── Broadsheet & Results (Stage 4) ────────────────────────────────────
    broadsheetHome:          Views.broadsheetHome,
    broadsheetClassMenu:     Views.broadsheetClassMenu,     // lock-aware menu (Stage 5 rewrite)
    broadsheetView:          Views.broadsheetView,           // per-class all-subjects totals table
    broadsheetSubjectScores: Views.broadsheetSubjectScores, // subjects list → subject detail
    broadsheetSubjectDetail: Views.broadsheetSubjectDetail, // per-subject component score table
    broadsheetStudentList:   Views.broadsheetStudentList,   // students list → result slip
    studentResultSlip:       Views.studentResultSlip
  };

  if (!renderers[view]) {
    app.innerHTML = '<p style="padding:16px">Unknown view: ' + view + '</p>';
    return;
  }
  app.innerHTML = renderers[view](App.viewParams);
  initView(view, App.viewParams);
  resetInactivityTimer();
}

/**
 * Call the async initialiser for a view (if one exists).
 * Initialisers fetch server data and fill in the loading-state placeholder
 * HTML that the Views.xxx renderer already put on screen.
 */
function initView(view, params) {
  const inits = {
    // Stage 1–2
    adminHome:         initAdminHome,      // updated in Stage 3
    userList:          initUserList,
    addUser:           initAddUser,
    editUser:          initEditUser,
    sessionSettings:   initSessionSettings,
    classesSubjects:   initClassesSubjects,
    assignments:       initAssignments,

    // Stage 3
    teacherHome:       initTeacherHome,
    fmClassOverview:   initFmClassOverview,
    componentSelector: initComponentSelector,
    scoreEntry:        initScoreEntry,
    psqEntry:          initPsqEntry,
    remarksEntry:      initRemarksEntry,
    manageClassList:   initManageClassList,

    // Stage 4 (base views — unchanged)
    broadsheetHome:          initBroadsheetHome,
    broadsheetView:          initBroadsheetView,
    broadsheetSubjectScores: initBroadsheetSubjectScores,
    broadsheetSubjectDetail: initBroadsheetSubjectDetail,
    broadsheetStudentList:   initBroadsheetStudentList,
    studentResultSlip:       initStudentResultSlip,

    // Stage 5 — broadsheetClassMenu now has an async init for lock-state fetching
    broadsheetClassMenu: initBroadsheetClassMenu
  };
  if (inits[view]) inits[view](params);
}

// ─── 4. NAVIGATION HELPERS (Stage 3) ─────────────────────────────────────────

/**
 * Navigate to a view and push the current position onto the back-stack.
 * Use this for all score-entry screens so the ← back button is
 * context-aware regardless of how the user arrived at the screen.
 *
 * Example:
 *   navigateTo('componentSelector', { classId:'JSS1', subjectId:'MATH01', ... })
 *
 * @param {string}  view    - Target view name
 * @param {Object} [params] - Params passed to the target renderer and init
 */
function navigateTo(view, params) {
  if (App.currentView) {
    App._navHistory.push({ view: App.currentView, params: App.viewParams });
  }
  renderView(view, params);
}

/**
 * Return to the previous view by popping the back-stack.
 * Falls back to routeToHome() if the stack is empty.
 */
function navigateBack() {
  const prev = App._navHistory.pop();
  if (prev) renderView(prev.view, prev.params);
  else      routeToHome();
}

// ─── 5. SESSION MANAGEMENT ───────────────────────────────────────────────────

function saveSession(token, user, settings) {
  App.token    = token;
  App.user     = user;
  App.settings = settings || App.settings;
  sessionStorage.setItem(TOKEN_KEY, token);
}

/**
 * Clear ALL client-side state, including Stage 3, Stage 4, and Stage 5 caches.
 * Called on logout, session expiry, and navigation to login.
 */
function clearSession() {
  App.token    = null;
  App.user     = null;
  App.settings = null;
  sessionStorage.removeItem(TOKEN_KEY);
  // Reset Stage 3 state so stale data is never shown after re-login
  App._navHistory        = [];
  App._assignmentsLoaded = false;
  App._myFMClasses       = [];
  App._myTSAssignments   = [];
  App._scoreData         = null;
  App._psqData           = null;
  App._remarksData       = null;
  App._statusData        = null;
  App._currentPsqIndex   = 0;
  // Stage 4 state
  App._broadsheetData = null;
  App._resultData     = null;
  // Stage 5 state
  App._completionData = null;
}

/**
 * Central SESSION_EXPIRED guard — call at the TOP of every
 * withSuccessHandler that sends a token to the server.
 *
 * If the server responded with { success:false, code:'SESSION_EXPIRED' }
 * this function clears the session, goes to login, shows a toast, and
 * returns TRUE so the caller can immediately return without further action.
 *
 * Usage:
 *   .withSuccessHandler(function (result) {
 *     if (handleSessionExpired(result)) return;
 *     … normal handler logic …
 *   })
 */
function handleSessionExpired(result) {
  if (result && !result.success && result.code === 'SESSION_EXPIRED') {
    clearSession();
    renderView('login');
    showToast('Your session has expired. Please log in again.', 'error');
    return true;
  }
  return false;
}

function logout() {
  closeProfileMenu();
  const token = App.token;
  clearSession();
  if (token) google.script.run.serverLogout(token);
  renderView('login');
  showToast('You have been logged out.', 'default');
}

// ─── 6. INACTIVITY TRACKING ──────────────────────────────────────────────────

function setupInactivityTracking() {
  ['click', 'keydown', 'touchstart', 'scroll'].forEach(function (ev) {
    document.addEventListener(ev, resetInactivityTimer, { passive: true });
  });
}

function resetInactivityTimer() {
  if (App.inactivityTimer) clearTimeout(App.inactivityTimer);
  if (App.token) {
    App.inactivityTimer = setTimeout(function () {
      clearSession();
      renderView('login');
      showToast('You were logged out due to inactivity.', 'default');
    }, INACTIVITY_MS);
  }
}

// ─── 7. LOADING OVERLAY / TOAST ──────────────────────────────────────────────

function showLoading(msg) {
  let overlay = document.getElementById('loading-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'loading-overlay';
    overlay.className = 'loading-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML =
    '<div class="spinner spinner--blue"></div>' +
    '<p>' + (msg || 'Loading…') + '</p>';
  overlay.style.display = 'flex';
}

function hideLoading() {
  const overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.style.display = 'none';
}

function showToast(message, type) {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast' +
    (type === 'success' ? ' toast--success' : type === 'error' ? ' toast--error' : '');
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(function () {
    requestAnimationFrame(function () { toast.classList.add('toast--show'); });
  });
  setTimeout(function () {
    toast.classList.remove('toast--show');
    setTimeout(function () { if (container.contains(toast)) container.removeChild(toast); }, 300);
  }, 3500);
}

// ─── 8. HELPERS ──────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name) {
  if (!name) return '?';
  const parts = String(name).trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

/**
 * Generates a 2-letter abbreviation for a subject name.
 * Rules:
 *   1. Split into words, strip short noise words (and, of, the, a, in, &).
 *   2. If 2+ significant words remain, take the first letter of each of the first two.
 *   3. If only 1 significant word remains, take its first 2 letters.
 * Examples: "Agricultural Science" → "AS", "Mathematics" → "MA",
 *           "English Language" → "EL", "Basic Technology" → "BT".
 *
 * @param {string} name - Full subject name.
 * @returns {string} 2-character upper-case abbreviation.
 */
function subjectAbbr(name) {
  if (!name) return '??';
  var noise = /^(and|of|the|a|in|&|for|to|at)$/i;
  var words = String(name).trim().split(/\s+/).filter(function (w) {
    return !noise.test(w);
  });
  if (words.length >= 2) {
    return (words[0][0] + words[1][0]).toUpperCase();
  }
  if (words.length === 1) {
    return (words[0][0] + (words[0][1] || words[0][0])).toUpperCase();
  }
  return '??';
}

function roleBadge(role) {
  const map = { 'Super Admin': 'super-admin', 'Admin': 'admin', 'Teacher': 'teacher' };
  return '<span class="badge badge--' + (map[role] || 'teacher') + '">' + escHtml(role) + '</span>';
}

function statusBadge(status) {
  const map = { 'Active': 'active', 'On Leave': 'on-leave', 'Resigned': 'resigned' };
  return '<span class="badge badge--' + (map[status] || 'active') + '">' + escHtml(status) + '</span>';
}

function sessionLabel() {
  if (!App.settings) return '';
  const s = App.settings;
  if (!s.activeSession && !s.activeTerm) return 'No session set';
  return (s.activeSession || '') + (s.activeTerm ? ' · ' + s.activeTerm : '');
}

function formatDateTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return String(isoStr);
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return DAYS[d.getDay()] + ', ' + String(d.getDate()).padStart(2,'0') +
    ' ' + MONTHS[d.getMonth()] + ', ' + d.getFullYear() +
    ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function formatDate(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return String(isoStr);
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return DAYS[d.getDay()] + ', ' + String(d.getDate()).padStart(2,'0') +
    ' ' + MONTHS[d.getMonth()] + ', ' + d.getFullYear();
}

function setButtonLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) { btn.classList.add('btn-loading'); btn.disabled = true; }
  else         { btn.classList.remove('btn-loading'); btn.disabled = false; }
}

function showFieldError(fieldId, message) {
  const field = document.getElementById(fieldId);
  if (field) field.classList.add('error');
  const hint = document.getElementById(fieldId + '-hint');
  if (hint) { hint.textContent = message; hint.className = 'form-hint error'; }
}

function clearFieldError(fieldId) {
  const field = document.getElementById(fieldId);
  if (field) field.classList.remove('error');
  const hint = document.getElementById(fieldId + '-hint');
  if (hint) { hint.textContent = ''; hint.className = 'form-hint'; }
}

function showAlert(containerId, message, type) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML =
    '<div class="alert alert--' + (type || 'error') + '">' +
    '<span>' + escHtml(message) + '</span></div>';
}

function clearAlert(containerId) {
  const container = document.getElementById(containerId);
  if (container) container.innerHTML = '';
}

// ─── 9. PROFILE MENU + APP BAR ───────────────────────────────────────────────

function toggleProfileMenu() {
  if (App.profileMenuOpen) closeProfileMenu();
  else openProfileMenu();
}

function openProfileMenu() {
  const existing = document.getElementById('profile-menu');
  if (existing) existing.remove();
  App.profileMenuOpen = true;
  const isAdmin = App.user && (App.user.role === 'Admin' || App.user.role === 'Super Admin');

  // Name may live under different keys depending on whether the session was
  // restored from a token (result.session) or set fresh from login (result.user).
  // Check both common field names so the display is always populated.
  const displayName = App.user
    ? (App.user.name || App.user.staffName || App.user.displayName || '')
    : '';
  const displayRole    = App.user ? (App.user.role    || '') : '';
  const displayStaffId = App.user ? (App.user.staffId || '') : '';

  const menu = document.createElement('div');
  menu.id = 'profile-menu';
  menu.className = 'profile-menu';
  menu.innerHTML =
    // ── Header: avatar pill + full name + role · staffId ──
    '<div class="profile-menu__header">' +
      '<div class="profile-menu__avatar">' + escHtml(initials(displayName)) + '</div>' +
      '<div class="profile-menu__info">' +
        '<div class="profile-menu__name">' + escHtml(displayName || displayStaffId) + '</div>' +
        '<div class="profile-menu__role">' + escHtml(displayRole) +
          (displayStaffId ? ' · ' + escHtml(displayStaffId) : '') + '</div>' +
      '</div>' +
    '</div>' +
    '<button class="profile-menu__item" onclick="goChangePassword()">🔑 Change Password</button>' +
    (isAdmin
      ? '<button class="profile-menu__item" onclick="closeProfileMenu();renderView(\'adminHome\')">🏠 Admin Home</button>'
      : '') +
    '<button class="profile-menu__item profile-menu__item--danger" onclick="logout()">🚪 Log Out</button>';
  document.querySelector('.app-bar') && document.querySelector('.app-bar').appendChild(menu);
  setTimeout(function () {
    document.addEventListener('click', function outsideClick(e) {
      if (!menu.contains(e.target)) {
        closeProfileMenu();
        document.removeEventListener('click', outsideClick);
      }
    });
  }, 0);
}

function closeProfileMenu() {
  const menu = document.getElementById('profile-menu');
  if (menu) menu.remove();
  App.profileMenuOpen = false;
}

function goChangePassword() { closeProfileMenu(); renderView('changePassword'); }

/**
 * Build the top app-bar HTML string.
 *
 * @param {string}  title      - Main heading shown in the bar
 * @param {string}  subtitle   - Smaller subheading below the title
 * @param {boolean} showBack   - Whether to render a back arrow
 * @param {string}  backTarget - View name to jump to, OR the special string
 *                               'back' to call navigateBack() (history-aware).
 *                               Use 'back' for all Stage 3 drill-down screens.
 */
function appBarHtml(title, subtitle, showBack, backTarget) {
  // Decide the onclick action for the back button
  const backAction = (backTarget === 'back')
    ? 'navigateBack()'
    : "renderView('" + (backTarget || '') + "')";

  const user = App.user;
  return (
    '<div class="app-bar">' +
      (showBack
        // SVG chevron instead of a Unicode arrow — guarantees pixel-perfect
        // vertical centering on all Android/iOS fonts regardless of glyph metrics.
        ? '<button class="app-bar__back" onclick="' + backAction + '" aria-label="Back">' +
          '<svg width="9" height="15" viewBox="0 0 9 15" fill="none" aria-hidden="true">' +
          '<path d="M7.5 1.5L2 7.5L7.5 13.5" stroke="white" stroke-width="2.2" ' +
          'stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
          '</button>'
        : '') +
      '<div class="app-bar__title">' +
        '<h1>' + escHtml(title) + '</h1>' +
        (subtitle ? '<div class="subtitle">' + escHtml(subtitle) + '</div>' : '') +
      '</div>' +
      '<span class="session-badge">' + escHtml(sessionLabel()) + '</span>' +
      '<button class="app-bar__avatar" onclick="toggleProfileMenu()" aria-label="Profile menu">' +
        (user ? initials(user.name) : '?') +
      '</button>' +
    '</div>'
  );
}

const Views = {};

const COMPONENT_DISPLAY_LABEL = {

// ─── LOGIN ────────────────────────────────────────────────────────────────────

Views.login = function () {
  return (
    '<div class="login-screen">' +

          '<input class="form-input" type="text" id="login-username" autocomplete="username" ' +
            'autocapitalize="none" spellcheck="false" placeholder="Enter your username">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label" for="login-password">Password</label>' +

            '<input class="form-input form-input--icon" type="password" id="login-password" ' +

function togglePwVisibility(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else                           { input.type = 'password'; btn.textContent = '👁'; }
}

function submitLogin() {
  const username = (document.getElementById('login-username').value || '').trim();
  const password = document.getElementById('login-password').value || '';
  clearAlert('login-error');
  if (!username) { showAlert('login-error', 'Please enter your username.', 'error'); return; }
  if (!password) { showAlert('login-error', 'Please enter your password.', 'error'); return; }
  setButtonLoading('login-btn', true);
  google.script.run
    .withSuccessHandler(onLoginResult)
    .withFailureHandler(function () {
      setButtonLoading('login-btn', false);
      showAlert('login-error', 'Connection error. Please try again.', 'error');
    })
    .serverLogin(username, password);
}

function onLoginResult(result) {
  setButtonLoading('login-btn', false);
  if (!result.success) { showAlert('login-error', result.error, 'error'); return; }
  google.script.run
    .withSuccessHandler(function (settingsResult) {
      const settings = (settingsResult && settingsResult.success) ? settingsResult.data : {};
      saveSession(result.token, result.user, settings);
      if (result.forcePasswordChange) renderView('forceChangePassword');
      else { routeToHome(); showToast('Welcome back, ' + result.user.name.split(' ')[0] + '!', 'success'); }
    })
    .withFailureHandler(function () {
      saveSession(result.token, result.user, {});
      if (result.forcePasswordChange) renderView('forceChangePassword');
      else routeToHome();
    })
    .serverGetSessionSettings(result.token);
}

function submitChangePassword() {
  clearAlert('cp-alert'); clearFieldError('cp-current'); clearFieldError('cp-new'); clearFieldError('cp-confirm');
  const current = document.getElementById('cp-current').value || '';
  const newPw   = document.getElementById('cp-new').value     || '';
  const conf    = document.getElementById('cp-confirm').value  || '';
  let valid = true;
  if (!current)          { showFieldError('cp-current', 'Current password is required.'); valid = false; }
  if (newPw.length < 8)  { showFieldError('cp-new', 'Password must be at least 8 characters.'); valid = false; }

  google.script.run
    .withSuccessHandler(function (result) {

      if (handleSessionExpired(result)) return;
      if (!result.success) {

      renderView(back);

      showAlert('cp-alert', 'Connection error. Please try again.', 'error');

    .serverChangePassword(App.token, current, newPw, conf);

/**
 * Shared helper — detect student data sources then show a confirmation panel.
 *
 * Flow:
 *   1. Show a loading message in ss-sync-result.
 *   2. Call serverGetStudentDataSources to list tabs and get the auto-detected one.
 *   3. Render a confirmation panel showing the detected tab with a Proceed button
 *      and a "Change Source" dropdown for overriding.
 *   4. When the Admin clicks Proceed, call onConfirm(selectedTabName).
 *
 * @param {string}   actionBtnId  — button to show loading spinner on while detecting
 * @param {Function} onConfirm    — called with the confirmed tab name string
 */
function pickStudentDataSource(actionBtnId, onConfirm) {
  var extId = (App.settings && App.settings.externalSheetId) || '';
  if (!extId) {
    showAlert('ss-sync-result', 'Please save the External Sheet ID first.', 'error');
    return;
  }
  clearAlert('ss-sync-result');
  setButtonLoading(actionBtnId, true);

  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading(actionBtnId, false);
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        showAlert('ss-sync-result', result.error, 'error');
        return;
      }

      var detected = result.data.detected;   // best-match tab name or null
      var allTabs  = result.data.all;        // all StudentData tabs found

      // Build the dropdown options — selected = detected (if any)
      var optionsHtml = allTabs.map(function (name) {
        var sel = (name === detected) ? ' selected' : '';
        return '<option value="' + escHtml(name) + '"' + sel + '>' + escHtml(name) + '</option>';
      }).join('');

      // Status line: green tick if auto-detected, amber warning if not
      var statusHtml = detected
        ? '<span style="color:var(--color-success);font-weight:600;">✓ Auto-detected for ' +
          escHtml(App.settings.activeSession || 'active session') + '</span>'
        : '<span style="color:var(--color-warning);font-weight:600;">⚠ Could not auto-detect — please select manually</span>';

      // Render the confirmation panel into ss-sync-result
      var panelHtml =
        '<div id="source-confirm-panel" style="' +
          'background:var(--color-surface);border:1px solid var(--color-border);' +
          'border-radius:var(--radius-md);padding:var(--space-md);margin-bottom:var(--space-sm);">' +
          '<div style="font-size:var(--text-xs);color:var(--color-text-sec);margin-bottom:4px;">STUDENT DATA SOURCE</div>' +
          '<div style="margin-bottom:6px;">' + statusHtml + '</div>' +
          // Dropdown — pre-selected to detected tab (or first tab if none detected)
          '<select id="source-tab-select" class="form-select" style="margin-bottom:var(--space-sm);">' +
            optionsHtml +
          '</select>' +
          '<div style="display:flex;gap:var(--space-sm);">' +
            '<button class="btn btn--primary" style="flex:1;" id="source-confirm-btn" ' +
              'onclick="confirmStudentDataSource()">Proceed with Selected</button>' +
            '<button class="btn btn--ghost" onclick="cancelSourceSelection()">' +
              'Cancel</button>' +
          '</div>' +
        '</div>';

      document.getElementById('ss-sync-result').innerHTML = panelHtml;

      // Store the callback so confirmStudentDataSource() can call it
      window._sourceConfirmCallback = onConfirm;
    })
    .withFailureHandler(function () {
      setButtonLoading(actionBtnId, false);
      showAlert('ss-sync-result', 'Could not read the external spreadsheet. Please try again.', 'error');
    })
    .serverGetStudentDataSources(App.token);
}

/** Called when Admin clicks "Proceed with Selected" in the confirmation panel. */
function confirmStudentDataSource() {
  var select  = document.getElementById('source-tab-select');
  var tabName = select ? select.value : '';

/**
 * Refresh Student List — step 1: confirm the data source tab.
 * Step 2: save confirmed tab name to settings.
 * Step 3: fetch the full class list.
 * Step 4: refresh each class one at a time, updating the progress bar after each.
 *
 * This per-class approach (vs a single 'all' call) lets us show real progress
 * so the Admin always knows how far along the refresh is.
 */
function runRefreshStudents() {
  pickStudentDataSource('ss-refresh-students-btn', function (tabName) {

    // ── Step 2: save the confirmed tab name ───────────────────────────────
    google.script.run
      .withSuccessHandler(function (saveResult) {
        if (handleSessionExpired(saveResult)) return;
        if (App.settings) App.settings.studentDataTab = tabName;

        // ── Step 3: get the full class list so we can iterate per class ───
        google.script.run
          .withSuccessHandler(function (classResult) {
            if (handleSessionExpired(classResult)) return;
            if (!classResult.success) {
              showAlert('ss-sync-result', 'Could not load class list. Please try again.', 'error');
              return;
            }

            // Only process JSS and SSS classes — same filter the server applies.
            var classes = (classResult.data || []).filter(function (c) {
              var n = String(c.className || '').toUpperCase();
              return n.startsWith('JSS') || n.startsWith('SSS');
            });

            if (classes.length === 0) {
              showAlert('ss-sync-result', 'No classes found. Please sync classes first.', 'error');
              return;
            }

            // ── Step 4: refresh class by class ────────────────────────────
            // Disable the button and show the progress bar.
            setButtonLoading('ss-refresh-students-btn', true);
            refreshProgressShow(classes.length);

            var completedCount = 0;   // classes finished
            var totalStudents  = 0;   // students cached across all classes
            var errors         = [];  // collect any per-class errors

            /**
             * Refresh one class at index `idx`, then move to the next.
             * Recursion via the success handler keeps calls sequential —
             * GAS does not support Promise.all so we chain manually.
             */
            function refreshNextClass(idx) {
              if (idx >= classes.length) {
                // ── All classes done ───────────────────────────────────────
                setButtonLoading('ss-refresh-students-btn', false);
                refreshProgressHide();

                if (errors.length > 0) {
                  showAlert('ss-sync-result',
                    totalStudents + ' student(s) refreshed. ' + errors.length + ' class(es) had errors: ' + errors.join(', '),
                    'error');
                } else {
                  showAlert('ss-sync-result',
                    '✓ ' + totalStudents + ' student(s) refreshed across ' + classes.length + ' class(es). Source: "' + tabName + '".',
                    'success');
                }
                return;
              }

              var cls = classes[idx];
              // Update the label before starting this class so the admin sees
              // which class is currently being processed.
              refreshProgressUpdate(
                'Refreshing ' + escHtml(cls.className) + '…',
                completedCount,
                classes.length
              );

              google.script.run
                .withSuccessHandler(function (result) {
                  if (handleSessionExpired(result)) return;

                  completedCount++;
                  if (result && result.success && result.data) {
                    totalStudents += (result.data.count || 0);
                  } else {
                    errors.push(cls.className);
                  }

                  // Update bar to reflect the completed class.
                  refreshProgressUpdate(
                    completedCount < classes.length
                      ? 'Refreshing ' + escHtml(classes[completedCount].className) + '…'
                      : 'Finishing up…',
                    completedCount,
                    classes.length
                  );

                  // Move to the next class.
                  refreshNextClass(idx + 1);
                })
                .withFailureHandler(function () {
                  // Don't abort — log the error and continue with the next class.
                  completedCount++;
                  errors.push(cls.className);
                  refreshProgressUpdate(
                    completedCount < classes.length
                      ? 'Refreshing ' + escHtml(classes[completedCount].className) + '…'
                      : 'Finishing up…',
                    completedCount,
                    classes.length
                  );
                  refreshNextClass(idx + 1);
                })
                .serverRefreshStudentCache(App.token, cls.classId);
            }

            // Kick off the chain starting at index 0.
            refreshNextClass(0);
          })
          .withFailureHandler(function () {
            showAlert('ss-sync-result', 'Could not load class list. Please try again.', 'error');
          })
          .serverGetClasses(App.token);
      })
      .withFailureHandler(function () {
        showAlert('ss-sync-result', 'Could not save source selection. Please try again.', 'error');
      })
      .serverSetSessionSettings(App.token, { studentDataTab: tabName });
  });
}

// ─── REFRESH PROGRESS HELPERS ─────────────────────────────────────────────────

/**
 * Show the progress bar container and set it to 0%.
 * @param {number} total — total number of classes to refresh
 */
function refreshProgressShow(total) {
  var el = document.getElementById('ss-refresh-progress');
  if (!el) return;
  el.style.display = 'block';
  refreshProgressUpdate('Starting…', 0, total);
}

/**
 * Update the progress bar fill, label, and class counter.
 * @param {string} label   — current status message
 * @param {number} done    — classes completed so far
 * @param {number} total   — total classes
 */
function refreshProgressUpdate(label, done, total) {
  var bar   = document.getElementById('ss-refresh-progress-bar');
  var lbl   = document.getElementById('ss-refresh-progress-label');
  var count = document.getElementById('ss-refresh-progress-count');
  if (!bar || !lbl || !count) return;

  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  bar.style.width   = pct + '%';
  lbl.textContent   = label;
  count.textContent = done + ' of ' + total + ' classes';
}

/** Hide the progress bar container after refresh completes. */
function refreshProgressHide() {
  var el = document.getElementById('ss-refresh-progress');
  if (el) el.style.display = 'none';
  // Reset bar to 0 for next time.
  var bar = document.getElementById('ss-refresh-progress-bar');
  if (bar) bar.style.width = '0%';
}

function getFMGroupKey(className) {
  return className.replace(/\s+(science|art|commerce|humanities|business)\s*$/i, '').trim();
}

function buildFMGroups() {
  const ORDER = ['JSS 1', 'JSS 2', 'JSS 3', 'SSS 1', 'SSS 2', 'SSS 3'];
  const map = {};
  _assignClasses.forEach(function (cls) {
    const key = getFMGroupKey(cls.className);
    if (!map[key]) map[key] = { label: key, classIds: [], classNames: [] };
    map[key].classIds.push(cls.classId);
    map[key].classNames.push(cls.className);
  });
  _fmGroups = map;
  return Object.keys(map).sort(function (a, b) {
    const ai = ORDER.indexOf(a), bi = ORDER.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.localeCompare(b);
  }).map(function (k) { return map[k]; });
}

function fmDomKey(label) { return label.replace(/\s+/g, '_'); }

// ─── FORM MASTER TAB ─────────────────────────────────────────────────────────

function renderFMTab(body) {
  const groups = buildFMGroups();
  const fmByClass = {};
  _assignFM.forEach(function (a) { fmByClass[a.classId] = a; });
  const teachers = _assignUsers.filter(function (u) {
    return u.employmentStatus === 'Active' && (u.role === 'Teacher' || u.role === 'Admin');
  });
  let html = '<div class="page-content">';
  html += '<p class="text-sm text-muted mb-md">Assign one Form Master per level for the active session (' +
    escHtml((App.settings || {}).activeSession || 'not set') + '). For SSS levels the same Form Master covers all departments.</p>';
  html += '<div id="fm-alert" class="mb-md"></div>';
  groups.forEach(function (group) {
    const dk = fmDomKey(group.label);
    let existing = null;
    for (let i = 0; i < group.classIds.length; i++) {
      if (fmByClass[group.classIds[i]]) { existing = fmByClass[group.classIds[i]]; break; }
    }
    const selectedStaffId = existing ? existing.staffId : '';
    const fullAccess = existing ? (existing.grantedFullAccess === 'TRUE' || existing.grantedFullAccess === true) : false;
    const options = '<option value="">— Select teacher —</option>' +
      teachers.map(function (u) {
        return '<option value="' + escHtml(u.staffId) + '"' +
          (u.staffId === selectedStaffId ? ' selected' : '') + '>' +
          escHtml(u.name) + ' (' + escHtml(u.staffId) + ')</option>';
      }).join('');
    const subLabel = group.classNames.length > 1
      ? '<div class="text-xs text-muted mt-xs">Covers: ' + group.classNames.join(' · ') + '</div>' : '';
    html +=
      '<div class="assign-card" id="fm-card-' + dk + '">' +
        '<div class="assign-card__class">' +
          '<div class="assign-card__class-name">' + escHtml(group.label) + '</div>' + subLabel +
        '</div>' +
        '<div class="assign-card__body">' +
          '<select class="form-select mb-sm" id="fm-staff-' + dk + '">' + options + '</select>' +
          '<label class="d-flex align-center gap-sm mb-sm" style="cursor:pointer">' +
            '<input type="checkbox" id="fm-full-' + dk + '"' + (fullAccess ? ' checked' : '') + '>' +
            '<span class="text-sm">Grant full-class score entry access</span>' +
          '</label>' +
          '<div class="d-flex gap-sm">' +
            '<button class="btn btn--secondary btn--sm" onclick="saveFormMaster(\'' + dk + '\')">' +
              (existing ? 'Update' : 'Assign') + '</button>' +
            (existing ? '<button class="btn btn--ghost btn--sm" onclick="removeFormMaster(\'' + dk + '\')">Remove</button>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function saveFormMaster(domKey) {
  clearAlert('fm-alert');
  const groupLabel = domKey.replace(/_/g, ' ');
  const group = _fmGroups[groupLabel];
  if (!group) return;
  const staffEl = document.getElementById('fm-staff-' + domKey);
  const fullEl  = document.getElementById('fm-full-' + domKey);
  if (!staffEl) return;
  const staffId           = staffEl.value;
  const grantedFullAccess = fullEl ? fullEl.checked : false;
  if (!staffId) { showAlert('fm-alert', 'Please select a teacher to assign as Form Master.', 'error'); return; }
  const classIds = group.classIds.slice();
  let idx = 0;
  function assignNext() {
    if (idx >= classIds.length) {
      showToast('Form Master assigned for ' + groupLabel + '.', 'success');
      google.script.run
        .withSuccessHandler(function (r) {
          if (handleSessionExpired(r)) return;
          _assignFM = (r.success && r.data) ? r.data : [];
          renderAssignTab('fm');
        })
        .serverGetFormMasterAssignments(App.token);
      return;
    }
    const classId = classIds[idx++];
    google.script.run
      .withSuccessHandler(function (result) {
        if (handleSessionExpired(result)) return;
        if (!result.success) { showAlert('fm-alert', result.error, 'error'); return; }
        assignNext();
      })
      .withFailureHandler(function () { showAlert('fm-alert', 'Connection error.', 'error'); })
      .serverSetFormMasterAssignment(App.token, { staffId: staffId, classId: classId, grantedFullAccess: grantedFullAccess });
  }
  assignNext();
}

function removeFormMaster(domKey) {
  const groupLabel = domKey.replace(/_/g, ' ');
  const group = _fmGroups[groupLabel];
  if (!group) return;
  if (!confirm('Remove the Form Master assignment for ' + groupLabel + '?')) return;
  const classIds = group.classIds.slice();
  let idx = 0;
  function removeNext() {
    if (idx >= classIds.length) {
      showToast('Form Master assignment removed.', 'success');
      google.script.run
        .withSuccessHandler(function (r) {
          if (handleSessionExpired(r)) return;
          _assignFM = (r.success && r.data) ? r.data : [];
          renderAssignTab('fm');
        })
        .serverGetFormMasterAssignments(App.token);
      return;
    }
    const classId = classIds[idx++];
    google.script.run
      .withSuccessHandler(function (r) {
        if (handleSessionExpired(r)) return;
        removeNext();
      })
      .withFailureHandler(function () { showToast('Connection error.', 'error'); })
      .serverRemoveFormMasterAssignment(App.token, classId);
  }
  removeNext();
}

  const teachers  = _assignUsers.filter(function (u) {
    return u.employmentStatus === 'Active' && (u.role === 'Teacher' || u.role === 'Admin');
  });
  const teacherOpts = '<option value="">— Select teacher —</option>' +
    teachers.map(function (u) {
      return '<option value="' + escHtml(u.staffId) + '">' + escHtml(u.name) + ' (' + escHtml(u.staffId) + ')</option>';
    }).join('');
  const subjectOpts = '<option value="">— Select subject —</option>' +
    _assignSubjects.map(function (s) {
      return '<option value="' + escHtml(s.subjectId) + '">' + escHtml(s.subjectName) + ' (' + escHtml(s.section) + ')</option>';
    }).join('');
  const termOpts = ['First Term', 'Second Term', 'Third Term'].map(function (t) {
    return '<option value="' + t + '"' + (settings.activeTerm === t ? ' selected' : '') + '>' + t + '</option>';
  }).join('');
  let html = '<div class="page-content">';
  html += '<p class="text-sm text-muted mb-md">Session: <strong>' + escHtml(settings.activeSession || 'not set') +
    '</strong> · Term: <strong>' + escHtml(settings.activeTerm || 'not set') + '</strong></p>';
  html += '<div id="ts-alert" class="mb-md"></div>';
  html +=
    '<div class="card card--pad mb-md">' +
      '<div class="section-header-inline mb-sm">Add Assignment</div>' +
      '<div class="form-group"><label class="form-label" for="ts-staff">Teacher</label>' +
        '<select class="form-select" id="ts-staff">' + teacherOpts + '</select></div>' +
      '<div class="form-group"><label class="form-label" for="ts-subject">Subject</label>' +
        '<select class="form-select" id="ts-subject" onchange="onTSSubjectChange()">' + subjectOpts + '</select></div>' +
      '<div class="form-group"><label class="form-label" for="ts-term">Term</label>' +
        '<select class="form-select" id="ts-term" onchange="onTSSubjectChange()">' + termOpts + '</select></div>' +
      '<div class="form-group"><label class="form-label">Classes</label>' +
        '<div id="ts-class-list" class="check-list">' +
          '<div class="check-list__empty">Select a subject above to see available classes.</div>' +
        '</div>' +
        '<div class="form-hint">Only classes that offer the selected subject are shown.</div>' +
      '</div>' +
      '<button class="btn btn--primary btn--sm mt-xs" id="ts-add-btn" onclick="addTeacherAssignment()">' +
        '<span class="btn-text">Add Assignment</span><span class="spinner"></span></button>' +
    '</div>';
  const _tsSeen = {}, _tsDisplay = [];
  _assignTS.forEach(function (a) {
    const groupKey = getFMGroupKey(a.className || '');
    const key = (a.staffId||'') + '|' + (a.subjectId||'') + '|' + groupKey + '|' + (a.term||'');
    if (!_tsSeen[key]) {
      _tsSeen[key] = { staffName: a.staffName||a.staffId, subjectName: a.subjectName||a.subjectId,
        classGroup: groupKey||(a.className||a.classId), term: a.term||'', assignmentIds: [a.assignmentId] };
      _tsDisplay.push(_tsSeen[key]);
    } else { _tsSeen[key].assignmentIds.push(a.assignmentId); }
  });
  if (_tsDisplay.length === 0) {
    html += '<div class="empty-state mt-sm"><div class="empty-state__icon">📋</div>' +
      '<h3>No Assignments Yet</h3><p>Use the form above to assign teachers to subjects.</p></div>';
  } else {
    html += '<div class="section-header">Current Assignments (' + _tsDisplay.length + ')</div>' +
      '<div class="card" style="margin:0;border-radius:0">';
    _tsDisplay.forEach(function (entry) {
      const idsJson = escHtml(JSON.stringify(entry.assignmentIds));
      html += '<div class="list-row list-row--no-action"><div class="list-row__info">' +
        '<div class="list-row__name">' + escHtml(entry.staffName) + '</div>' +
        '<div class="list-row__sub">' + escHtml(entry.classGroup) + ' · ' + escHtml(entry.subjectName) +
          (entry.term ? ' <span class="text-muted">(' + escHtml(entry.term) + ')</span>' : '') + '</div>' +
        '</div><button class="btn btn--ghost btn--sm" onclick="removeTeacherAssignmentGroup(' + idsJson + ')">Remove</button></div>';
    });
    html += '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

function onTSSubjectChange() {
  const subjectId    = document.getElementById('ts-subject') ? document.getElementById('ts-subject').value : '';
  const selectedTerm = document.getElementById('ts-term')    ? document.getElementById('ts-term').value    : '';
  const listEl = document.getElementById('ts-class-list');
  if (!listEl) return;
  _tsClassGroups = {};
  if (!subjectId) { listEl.innerHTML = '<div class="check-list__empty">Select a subject above to see available classes.</div>'; return; }
  const csaClassIds = new Set(_assignCSA.filter(function (csa) { return csa.subjectId === subjectId; }).map(function (csa) { return csa.classId; }));
  if (csaClassIds.size === 0) { listEl.innerHTML = '<div class="check-list__empty">No classes are assigned this subject. Run Sync Subjects first.</div>'; return; }
  const ORDER = ['JSS 1', 'JSS 2', 'JSS 3', 'SSS 1', 'SSS 2', 'SSS 3'];
  const groupMap = {};
  _assignClasses.filter(function (c) { return csaClassIds.has(c.classId); }).forEach(function (c) {
    const key = getFMGroupKey(c.className);
    if (!groupMap[key]) groupMap[key] = [];
    groupMap[key].push(c.classId);
  });
  _tsClassGroups = groupMap;
  const classToGroup = {};
  Object.keys(groupMap).forEach(function (gk) { groupMap[gk].forEach(function (cid) { classToGroup[cid] = gk; }); });
  const takenGroupMap = {};
  _assignTS.filter(function (a) { return a.subjectId === subjectId && (!selectedTerm || a.term === selectedTerm); })
    .forEach(function (a) { const gk = classToGroup[a.classId]; if (gk && !takenGroupMap[gk]) takenGroupMap[gk] = a; });
  const groupKeys = Object.keys(groupMap).sort(function (a, b) {
    const ai = ORDER.indexOf(a), bi = ORDER.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1; if (bi !== -1) return 1;
    return a.localeCompare(b);
  });
  const availableCount = groupKeys.filter(function (k) { return !takenGroupMap[k]; }).length;
  const takenCount     = groupKeys.length - availableCount;
  let selectAllLabel = 'Select all available';
  if (availableCount > 0) selectAllLabel += ' (' + availableCount + ')';
  if (takenCount > 0)     selectAllLabel += ' · ' + takenCount + ' already assigned';
  let html = '<label class="check-list__item check-list__item--all">' +
    '<input type="checkbox" id="ts-select-all" onchange="toggleTSSelectAll(this.checked)"' + (availableCount === 0 ? ' disabled' : '') + '>' +
    '<span class="text-sm fw-bold">' + selectAllLabel + '</span></label>';
  groupKeys.forEach(function (key) {
    const taken = takenGroupMap[key];
    if (taken) {
      html += '<label class="check-list__item check-list__item--taken"><input type="checkbox" disabled>' +
        '<span class="text-sm">' + escHtml(key) + '</span>' +
        '<span class="check-list__taken-label">' + escHtml(taken.staffName||taken.staffId) + '</span></label>';
    } else {
      html += '<label class="check-list__item"><input type="checkbox" class="ts-cls-check" value="' + escHtml(key) + '">' +
        '<span class="text-sm">' + escHtml(key) + '</span></label>';
    }
  });
  listEl.innerHTML = html;
}

function toggleTSSelectAll(checked) {
  document.querySelectorAll('.ts-cls-check').forEach(function (el) { el.checked = checked; });
}

function addTeacherAssignment() {
  clearAlert('ts-alert');
  const staffId   = document.getElementById('ts-staff')   ? document.getElementById('ts-staff').value   : '';
  const subjectId = document.getElementById('ts-subject') ? document.getElementById('ts-subject').value : '';
  const term      = document.getElementById('ts-term')    ? document.getElementById('ts-term').value    : '';
  if (!staffId || !subjectId || !term) { showAlert('ts-alert', 'Please select Teacher, Subject and Term.', 'error'); return; }
  const checkedEls        = document.querySelectorAll('.ts-cls-check:checked');
  const selectedGroupKeys = Array.from(checkedEls).map(function (el) { return el.value; });
  if (selectedGroupKeys.length === 0) { showAlert('ts-alert', 'Please select at least one class.', 'error'); return; }
  const selectedClassIds = [];
  selectedGroupKeys.forEach(function (key) {
    (_tsClassGroups[key] || []).forEach(function (cid) { selectedClassIds.push(cid); });
  });
  if (selectedClassIds.length === 0) { showAlert('ts-alert', 'No class IDs found. Try reloading.', 'error'); return; }
  setButtonLoading('ts-add-btn', true);
  let added = 0, skipped = 0, idx = 0;
  function assignNext() {
    if (idx >= selectedClassIds.length) {
      setButtonLoading('ts-add-btn', false);
      if (added > 0) {
        const skipNote = skipped > 0 ? ' (' + skipped + ' already existed, skipped).' : '.';
        showToast(added + ' assignment' + (added !== 1 ? 's' : '') + ' added' + skipNote, 'success');
      } else {
        showAlert('ts-alert', 'All selected assignments already exist for this term.', 'warning');
      }
      google.script.run
        .withSuccessHandler(function (r) {
          if (handleSessionExpired(r)) return;
          _assignTS = (r.success && r.data) ? r.data : [];
          renderAssignTab('ts');
        })
        .serverGetTeacherAssignments(App.token);
      return;
    }
    const classId = selectedClassIds[idx++];
    google.script.run
      .withSuccessHandler(function (result) {
        if (handleSessionExpired(result)) return;
        if (!result.success) {
          if (result.code === 'DUPLICATE') { skipped++; assignNext(); }
          else { setButtonLoading('ts-add-btn', false); showAlert('ts-alert', result.error, 'error'); }
        } else { added++; assignNext(); }
      })
      .withFailureHandler(function () {
        setButtonLoading('ts-add-btn', false);
        showAlert('ts-alert', 'Connection error. Please try again.', 'error');
      })
      .serverAddTeacherAssignment(App.token, { staffId: staffId, classId: classId, subjectId: subjectId, term: term });
  }
  assignNext();
}

function removeTeacherAssignmentGroup(assignmentIds) {
  if (!confirm('Remove this assignment?')) return;
  const ids = Array.isArray(assignmentIds) ? assignmentIds.slice() : [assignmentIds];
  let idx = 0;
  function removeNext() {
    if (idx >= ids.length) {
      showToast('Assignment removed.', 'success');
      google.script.run
        .withSuccessHandler(function (r) {
          if (handleSessionExpired(r)) return;
          _assignTS = (r.success && r.data) ? r.data : [];
          renderAssignTab('ts');
        })
        .withFailureHandler(function () { renderAssignTab('ts'); })
        .serverGetTeacherAssignments(App.token);
      return;
    }
    const id = ids[idx++];
    google.script.run
      .withSuccessHandler(function (result) {
        if (handleSessionExpired(result)) return;
        if (!result.success) { showToast(result.error || 'Remove failed.', 'error'); return; }
        removeNext();
      })
      .withFailureHandler(function () { showToast('Connection error.', 'error'); })
      .serverRemoveTeacherAssignment(App.token, id);
  }
  removeNext();
}

let _userListData = [];

function initUserList() {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      const body = document.getElementById('user-list-body');
      if (!body) return;
      if (!result || !result.success) {
        body.innerHTML = '<div class="page-content"><div class="alert alert--error">' +
          escHtml((result && result.error) || 'Could not load users.') + '</div></div>';
        return;
      }
      _userListData = result.data || [];
      renderUserList(_userListData);
    })
    .withFailureHandler(function (err) {
      const body = document.getElementById('user-list-body');
      if (body) body.innerHTML = '<div class="page-content"><div class="alert alert--error">' +
        'Failed to load users: ' + escHtml((err && err.message) || 'Server error.') + '</div></div>';
    })
    .serverGetUserList(App.token);
}

function renderUserList(users) {
  const body = document.getElementById('user-list-body');
  if (!body) return;
  if (!users || users.length === 0) {
    body.innerHTML = '<div class="page-content"><div class="empty-state mt-lg"><div class="empty-state__icon">👤</div>' +
      '<h3>No Users Found</h3><p>Tap the + button to add the first staff account.</p></div></div>';
    return;
  }
  const groups = [
    { label: 'Super Admin', users: users.filter(function (u) { return u.role === 'Super Admin'; }) },
    { label: 'Admin',       users: users.filter(function (u) { return u.role === 'Admin'; })       },
    { label: 'Teachers',    users: users.filter(function (u) { return u.role === 'Teacher'; })     }
  ].filter(function (g) { return g.users.length > 0; });
  let html = '';
  groups.forEach(function (group) {
    html += '<div class="section-header">' + escHtml(group.label) + ' (' + group.users.length + ')</div>' +
      '<div class="card" style="margin:0;border-radius:0">';
    group.users.forEach(function (user) {
      const statusCls = user.employmentStatus === 'Resigned' ? ' style="opacity:.55"' : '';
      html += '<div class="list-row" onclick="openUserProfile(\'' + escHtml(user.staffId) + '\')"' + statusCls + '>' +
        '<div class="list-row__avatar">' + escHtml(initials(user.name)) + '</div>' +
        '<div class="list-row__info"><div class="list-row__name">' + escHtml(user.name) + '</div>' +
          '<div class="list-row__sub">' + escHtml(user.username) + ' · ' + escHtml(user.staffId) +
            (user.employmentStatus !== 'Active' ? ' · ' + escHtml(user.employmentStatus) : '') + '</div></div>' +
        roleBadge(user.role) + '<span class="list-row__chevron">›</span></div>';
    });
    html += '</div>';
  });
  body.innerHTML = html;
}

function filterUsers() {
  const query = (document.getElementById('user-search').value || '').toLowerCase();
  if (!query) { renderUserList(_userListData); return; }
  renderUserList(_userListData.filter(function (u) {
    return (u.name||'').toLowerCase().includes(query) || (u.username||'').toLowerCase().includes(query) ||
           (u.staffId||'').toLowerCase().includes(query) || (u.subjectSpecialty||'').toLowerCase().includes(query);
  }));
}

function openUserProfile(staffId) { renderView('editUser', { staffId: staffId }); }

function initAddUser() {
  const usernameInput = document.getElementById('au-username');
  if (!usernameInput) return;
  usernameInput.addEventListener('input', function () {
    clearTimeout(App.usernameCheckTimer);
    const val = this.value.trim();
    if (!val) {
      document.getElementById('au-username-hint').textContent = '3–20 characters: letters, numbers, underscores.';
      document.getElementById('au-username-hint').className = 'form-hint';
      clearFieldError('au-username'); return;
    }
    App.usernameCheckTimer = setTimeout(function () {
      google.script.run
        .withSuccessHandler(function (result) {
          const hint = document.getElementById('au-username-hint');
          if (!hint) return;
          if (result.available) { hint.textContent = '✓ Username is available.'; hint.className = 'form-hint success'; clearFieldError('au-username'); }
          else { hint.textContent = result.reason || 'Not available.'; hint.className = 'form-hint error'; }
        })
        .serverCheckUsername(val);
    }, 400);
  });
}

function submitAddUser() {
  clearAlert('adduser-alert');
  clearFieldError('au-name'); clearFieldError('au-username'); clearFieldError('au-password');
  const name      = (document.getElementById('au-name').value || '').trim();
  const username  = (document.getElementById('au-username').value || '').trim();
  const password  = document.getElementById('au-password').value || '';
  const email     = (document.getElementById('au-email')     ? document.getElementById('au-email').value.trim()     : '');
  const phone     = (document.getElementById('au-phone')     ? document.getElementById('au-phone').value.trim()     : '');
  const specialty = (document.getElementById('au-specialty') ? document.getElementById('au-specialty').value.trim() : '');
  const status    = document.getElementById('au-status') ? document.getElementById('au-status').value : 'Active';
  const roleEl    = document.getElementById('au-role');
  const role      = roleEl ? roleEl.value : 'Teacher';
  let valid = true;
  if (!name)                     { showFieldError('au-name', 'Full name is required.'); valid = false; }
  if (!username)                 { showFieldError('au-username', 'Username is required.'); valid = false; }
  if (!password)                 { showFieldError('au-password', 'Temporary password is required.'); valid = false; }
  if (password && password.length < 8) { showFieldError('au-password', 'Password must be at least 8 characters.'); valid = false; }
  if (!valid) return;
  setButtonLoading('au-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('au-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        showAlert('adduser-alert', result.error, 'error');
        if (result.code === 'USERNAME_TAKEN') showFieldError('au-username', result.error);
        return;
      }
      showToast(result.data.message, 'success');
      renderView('userList');
    })
    .withFailureHandler(function () {
      setButtonLoading('au-btn', false);
      showAlert('adduser-alert', 'Connection error. Please try again.', 'error');
    })
    .serverAddUser(App.token, { name, username, password, email, phoneNumber: phone,
      subjectSpecialty: specialty, employmentStatus: status, role });
}

 *   4. Change Role card — Super Admin only (not self, not another SA)
 *   5. Danger Zone (Delete Account) — Super Admin only, same exclusions
 *
 * @param {Object} user — staff object returned by serverGetUser
 */
function renderEditUserForm(user) {
  const body = document.getElementById('edituser-body');
  if (!body) return;

  // Update app-bar title and subtitle with loaded user data
  const h1 = document.querySelector('.app-bar h1');
  if (h1) h1.textContent = user.name;
  const subtitleEl = document.querySelector('.app-bar .subtitle');
  if (subtitleEl) subtitleEl.textContent = user.role || 'Staff Profile';

  const isSA        = App.user && App.user.role === 'Super Admin';
  const isTargetSA  = user.role === 'Super Admin';
  const isSelf      = App.user && App.user.staffId === user.staffId;
  const canEditRole = isSA && !isSelf && !isTargetSA;

  const statusOptions = ['Active', 'On Leave', 'Resigned'].map(function (s) {
    return '<option value="' + s + '"' + (user.employmentStatus === s ? ' selected' : '') + '>' + s + '</option>';
  }).join('');

  body.innerHTML =
    '<div id="edituser-alert" class="mb-md"></div>' +
    // ── Meta card ──────────────────────────────────────────────────────────
    '<div class="card card--pad mb-md">' +
      '<div class="d-flex align-center justify-between mb-sm">' +
        '<div class="text-xs text-muted">' + escHtml(user.staffId) + ' · ' + escHtml(user.username) + '</div>' +
        roleBadge(user.role) +
      '</div>' +
      '<div class="text-xs text-muted">Added by: ' + escHtml(user.addedBy || '—') +
        ' · Joined: ' + formatDate(user.dateJoined) + '</div>' +
    '</div>' +
    // ── Editable fields ────────────────────────────────────────────────────
    '<div class="card card--pad">' +
      '<div class="form-group"><label class="form-label">Full Name</label>' +
        '<input class="form-input" type="text" id="eu-name" value="' + escHtml(user.name) + '"></div>' +
      '<div class="form-group"><label class="form-label">Email</label>' +

      '<div class="form-group"><label class="form-label">Subject Specialty</label>' +

      '<div class="form-group"><label class="form-label">New Temporary Password</label>' +

        '<span class="btn-text">Reset Password</span><span class="spinner"></span></button>' +
    '</div>' +
    // ── Change Role card (Super Admin only) ───────────────────────────────
    (canEditRole
      ? '<div class="card card--pad mt-md"><div class="fw-bold mb-sm">Change Role</div><div class="d-flex gap-sm">' +
          (user.role !== 'Admin'

        '</div></div>'
      : '') +
    // ── Danger Zone (Super Admin only; excludes self and other Super Admins) ─
    (isSA && !isSelf && !isTargetSA
      ? '<div class="card card--pad mt-md eu-danger-zone">' +
          '<div class="fw-bold mb-sm eu-danger-zone__title">Danger Zone</div>' +

            'Delete Account' +

function submitEditUser(staffId) {
  clearAlert('edituser-alert');
  const updates = {
    name:             (document.getElementById('eu-name')      ? document.getElementById('eu-name').value.trim()      : ''),
    email:            (document.getElementById('eu-email')     ? document.getElementById('eu-email').value.trim()     : ''),
    phoneNumber:      (document.getElementById('eu-phone')     ? document.getElementById('eu-phone').value.trim()     : ''),
    subjectSpecialty: (document.getElementById('eu-specialty') ? document.getElementById('eu-specialty').value.trim() : ''),
    employmentStatus: (document.getElementById('eu-status')    ? document.getElementById('eu-status').value           : '')
  };
  if (!updates.name) { showAlert('edituser-alert', 'Full name is required.', 'error'); return; }
  setButtonLoading('eu-save-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('eu-save-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showAlert('edituser-alert', result.error, 'error'); return; }
      showToast('User updated.', 'success');
      renderView('userList');
    })
    .withFailureHandler(function () {
      setButtonLoading('eu-save-btn', false);
      showAlert('edituser-alert', 'Connection error.', 'error');
    })
    .serverUpdateUser(App.token, staffId, updates);
}

function submitResetPassword(staffId) {
  const newPw = document.getElementById('eu-new-temp-pw') ? document.getElementById('eu-new-temp-pw').value : '';
  if (!newPw || newPw.length < 8) {
    showFieldError('eu-new-temp-pw', 'Password must be at least 8 characters.');
    return;
  }
  clearFieldError('eu-new-temp-pw');
  setButtonLoading('eu-reset-pw-btn', true);
  google.script.run
    .withSuccessHandler(function (result) {
      setButtonLoading('eu-reset-pw-btn', false);
      if (handleSessionExpired(result)) return;
      if (!result.success) { showAlert('edituser-alert', result.error, 'error'); return; }
      showToast('Password reset. User will be forced to change it on next login.', 'success');
      renderView('userList');
    })
    .withFailureHandler(function () {
      setButtonLoading('eu-reset-pw-btn', false);
      showAlert('edituser-alert', 'Connection error.', 'error');
    })
    .serverResetPassword(App.token, staffId, newPw);
}

function submitChangeRole(staffId, newRole) {
  if (!confirm('Change this user\'s role to "' + newRole + '"?')) return;
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) { showToast(result.error, 'error'); return; }
      showToast(result.data.message, 'success');
      renderView('userList');
    })
    .withFailureHandler(function () { showToast('Connection error.', 'error'); })
    .serverChangeRole(App.token, staffId, newRole);
}

/**
 * Two-step confirm before permanently deleting a user account.
 * Uses native confirm() so the Super Admin must click OK explicitly.
 *
 * @param {string} staffId   — Staff ID to delete
 * @param {string} userName  — Display name (shown in confirm dialog)
 */
function confirmDeleteUser(staffId, userName) {
  var confirmed = confirm(
    'DELETE "' + userName + '" permanently?\n\n' +
    'This removes their login account and cannot be undone.\n' +
    'Make sure their assignments have been reassigned first.\n\n' +
    'Click OK to confirm, or Cancel to go back.'
  );
  if (!confirmed) return;
  submitDeleteUser(staffId);
}

/**
 * Call the server to permanently delete a user account.
 * On success, shows a toast and navigates to the User List.
 *
 * @param {string} staffId — Staff ID to delete
 */
function submitDeleteUser(staffId) {
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        showAlert('edituser-alert', result.error || 'Failed to delete account.', 'error');
        return;
      }
      showToast(result.data.message, 'success');
      renderView('userList');
    })
    .withFailureHandler(function () {
      showAlert('edituser-alert', 'Connection error. Please try again.', 'error');
    })
    .serverDeleteUser(App.token, staffId);
}

// Landing screen for Teachers/Form Masters. Shows FM class cards, Results
// entry points, and Teaching Assignment cards, loaded from the server once
// per session and cached in App._myFMClasses / App._myTSAssignments.

Views.teacherHome = function (params) {
  const hasHistory = App._navHistory.length > 0;
  const html =
    appBarHtml('My Teaching', 'Score entry & class management', hasHistory, 'back') +
    '<div class="view-body" id="teacher-home-body">' +
    '  <div class="loading-placeholder">Loading your assignments…</div>' +
    '</div>';
  return html;
};

function initTeacherHome() {
  // Use cached data if already loaded this session to avoid redundant reads
  if (App._assignmentsLoaded) {
    renderTeacherHomeSections(App._myFMClasses, App._myTSAssignments);
    return;
  }
  google.script.run
    .withSuccessHandler(function (result) {
      if (handleSessionExpired(result)) return;
      if (!result.success) {
        document.getElementById('teacher-home-body').innerHTML =
          '<p class="error-msg">' + (result.error || 'Failed to load assignments.') + '</p>';
        return;
      }
      const data           = result.data || {};
      App._myFMClasses     = data.fmClasses     || [];
      App._myTSAssignments = data.tsAssignments || [];
      App._assignmentsLoaded = true;
      renderTeacherHomeSections(App._myFMClasses, App._myTSAssignments);
    })
    .withFailureHandler(function () {
      document.getElementById('teacher-home-body').innerHTML =
        '<p class="error-msg">Connection error. Please try again.</p>';
    })
    .serverGetMyAssignments(App.token);
}

/**
 * Build and inject the teacher home content into #teacher-home-body.
 *
 * Sections:
 *   1. Greeting (salutation + name)
 *   2. Form Master Classes — one card per FM class
 *   3. Results & Broadsheet — one card per unique group key derived from FM classes
 *   4. Teaching Assignments — one card per subject+class assignment
 *
 * @param {Object[]} fmClasses     — { classId, className, studentCount }
 * @param {Object[]} tsAssignments — { classId, className, subjectId, subjectName }
 */
function renderTeacherHomeSections(fmClasses, tsAssignments) {
  // Strip SSS department suffix for grouping (mirrors server-side getGroupKey_)
  function stripDept(name) {
    return (name || '').replace(/\s+(science|art|commerce|humanities|business)\s*$/i, '').trim();
  }

  const hour      = new Date().getHours();
  const salutation = hour < 12 ? 'Good morning ☀️'
                   : hour < 17 ? 'Good afternoon 🌤️'
                   :             'Good evening 🌒';
  const fullName = (App.user && App.user.name) ? App.user.name : 'Teacher';

  let html = '<div style="padding: 0 var(--space-md)">';
  html +=
    '<div class="home-greeting">' +
    '<div class="home-greeting__salutation">' + salutation + ',</div>' +
    '<div class="home-greeting__name">' + escHtml(fullName) + '</div>' +
    '</div>';

  // ── Section 1: Form Master Classes ────────────────────────────────────────
  if (fmClasses.length > 0) {
    html += '<div class="home-section">';
    html += '<div class="home-section__title">Form Master Classes</div>';
    fmClasses.forEach(function (cls) {
      const count      = cls.studentCount || 0;
      const countLabel = count + ' student' + (count !== 1 ? 's' : '');
      html +=
        '<button class="home-card home-card--fm" ' +
        'onclick="navigateTo(\'fmClassOverview\',{classId:\'' + cls.classId +
        '\',className:\'' + escHtml(cls.className) + '\'})">' +
        '<span class="home-card__name">' + escHtml(cls.className) + '</span>' +
        '<span class="home-card__detail">Form Master · ' + countLabel + '</span>' +
        '</button>';
    });
    html += '</div>';

    // ── Section 2: Results & Broadsheet entry points ────────────────────────
    // Derive unique group keys from the FM's class list. For SSS groups the
    // FM has one row per department (e.g. "SSS 1 Science", "SSS 1 Art");
    // stripDept() collapses them to a single key ("SSS 1").
    var fmGroupsSeen = {};
    var fmGroupKeys  = [];
    fmClasses.forEach(function (cls) {
      var gk = stripDept(cls.className);
      if (!fmGroupsSeen[gk]) { fmGroupsSeen[gk] = true; fmGroupKeys.push(gk); }
    });

    html += '<div class="home-section">';
    html += '<div class="home-section__title">Results & Broadsheet</div>';
    // NOTE: navigateTo() is called directly (not openClassGroup()) because
    // _bssGroups[] is only populated after broadsheetHome loads. FMs never
    // visit broadsheetHome, so passing the groupKey string directly is correct.
    fmGroupKeys.forEach(function (gk) {
      html +=
        '<button class="home-card home-card--results" ' +
        'onclick="navigateTo(\'broadsheetClassMenu\',{groupKey:\'' + escHtml(gk) + '\'})">' +
        '<span class="home-card__name">📊 ' + escHtml(gk) + ' — Results Overview</span>' +
        '<span class="home-card__detail">Broadsheet · Subject Scores · Result Slips</span>' +
        '</button>';
    });
    html += '</div>';
  }

  // ── Section 3: Teaching Assignments ───────────────────────────────────────
  if (tsAssignments.length > 0) {
    html += '<div class="home-section">';
    html += '<div class="home-section__title">Teaching Assignments</div>';
    tsAssignments.forEach(function (a) {
      const shortClass = escHtml(stripDept(a.className));
      html +=
        '<button class="home-card home-card--ts" ' +
        'onclick="navigateTo(\'componentSelector\',{classId:\'' + a.classId +
        '\',className:\'' + shortClass +
        '\',subjectId:\'' + a.subjectId +
        '\',subjectName:\'' + escHtml(a.subjectName) + '\'})">' +
        '<span class="home-card__name">' + escHtml(a.subjectName) + '</span>' +
        '<span class="home-card__detail">' + shortClass + '</span>' +
        '</button>';
    });
    html += '</div>';
  }

  if (fmClasses.length === 0 && tsAssignments.length === 0) {
    html +=
      '<div class="empty-state mt-lg">' +
      '<div class="empty-state__icon">📚</div>' +
      '<h3>No Assignments This Term</h3>' +
      '<p>You have not been assigned as a Form Master or subject teacher ' +
      'for this term. Contact your administrator if this seems incorrect.</p>' +
      '</div>';
  }

  html += '</div>';
  document.getElementById('teacher-home-body').innerHTML = html;
}
